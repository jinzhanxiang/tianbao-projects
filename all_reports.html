<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>所有报告 · 天保控股项目库</title>
<meta name="description" content="天保控股投资部 · 全站研究报告索引 · 按项目 / 日期 / 类别筛选">
<link rel="stylesheet" href="assets/tianbao.css">
<style>
body{background:var(--bg)}
.v3-ar{max-width:1320px;margin:0 auto;padding:0 24px}
.v3-ar-head{display:flex;justify-content:space-between;align-items:flex-end;margin:6px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.v3-ar-head h1{font-family:var(--hei);font-size:16px;color:var(--ink);font-weight:800;margin:0;letter-spacing:2px;display:flex;align-items:center;gap:8px}
.v3-ar-head h1::before{content:'';width:3px;height:13px;background:var(--doc-rule);border-radius:1px}
.v3-ar-head .meta{font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-3);text-align:right;line-height:1.5}
.v3-ar-head .meta b{color:var(--seal);font-size:13px}

.v3-ar-toolbar{display:flex;gap:5px;align-items:center;margin:4px 0 6px;padding:5px 12px;background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);flex-wrap:wrap}
.v3-ar-toolbar label{font-family:var(--fsong);font-size:11px;color:var(--ink-3)}
.v3-ar-toolbar select,.v3-ar-toolbar input{font-family:var(--fsong);font-size:12px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--ink);min-width:120px}
.v3-ar-toolbar input:focus,.v3-ar-toolbar select:focus{outline:none;border-color:var(--seal)}
.v3-ar-toolbar .stat{margin-left:auto;font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-3)}

.v3-ar-proj-block{background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);padding:6px 12px 8px;margin-bottom:6px}
.v3-ar-proj-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.v3-ar-proj-head .emoji{font-size:16px}
.v3-ar-proj-head .title{font-family:var(--hei);font-size:13px;color:var(--ink);font-weight:800;letter-spacing:1px}
.v3-ar-proj-head .stage{font-family:ui-monospace,monospace;font-size:10px;color:var(--seal);background:rgba(192,57,43,0.08);padding:1px 6px;border-radius:3px}
.v3-ar-proj-head .cnt{font-family:ui-monospace,monospace;font-size:10px;color:var(--ink-3);margin-left:4px}
.v3-ar-proj-head a{font-family:var(--fsong);font-size:11px;color:var(--blue);text-decoration:none;margin-left:8px;flex-shrink:0}
.v3-ar-proj-head a:hover{text-decoration:underline}
.v3-ar-proj-head-r{display:flex;align-items:center;gap:4px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}

/* === 2 列网格：单页装下全部报告 === */
.v3-ar-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.v3-ar-item{display:grid;grid-template-columns:72px 1fr 68px;gap:6px;align-items:center;padding:3px 8px;background:var(--bg-2);border-radius:4px;border-left:2.5px solid var(--blue);transition:.2s;text-decoration:none;color:inherit;min-height:26px}
.v3-ar-item:hover{background:var(--paper);transform:translateX(3px);box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left-color:var(--seal)}
.v3-ar-date{font-family:ui-monospace,monospace;font-size:11px;color:var(--seal);font-weight:800;letter-spacing:.5px}
.v3-ar-cat{font-family:var(--fsong);font-size:10px;color:var(--blue);background:rgba(21,101,192,0.08);padding:1px 6px;border-radius:3px;font-weight:600;text-align:center;letter-spacing:.5px}
.v3-ar-title{font-family:var(--fsong);font-size:12px;color:var(--ink);font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.v3-ar-item:hover .v3-ar-title{color:var(--seal)}

.v3-ar-empty{padding:32px 20px;text-align:center;color:var(--ink-3);font-family:var(--fsong);font-size:13px;text-indent:0}
.v3-ar-loading{padding:32px 20px;text-align:center;color:var(--ink-3);font-family:var(--fsong);font-size:13px;text-indent:0}

@media (max-width:1100px){
  .v3-ar-list{grid-template-columns:1fr}
}
@media (max-width:760px){
  .v3-ar-item{grid-template-columns:70px 1fr}
  .v3-ar-cat{display:none}
  .v3-ar-proj-head{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img class="nav-logo" src="assets/brand/tb-logo.svg" alt="TB" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="nav-logo-fallback" style="display:none">保</div>
      <div>
        <div>天保控股投资部 · 项目管理中心</div>
        <div class="nav-brand-sub">全站研究报告索引<span class="sep">·</span>按项目 / 日期 / 类别筛选<span class="sep">·</span><span id="arMeta">载入中...</span></div>
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="anim-fade-in">🏛 首页</a>
      <a href="page.html" class="anim-fade-in" style="animation-delay:.1s">📂 分类矩阵</a>
      <a class="active anim-fade-in" id="navActive" style="animation-delay:.2s">📚 所有报告</a>
    </div>
  </div>
</nav>

<div class="v3-ar viewport-fit v3-grow">

  <div class="v3-ar-head">
    <h1>所有报告 · 全站索引</h1>
  </div>

  <!-- 筛选 -->
  <div class="v3-ar-toolbar">
    <label>项目：</label>
    <select id="filterProj">
      <option value="__ALL__">全部项目</option>
    </select>
    <label>类别：</label>
    <select id="filterCat">
      <option value="__ALL__">全部类别</option>
    </select>
    <label>关键字：</label>
    <input id="filterKw" type="text" placeholder="按标题搜索...">
    <div class="stat" id="filterStat">— 份</div>
  </div>

  <div id="arHost">
    <div class="v3-ar-loading">载入中...</div>
  </div>

</div>

<script src="assets/cmdK.js"></script>
<script>
(function(){
  'use strict';

  let PROJECTS = [];
  let REPORTS = {};   // {code: [report, ...]}
  let CURRENT_FILTER = { proj: '__ALL__', cat: '__ALL__', kw: '' };

  async function loadData(){
    try {
      const [p, r] = await Promise.all([
        fetch('data/projects.json', {cache:'no-store'}),
        fetch('data/reports.json', {cache:'no-store'}),
      ]);
      PROJECTS = (await p.json()).projects || [];
      REPORTS = (await r.json()).by_code || {};
    } catch(e){
      console.error('数据加载失败', e);
      PROJECTS = []; REPORTS = {};
    }
    // 暴露给 ⌘K 全局搜索
    window.PROJECTS = PROJECTS;
    window.REPORTS = REPORTS;
    if(window.cmdK) window.cmdK.rebuildIndex();
    bindFromUrl();
    populateFilterOptions();
    renderAll();
    bindToolbar();
    // 绑定报告行 3D 倾斜（cmdK.js 提供）
    if(window.cmdK) window.cmdK.tiltAll();
  }

  function bindFromUrl(){
    const u = new URLSearchParams(location.search);
    const code = u.get('code');
    if(code){
      CURRENT_FILTER.proj = code;
      document.getElementById('bcName').textContent = `${(PROJECTS.find(p=>p.code===code)||{}).name_cn || code} · 所有报告`;
      document.getElementById('navActive').textContent = '📚 该项目报告';
    }
  }

  function populateFilterOptions(){
    const projSel = document.getElementById('filterProj');
    PROJECTS.forEach(p=>{
      const o = document.createElement('option');
      o.value = p.code;
      o.textContent = `${p.name_cn}（${p.code}）`;
      projSel.appendChild(o);
    });
    projSel.value = CURRENT_FILTER.proj;

    // 收集所有类别
    const cats = new Set();
    Object.values(REPORTS).forEach(list => list.forEach(r => r.category && cats.add(r.category)));
    const catSel = document.getElementById('filterCat');
    Array.from(cats).sort().forEach(c=>{
      const o = document.createElement('option');
      o.value = c;
      o.textContent = c;
      catSel.appendChild(o);
    });
  }

  function bindToolbar(){
    document.getElementById('filterProj').addEventListener('change', e=>{
      CURRENT_FILTER.proj = e.target.value;
      renderAll();
    });
    document.getElementById('filterCat').addEventListener('change', e=>{
      CURRENT_FILTER.cat = e.target.value;
      renderAll();
    });
    document.getElementById('filterKw').addEventListener('input', e=>{
      CURRENT_FILTER.kw = e.target.value.trim();
      renderAll();
    });
  }

  function getEmoji(industry){
    if(!industry) return '🏢';
    if(industry.includes('电池')) return '🔋';
    if(industry.includes('医疗')) return '🏥';
    if(industry.includes('芯片')) return '💎';
    if(industry.includes('航天')) return '🛰️';
    if(industry.includes('数据')) return '🖥️';
    if(industry.includes('智能体')) return '🧠';
    return '🏢';
  }

  function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));}

  function renderAll(){
    const host = document.getElementById('arHost');
    const projOrder = PROJECTS.filter(p => {
      if(CURRENT_FILTER.proj !== '__ALL__') return p.code === CURRENT_FILTER.proj;
      return (REPORTS[p.code] || []).length > 0;
    });
    const projMap = Object.fromEntries(PROJECTS.map(p=>[p.code, p]));
    const totalMeta = document.getElementById('arMeta');

    let totalShown = 0;
    let totalAll = 0;
    const blocks = projOrder.map(p=>{
      const list = (REPORTS[p.code] || []).slice().sort((a,b)=>b.date.localeCompare(a.date));
      totalAll += list.length;
      const filtered = list.filter(r=>{
        if(CURRENT_FILTER.cat !== '__ALL__' && r.category !== CURRENT_FILTER.cat) return false;
        if(CURRENT_FILTER.kw && !(r.title||'').toLowerCase().includes(CURRENT_FILTER.kw.toLowerCase())) return false;
        return true;
      });
      totalShown += filtered.length;
      if(!filtered.length) return '';
      return `
        <div class="v3-ar-proj-block">
          <div class="v3-ar-proj-head">
            <span class="emoji">${getEmoji(p.industry)}</span>
            <span class="title">${escapeHtml(p.name_cn || p.code)}</span>
            <div class="v3-ar-proj-head-r">
              <span class="stage">${escapeHtml(p.stage_v3 || '—')} · ${escapeHtml(p.iss || '—')}</span>
              <span class="cnt">${filtered.length} / ${list.length} 份</span>
              <a href="detail.html?code=${encodeURIComponent(p.code)}">查看项目详情 →</a>
            </div>
          </div>
          <div class="v3-ar-list">
            ${filtered.map(r=>`
              <a class="v3-ar-item" href="${r.url||'#'}" target="_blank" rel="noopener">
                <span class="v3-ar-date">${r.date || '—'}</span>
                <span class="v3-ar-title">${escapeHtml(r.title || '(无标题)')}</span>
                <span class="v3-ar-cat">${escapeHtml(r.category || '未分类')}</span>
              </a>
            `).join('')}
          </div>
        </div>
      `;
    }).filter(Boolean).join('');

    host.innerHTML = blocks || `<div class="v3-ar-empty">未匹配到任何报告 · 调整筛选条件重试</div>`;
    document.getElementById('filterStat').textContent = `${totalShown} / ${totalAll} 份`;
    totalMeta.innerHTML = `共 <b>${totalAll}</b> 份报告 · 覆盖 <b>${Object.keys(REPORTS).filter(c=>(REPORTS[c]||[]).length>0).length}</b> 个项目`;
    // 重新绑定 3D 倾斜（新渲染的 .v3-ar-item 需要重新挂监听）
    if(window.cmdK) window.cmdK.tiltAll();
  }

  function init(){
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded', loadData);
    } else {
      loadData();
    }
  }
  init();
})();
</script>
</body>
</html>
