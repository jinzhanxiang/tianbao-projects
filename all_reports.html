<style>
/* ============================================================
 *  天保 v3 DMS · 所有报告页 · skillhub.cn 风格覆盖
 * ============================================================ */
:root{
  --sk-bg:#F5F5F7;
  --sk-paper:#FFFFFF;
  --sk-ink:#1d1d1f;
  --sk-ink-2:#3c3c43;
  --sk-ink-3:#747480;
  --sk-line:rgba(0,0,0,0.14);
  --sk-line-strong:rgba(0,0,0,0.18);
  --sk-blue:#0079DD;
  --sk-blue-2:#00519B;
  --sk-blue-3:#6FC9FF;
  --sk-blue-soft:rgba(0,121,221,0.10);
  --sk-blue-softer:rgba(0,121,221,0.06);
  --sk-shadow:0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06);
  --sk-shadow-lg:0 6px 20px rgba(0,121,221,0.18), 0 16px 40px rgba(0,0,0,0.08);
  --sk-radius:22px;
  --sk-radius-sm:14px;
  --sk-radius-pill:980px;
  --sk-glow:0 0 0 4px rgba(0,121,221,0.12), 0 0 24px rgba(0,121,221,0.15);
}

/* === 全局动画 === */
@keyframes cardBreathe{
  0%,100%{box-shadow:0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06), 0 0 0 0 rgba(0,121,221,0.0)}
  50%{box-shadow:0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,121,221,0.10)}
}
@keyframes borderShine{
  0%{background-position:0% 0%}
  100%{background-position:300% 300%}
}
@keyframes shimmerDown{
  0%{transform:rotate(20deg) translateY(-100%)}
  60%,100%{transform:rotate(20deg) translateY(120%)}
}
@keyframes bgSweep{
  0%,100%{background-position:-100% 0}
  50%{background-position:200% 0}
}
@keyframes flowRight{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
@keyframes dotPulse{
  0%,100%{transform:scale(1);opacity:1;box-shadow:0 0 0 4px rgba(0,121,221,0.15),0 0 12px rgba(0,121,221,0.4)}
  50%{transform:scale(1.2);opacity:.85;box-shadow:0 0 0 8px rgba(0,121,221,0.05),0 0 24px rgba(0,121,221,0.6)}
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* === 新增 · HUD 增强关键帧 === */
@keyframes scanLine{
  0%{transform:translateY(-100%);opacity:0}
  8%{opacity:.9}
  92%{opacity:.9}
  100%{transform:translateY(100%);opacity:0}
}
@keyframes hudBracketBlink{
  0%,100%{opacity:.35}
  50%{opacity:.95}
}
@keyframes stageAccentDot{
  0%,100%{transform:scale(1);opacity:1;box-shadow:0 0 0 3px currentColor,0 0 8px currentColor}
  50%{transform:scale(.85);opacity:.5;box-shadow:0 0 0 6px transparent,0 0 14px currentColor}
}
@keyframes countGlitch{
  0%{transform:translateY(-2px);opacity:0;filter:blur(1px)}
  60%{transform:translateY(1px);opacity:1;filter:blur(0)}
  100%{transform:translateY(0);opacity:1}
}

*{box-sizing:border-box}
body{
  font-family:'PingFang SC','Outfit',-apple-system,BlinkMacSystemFont,'Helvetica Neue','Source Han Sans SC','Noto Sans SC',sans-serif!important;
  font-size:17px!important;color:var(--sk-ink)!important;line-height:1.55;
}
/* 背景层由 tianbao.css 统一提供（多径向渐变 + 蓝图点纹 + 慢漂移） */

/* 导航 · R179 同步 */
.nav{background:rgba(255,255,255,0.85)!important;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--sk-line)!important}
.nav-brand>div>div:first-child{font-size:40px!important;letter-spacing:-0.5px!important;line-height:1.15!important;font-weight:900!important;font-family:'PingFang SC','Source Han Sans SC','Noto Sans SC','Microsoft YaHei',sans-serif!important;background:linear-gradient(135deg,#0A1F3D 0%,#0079DD 50%,#5B3FB8 100%)!important;-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-fill-color:transparent!important;color:transparent!important;filter:drop-shadow(0 2px 4px rgba(0,121,221,0.12));opacity:.94;animation:titleFadeIn .55s cubic-bezier(.2,.8,.2,1) .12s backwards!important}
.nav-brand-sub{font-size:14px!important;font-weight:500!important;letter-spacing:.3px!important;color:var(--sk-ink-3)!important;margin-top:6px!important;opacity:.85;animation:subFadeIn .55s cubic-bezier(.2,.8,.2,1) .26s backwards}
.nav-logo{width:200px!important;height:auto!important;border-radius:10px!important;background:#ffffff!important;box-shadow:0 2px 8px rgba(0,0,0,0.08)!important;transition:.3s cubic-bezier(.2,.8,.2,1);object-fit:contain;padding:0;animation:logoFadeIn .6s cubic-bezier(.2,.8,.2,1) backwards}
.nav-brand:hover .nav-logo{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 18px rgba(0,0,0,0.15)!important}
.nav-logo-fallback{display:none;width:200px;height:200px;align-items:center;justify-content:center;background:#ffffff;color:#000;font-size:54px;font-weight:900;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.nav-dept-chip{display:inline-flex;align-items:center;gap:6px;margin-left:10px;padding:4px 11px;background:rgba(0,121,221,0.92);color:#fff;font-size:12px;font-weight:800;letter-spacing:2px;border-radius:980px;vertical-align:middle;box-shadow:0 2px 8px rgba(0,121,221,0.30),inset 0 1px 0 rgba(255,255,255,0.20);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:.3s;animation:subFadeIn .55s cubic-bezier(.2,.8,.2,1) .4s backwards}
.nav-dept-chip::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 8px rgba(255,255,255,1.0),0 0 0 3px rgba(0,121,221,0.25);animation:deptDotBlink 2.5s ease-in-out infinite}
.nav-links a,.nav-current{font-size:16px!important;font-weight:600!important;padding:8px 16px!important;border-radius:var(--sk-radius-pill)!important;color:var(--sk-ink-2)!important}
.nav-links a{transition:.25s cubic-bezier(.2,.8,.2,1)!important;position:relative!important}
.nav-links a:hover{background:var(--sk-blue-soft)!important;color:var(--sk-blue)!important;transform:translateY(-2px)!important;box-shadow:0 4px 12px rgba(0,121,221,0.18)!important}
.nav-links a::before{content:''!important;position:absolute!important;left:50%!important;top:50%!important;width:0!important;height:0!important;border-radius:50%!important;background:radial-gradient(circle,rgba(0,121,221,0.18) 0%,transparent 70%)!important;transform:translate(-50%,-50%)!important;transition:.45s cubic-bezier(.2,.8,.2,1)!important;pointer-events:none!important}
.nav-links a:hover::before{width:120%!important;height:200%!important}
.nav-links a::after{content:''!important;position:absolute!important;left:50%!important;bottom:4px!important;width:0!important;height:2px!important;background:linear-gradient(90deg,var(--sk-blue) 0%,var(--sk-blue-2) 100%)!important;border-radius:1px!important;transition:.35s cubic-bezier(.2,.8,.2,1)!important;transform:translateX(-50%)!important;box-shadow:0 0 6px rgba(0,121,221,0.5)!important}
.nav-links a:hover::after{width:28px!important}
.nav-current{background:var(--sk-blue)!important;color:#fff!important}
@keyframes logoFadeIn{0%{opacity:0;transform:scale(.85) translateX(-12px)}100%{opacity:1;transform:scale(1) translateX(0)}}
@keyframes titleFadeIn{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:translateY(0)}}
@keyframes subFadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes deptDotBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.2)}}

/* 主容器 */
.v3-ar{
  max-width:1320px!important;margin:0 auto;
  padding:36px 36px 80px!important;
  display:flex;flex-direction:column;gap:24px;
}

/* 页头 H1 */
.v3-ar-head{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin:0!important;padding:0 0 24px!important;
  border-bottom:1px solid var(--sk-line)!important;
  flex-wrap:wrap;gap:16px;
}
.v3-ar-head h1{
  font-family:'PingFang SC','Outfit',sans-serif!important;
  font-size:38px!important;letter-spacing:-0.5px!important;line-height:1.2!important;
  color:var(--sk-ink)!important;font-weight:800!important;margin:0!important;
  display:flex;align-items:center;gap:14px;
}
.v3-ar-head h1::before{
  content:'';width:6px;height:36px!important;
  background:linear-gradient(180deg,var(--sk-blue) 0%,var(--sk-blue-2) 100%)!important;
  border-radius:3px!important;
  box-shadow:0 0 12px rgba(0,121,221,0.45);
}

/* 工具栏 · 玻璃卡 + 流光边框 */
.v3-ar-toolbar{
  display:flex;gap:12px;align-items:center;
  flex-wrap:wrap;
  padding:20px 28px!important;
  background:rgba(255,255,255,0.55)!important;
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border:1.5px solid var(--sk-line)!important;
  border-radius:var(--sk-radius)!important;
  box-shadow:var(--sk-shadow)!important;
  position:relative;overflow:visible;
  animation:cardBreathe 6s ease-in-out infinite;
}
.v3-ar-toolbar::after{
  content:'';position:absolute;inset:-1px;border-radius:inherit;
  padding:1.5px;
  background:linear-gradient(135deg,rgba(0,121,221,0.0) 0%,rgba(0,121,221,0.30) 30%,rgba(192,57,43,0.20) 50%,rgba(0,121,221,0.30) 70%,rgba(0,121,221,0.0) 100%);
  background-size:300% 300%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:borderShine 8s linear infinite;
  pointer-events:none;
}
.v3-ar-toolbar label{
  font-size:15px!important;color:var(--sk-ink-2)!important;
  font-weight:600;font-family:'PingFang SC',sans-serif;
}
.v3-ar-toolbar select,.v3-ar-toolbar input{
  font-family:'PingFang SC','Outfit',sans-serif!important;
  font-size:15px!important;padding:10px 16px!important;
  border:1px solid var(--sk-line)!important;
  border-radius:12px!important;background:var(--sk-bg)!important;
  color:var(--sk-ink)!important;min-width:140px;
  transition:.2s;
}
.v3-ar-toolbar input:focus,.v3-ar-toolbar select:focus{
  outline:none!important;border-color:var(--sk-blue)!important;
  box-shadow:0 0 0 4px var(--sk-blue-soft);
}
.v3-ar-toolbar .stat{
  margin-left:auto;font-family:'Outfit',sans-serif!important;
  font-size:15px!important;color:var(--sk-blue)!important;font-weight:700!important;
  background:var(--sk-blue-soft)!important;padding:6px 14px!important;
  border-radius:var(--sk-radius-pill)!important;
  font-variant-numeric:tabular-nums;
}

/* 项目块 · 玻璃卡 + 流光边框 */
.v3-ar-proj-block{
  --pb-color:var(--sk-blue);
  --pb-glow:rgba(0,121,221,.20);
  background:rgba(255,255,255,0.55)!important;
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border:1.5px solid var(--sk-line)!important;
  border-left:5px solid var(--pb-color)!important;
  border-radius:var(--sk-radius)!important;
  padding:24px 28px!important;margin-bottom:16px!important;
  box-shadow:var(--sk-shadow)!important;
  position:relative;overflow:visible;
  animation:cardIn .5s cubic-bezier(.2,.8,.2,1) backwards, cardBreathe 6s ease-in-out infinite;
  transition:.3s;
}
.v3-ar-proj-block:hover{
  box-shadow:0 6px 22px var(--pb-glow),0 16px 40px rgba(0,0,0,.08)!important;
}
.v3-ar-proj-block::after{
  content:'';position:absolute;inset:-1px;border-radius:inherit;
  padding:1.5px;
  background:linear-gradient(135deg,rgba(0,121,221,0.0) 0%,var(--pb-glow) 30%,rgba(0,121,221,0.0) 60%,var(--pb-glow) 100%);
  background-size:300% 300%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:borderShine 9s linear infinite;
  pointer-events:none;
}

/* === 项目块 · 4 角 HUD 支架 === */
.v3-block-corner{
  position:absolute;width:22px;height:22px;
  border-style:solid;border-color:var(--pb-color,var(--sk-blue));
  opacity:0;transition:opacity .35s ease;pointer-events:none;
  z-index:5;
}
.v3-ar-proj-block:hover .v3-block-corner{opacity:.7;animation:hudBracketBlink 2.4s ease-in-out infinite}
.v3-block-corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-top-left-radius:14px}
.v3-block-corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-top-right-radius:14px}
.v3-block-corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-bottom-left-radius:14px}
.v3-block-corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-bottom-right-radius:14px}
.v3-ar-proj-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px!important;padding-bottom:14px!important;
  border-bottom:1px solid var(--sk-line)!important;flex-wrap:wrap;
}
.v3-ar-proj-head .emoji{font-size:28px!important;flex-shrink:0}
.v3-ar-proj-head .title{
  font-family:'PingFang SC','Outfit',sans-serif!important;
  font-size:20px!important;color:var(--sk-ink)!important;
  font-weight:800!important;letter-spacing:-0.2px!important;flex-shrink:0;
}
.v3-ar-proj-head .stage{
  font-size:14px!important;font-weight:700!important;
  color:var(--pb-color,var(--sk-blue))!important;
  background:transparent!important;
  border:1px solid var(--pb-color,var(--sk-blue));
  padding:4px 12px!important;border-radius:var(--sk-radius-pill)!important;
  font-family:'PingFang SC',sans-serif;
  display:inline-flex;align-items:center;gap:6px;
  position:relative;z-index:1;
}
.v3-ar-proj-head .stage::before{
  content:'';display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--pb-color,var(--sk-blue));color:var(--pb-color,var(--sk-blue));
  animation:stageAccentDot 2s ease-in-out infinite;
}
/* 项目标题 · [ ] 角标 */
.v3-ar-proj-head .title{position:relative}
.v3-ar-proj-head .title::before,
.v3-ar-proj-head .title::after{
  content:'';display:inline-block;width:7px;height:14px;
  border-style:solid;border-color:var(--pb-color,var(--sk-blue));
  vertical-align:middle;margin:0 8px;opacity:.5;
  position:relative;top:-1px;
}
.v3-ar-proj-head .title::before{border-width:0 0 0 2px;border-bottom-left-radius:4px}
.v3-ar-proj-head .title::after{border-width:0 2px 0 0;border-bottom-right-radius:4px}
.v3-ar-proj-head:hover .title::before,
.v3-ar-proj-head:hover .title::after{opacity:1;animation:hudBracketBlink 1.8s ease-in-out infinite}
.v3-ar-proj-head .cnt{
  font-size:14px!important;color:var(--sk-ink-3)!important;
  font-family:'Outfit',sans-serif;font-weight:600;font-variant-numeric:tabular-nums;
}
.v3-ar-proj-head a{
  font-family:'PingFang SC',sans-serif!important;
  font-size:15px!important;color:var(--sk-blue)!important;
  text-decoration:none;font-weight:600!important;
  padding:4px 12px!important;border-radius:var(--sk-radius-pill)!important;
  transition:.2s;
}
.v3-ar-proj-head a:hover{background:var(--sk-blue-soft)!important}
.v3-ar-proj-head-r{
  display:flex;align-items:center;gap:8px;margin-left:auto;
  flex-wrap:wrap;justify-content:flex-end;
}

/* === 报告列表 · 2 列网格 === */
.v3-ar-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.v3-ar-item{
  --item-color:var(--sk-blue);
  display:grid;grid-template-columns:96px 1fr auto!important;gap:14px;
  align-items:center;
  padding:14px 18px!important;
  background:var(--sk-bg)!important;border-radius:14px!important;
  border:1px solid var(--sk-line)!important;
  border-left:4px solid var(--item-color)!important;
  transition:.2s;text-decoration:none;color:inherit;min-height:48px;
  font-family:'PingFang SC',sans-serif;
  position:relative;overflow:hidden;
}
/* 报告项 · 顶部扫描线（hover 时激活） */
.v3-ar-item-scan{
  position:absolute;left:0;right:0;top:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--item-color) 50%,transparent 100%);
  opacity:0;pointer-events:none;z-index:1;
  border-radius:14px 14px 0 0;
}
.v3-ar-item:hover .v3-ar-item-scan{opacity:.85;animation:scanLine 2.4s ease-in-out infinite}
.v3-ar-item::after{
  content:'';position:absolute;left:-20%;right:-20%;top:-50%;height:200%;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,0) 40%,rgba(255,255,255,0.55) 50%,rgba(255,255,255,0) 60%,transparent 70%);
  transform:rotate(20deg) translateY(-100%);
  animation:shimmerDown 4s ease-in-out infinite;
  pointer-events:none;
}
.v3-ar-item:hover{
  background:var(--sk-blue-softer)!important;
  border-color:var(--item-color)!important;border-left-color:var(--item-color)!important;
  transform:translateX(3px);box-shadow:0 4px 14px rgba(0,0,0,.08),0 0 0 1px var(--item-color)!important;
}
.v3-ar-date{
  font-family:'Outfit',sans-serif!important;font-size:15px!important;
  color:var(--sk-blue)!important;font-weight:700!important;
  letter-spacing:.3px;font-variant-numeric:tabular-nums;
}
.v3-ar-cat{
  font-size:13px!important;color:var(--sk-blue)!important;
  background:var(--sk-blue-soft)!important;
  padding:4px 12px!important;border-radius:var(--sk-radius-pill)!important;
  font-weight:700!important;text-align:center;letter-spacing:.2px;
  font-family:'PingFang SC',sans-serif;
}
.v3-ar-title{
  font-family:'PingFang SC',sans-serif!important;
  font-size:16px!important;color:var(--sk-ink)!important;
  font-weight:600!important;line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.v3-ar-item:hover .v3-ar-title{color:var(--sk-blue)}
.v3-ar-title span[style*="font-size:9px"]{
  font-size:12px!important;color:var(--sk-ink-3)!important;
  font-family:'PingFang SC',sans-serif;margin-left:6px;
}
.v3-ar-item[style*="opacity:.85"]{border-left-color:var(--sk-ink-3)!important;opacity:1!important}
.v3-ar-item[style*="opacity:.85"] .v3-ar-date{color:var(--sk-ink-3)!important}

.v3-ar-empty{
  padding:60px 24px!important;text-align:center;
  color:var(--sk-ink-3)!important;font-size:16px!important;
}
.v3-ar-loading{
  padding:60px 24px!important;text-align:center;
  color:var(--sk-ink-3)!important;font-size:16px!important;
}

/* 入场动画 + 呼吸 */
.v3-ar-head,.v3-ar-toolbar{
  animation:cardIn .5s cubic-bezier(.2,.8,.2,1) backwards, cardBreathe 6s ease-in-out infinite .5s;
}
.v3-ar-head{animation-delay:.05s,.55s}
.v3-ar-toolbar{animation-delay:.12s,.62s}
.v3-ar-proj-block:nth-of-type(1){animation-delay:.19s,.55s}
.v3-ar-proj-block:nth-of-type(2){animation-delay:.26s,.62s}
.v3-ar-proj-block:nth-of-type(3){animation-delay:.33s,.69s}
.v3-ar-proj-block:nth-of-type(4){animation-delay:.40s,.76s}
.v3-ar-proj-block:nth-of-type(5){animation-delay:.47s,.83s}

@media (max-width:1100px){
  .v3-ar-list{grid-template-columns:1fr!important}
}
@media (max-width:760px){
  .v3-ar{padding:20px 16px 60px!important;gap:18px}
  .v3-ar-head h1{font-size:26px!important}
  .v3-ar-head h1::before{height:26px!important}
  .v3-ar-toolbar{padding:16px 18px!important;gap:10px}
  .v3-ar-toolbar select,.v3-ar-toolbar input{font-size:14px!important;padding:8px 12px!important;min-width:120px}
  .v3-ar-toolbar .stat{font-size:13px!important}
  .v3-ar-proj-block{padding:18px 20px!important}
  .v3-ar-proj-head .title{font-size:17px!important}
  .v3-ar-proj-head .emoji{font-size:22px!important}
  .v3-ar-item{grid-template-columns:80px 1fr!important;padding:12px 14px!important;gap:10px}
  .v3-ar-cat{display:none!important}
  .v3-ar-title{font-size:14px!important}
  .v3-ar-date{font-size:13px!important}

  .nav-brand>div>div:first-child{font-size:26px!important}
  .nav-brand-sub{font-size:12px!important}
  .nav-brand-sub .clock{font-size:13px!important}
  .nav-dept-chip{font-size:10px!important;padding:3px 8px!important;letter-spacing:1px!important;margin-left:6px!important}
  .nav-logo{width:120px!important}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img class="nav-logo" src="assets/brand/tb-logo.jpg" alt="天保控股 T&B HOLDING" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="nav-logo-fallback" style="display:none">保</div>
      <div>
        <div>投资部 · 项目管理中心<span class="nav-dept-chip">投资部</span></div>
        <div class="nav-brand-sub">全站研究报告索引<span class="sep">·</span>按项目 / 日期 / 类别筛选<span class="sep">·</span><span id="arMeta">载入中...</span></div>
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="anim-fade-in">🏛 首页</a>
      <a href="page.html" class="anim-fade-in" style="animation-delay:.1s">📂 分类矩阵</a>
      <span class="nav-current anim-fade-in" id="navActive" style="animation-delay:.2s" aria-current="page">📚 所有报告</span>
    </div>
  </div>
</nav>

<div class="v3-ar viewport-fit v3-grow">

  <div class="v3-ar-head">
    <h1>所有报告 · 全站索引</h1>
  </div>

  <!-- 筛选 -->
  <div class="v3-ar-toolbar">
    <label>项目：</label>
    <select id="filterProj">
      <option value="__ALL__">全部项目</option>
    </select>
    <label>类别：</label>
    <select id="filterCat">
      <option value="__ALL__">全部类别</option>
    </select>
    <label>关键字：</label>
    <input id="filterKw" type="text" placeholder="按标题搜索...">
    <div class="stat" id="filterStat">— 份</div>
  </div>

  <div id="arHost">
    <div class="v3-ar-loading">载入中...</div>
  </div>

</div>

<script src="assets/cmdK.js"></script>
<script>
(function(){
  'use strict';

  let PROJECTS = [];
  let REPORTS = {};   // {code: [report, ...]}
  let CURRENT_FILTER = { proj: '__ALL__', cat: '__ALL__', kw: '' };

  async function loadData(){
    try {
      const [p, r] = await Promise.all([
        fetch('data/projects.json', {cache:'no-store'}),
        fetch('data/reports.json', {cache:'no-store'}),
      ]);
      PROJECTS = (await p.json()).projects || [];
      const _rp = await r.json();
      REPORTS = _rp.by_code || {};
      /* 隔离区过滤 + 底库项目 _archived 标记过滤 */
      const _qc = _rp.quarantine_codes || [];
      _qc.forEach(c => { delete REPORTS[c]; });
      Object.keys(REPORTS).forEach(c => {
        REPORTS[c] = (REPORTS[c] || []).filter(r => !r._archived);
      });
    } catch(e){
      console.error('数据加载失败', e);
      PROJECTS = []; REPORTS = {};
    }
    // 暴露给 ⌘K 全局搜索
    window.PROJECTS = PROJECTS;
    window.REPORTS = REPORTS;
    if(window.cmdK) window.cmdK.rebuildIndex();
    bindFromUrl();
    populateFilterOptions();
    renderAll();
    bindToolbar();
    // 绑定报告行 3D 倾斜（cmdK.js 提供）
    if(window.cmdK) window.cmdK.tiltAll();
  }

  function bindFromUrl(){
    const u = new URLSearchParams(location.search);
    const code = u.get('code');
    if(code){
      CURRENT_FILTER.proj = code;
      const navA = document.getElementById('navActive');
      if(navA) navA.textContent = '📚 该项目报告';
    }
  }

  function populateFilterOptions(){
    const projSel = document.getElementById('filterProj');
    PROJECTS.forEach(p=>{
      const o = document.createElement('option');
      o.value = p.code;
      o.textContent = `${p.name_cn}（${p.code}）`;
      projSel.appendChild(o);
    });
    projSel.value = CURRENT_FILTER.proj;

    // 收集所有类别
    const cats = new Set();
    Object.values(REPORTS).forEach(list => list.forEach(r => r.category && cats.add(r.category)));
    const catSel = document.getElementById('filterCat');
    Array.from(cats).sort().forEach(c=>{
      const o = document.createElement('option');
      o.value = c;
      o.textContent = c;
      catSel.appendChild(o);
    });
  }

  function bindToolbar(){
    document.getElementById('filterProj').addEventListener('change', e=>{
      CURRENT_FILTER.proj = e.target.value;
      renderAll();
    });
    document.getElementById('filterCat').addEventListener('change', e=>{
      CURRENT_FILTER.cat = e.target.value;
      renderAll();
    });
    document.getElementById('filterKw').addEventListener('input', e=>{
      CURRENT_FILTER.kw = e.target.value.trim();
      renderAll();
    });
  }

  function getEmoji(industry){
    if(!industry) return '🏢';
    if(industry.includes('电池')) return '🔋';
    if(industry.includes('医疗')) return '🏥';
    if(industry.includes('芯片')) return '💎';
    if(industry.includes('航天')) return '🛰️';
    if(industry.includes('数据')) return '🖥️';
    if(industry.includes('智能体')) return '🧠';
    return '🏢';
  }

  /* === 阶段色板 === */
  const AR_STAGE_COLOR = {
    '在推重点': '#C0392B',
    '储备': '#0079DD',
    '观察': '#6B7280',
  };
  function hexToRgba(hex, alpha){
    const h = hex.replace('#','');
    const r = parseInt(h.substring(0,2),16);
    const g = parseInt(h.substring(2,4),16);
    const b = parseInt(h.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));}

  function renderAll(){
    const host = document.getElementById('arHost');
    const projOrder = PROJECTS.filter(p => {
      if(CURRENT_FILTER.proj !== '__ALL__') return p.code === CURRENT_FILTER.proj;
      return (REPORTS[p.code] || []).length > 0;
    });
    const projMap = Object.fromEntries(PROJECTS.map(p=>[p.code, p]));
    const totalMeta = document.getElementById('arMeta');

    let totalShown = 0;
    let totalAll = 0;
    const blocks = projOrder.map(p=>{
      const list = (REPORTS[p.code] || []).slice().sort((a,b)=>b.date.localeCompare(a.date));
      totalAll += list.length;
      const filtered = list.filter(r=>{
        if(CURRENT_FILTER.cat !== '__ALL__' && r.category !== CURRENT_FILTER.cat) return false;
        if(CURRENT_FILTER.kw && !(r.title||'').toLowerCase().includes(CURRENT_FILTER.kw.toLowerCase())) return false;
        return true;
      });
      totalShown += filtered.length;
      if(!filtered.length) return '';
      const stageColor = AR_STAGE_COLOR[p.stage_v3] || '#0079DD';
      const stageGlow = hexToRgba(stageColor, 0.20);
      return `
        <div class="v3-ar-proj-block to-reveal" data-reveal-delay="${Math.min(5, projOrder.indexOf(p) + 1)}" style="--pb-color:${stageColor};--pb-glow:${stageGlow}">
          <span class="v3-block-corner tl"></span>
          <span class="v3-block-corner tr"></span>
          <span class="v3-block-corner bl"></span>
          <span class="v3-block-corner br"></span>
          <div class="v3-ar-proj-head">
            <span class="emoji">${getEmoji(p.industry)}</span>
            <span class="title">${escapeHtml(p.name_cn || p.code)}</span>
            <div class="v3-ar-proj-head-r">
              <span class="stage">${escapeHtml(p.stage_v3 || '—')} · ${escapeHtml(p.iss || '—')}</span>
              <span class="cnt">${filtered.length} / ${list.length} 份</span>
              <a href="detail.html?code=${encodeURIComponent(p.code)}">查看项目详情 →</a>
            </div>
          </div>
          <div class="v3-ar-list">
            ${filtered.map(r=>{
              const resolved = window.cmdK ? window.cmdK.resolveReportUrl(r, p.code) : '';
              const isOnline = !!resolved && /^https?:/.test(resolved);
              const dateStr = escapeHtml(r.date || '—');
              const titleStr = escapeHtml(r.title || '(无标题)');
              const catStr = escapeHtml(r.category || '未分类');
              return isOnline ? `
              <a class="v3-ar-item" style="--item-color:${stageColor}" href="${resolved}" target="_blank" rel="noopener noreferrer">
                <span class="v3-ar-item-scan"></span>
                <span class="v3-ar-date">${dateStr}</span>
                <span class="v3-ar-title">${titleStr}</span>
                <span class="v3-ar-cat">${catStr}</span>
              </a>` : `
              <div class="v3-ar-item" style="--item-color:#6B7280;cursor:default;border-left-color:#6B7280;opacity:.85">
                <span class="v3-ar-item-scan"></span>
                <span class="v3-ar-date">${dateStr}</span>
                <span class="v3-ar-title">${titleStr}<span style="font-size:9px;color:var(--ink-3);font-family:var(--fsong);margin-left:6px">· 项目内查看</span></span>
                <span class="v3-ar-cat">${catStr}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      `;
    }).filter(Boolean).join('');

    host.innerHTML = blocks || `<div class="v3-ar-empty">未匹配到任何报告 · 调整筛选条件重试</div>`;
    if(window.cmdK && window.cmdK.bindScrollReveal) window.cmdK.bindScrollReveal(host);
    document.getElementById('filterStat').textContent = `${totalShown} / ${totalAll} 份`;
    totalMeta.innerHTML = `共 <b>${totalAll}</b> 份报告 · 覆盖 <b>${Object.keys(REPORTS).filter(c=>(REPORTS[c]||[]).length>0).length}</b> 个项目`;
    // 重新绑定 3D 倾斜（新渲染的 .v3-ar-item 需要重新挂监听）
    if(window.cmdK) window.cmdK.tiltAll();
  }

  function init(){
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded', loadData);
    } else {
      loadData();
    }
  }
  init();
})();
</script>
</body>
</html>
