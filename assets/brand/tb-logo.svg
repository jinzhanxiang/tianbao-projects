<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F2FB"/>
      <stop offset="100%" stop-color="#B8D4EC"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0079DD"/>
      <stop offset="100%" stop-color="#00519B"/>
    </linearGradient>
  </defs>
  <!-- 圆形底 -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGrad)" stroke="#0079DD" stroke-width="2"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#0079DD" stroke-width="0.8" opacity="0.4"/>
  <!-- TB 标志：T 形顶 + B 弧形 -->
  <g fill="url(#markGrad)">
    <!-- 顶部 T 横 -->
    <rect x="44" y="50" width="112" height="14" rx="2"/>
    <!-- T 竖柱 -->
    <rect x="92" y="50" width="16" height="100" rx="1"/>
    <!-- B 左弧（粗体）-->
    <path d="M 44 80 Q 56 78 68 82 Q 84 88 84 100 Q 84 112 68 118 Q 56 122 44 120 Z" opacity="0.85"/>
    <!-- B 右下弧 -->
    <path d="M 44 122 Q 60 120 78 124 Q 96 130 96 142 Q 96 150 84 152 Q 70 154 56 152 Q 48 150 44 148 Z" opacity="0.7"/>
  </g>
  <!-- 底部弧线文字带 -->
  <path d="M 30 160 A 80 80 0 0 0 170 160" stroke="#0079DD" stroke-width="1" fill="none" opacity="0.3"/>
  <text x="100" y="180" text-anchor="middle" font-family="serif" font-size="11" font-weight="600" fill="#00519B" letter-spacing="2">TIANJIN TIANBAO</text>
</svg>
