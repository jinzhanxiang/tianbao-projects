<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天保控股 - 项目列表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#06113a;--blue:#2563eb;--bg:#e8edf5;--card:#fff;--text:#0f172a;--text-2:#475569;--border:rgba(15,23,42,.08)
}
html,body{font-family:-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
/* Nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:16px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:8px;color:var(--text-2);font-size:14px;text-decoration:none}
.nav-links a:hover{background:#f1f5f9}
.nav-links a.active{background:var(--navy);color:#fff}
/* Header */
.header{margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header p{color:var(--text-2);font-size:14px}
/* Filter tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;background:var(--card);font-size:13px;cursor:pointer;border:1px solid var(--border);transition:.2s}
.tab:hover{background:#f1f5f9}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
/* Project list */
.list{display:flex;flex-direction:column;gap:12px}
.list-item{background:var(--card);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:.2s;cursor:pointer;text-decoration:none;color:inherit}
.list-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.list-emoji{font-size:24px}
.list-main{flex:1}
.list-name{font-size:16px;font-weight:600;margin-bottom:2px}
.list-sub{font-size:13px;color:var(--text-2)}
.list-meta{display:flex;gap:16px;font-size:13px;color:var(--text-2)}
.list-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.status-deal{background:#fef2f2;color:#dc2626}
.status-np{background:#f0fdf4;color:#16a34a}
.loading{text-align:center;padding:40px;color:var(--text-2)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div class="logo"><span class="logo-mark">天</span>天保控股项目中心</div>
    <div class="nav-links">
      <a href="index.html">🏠 首页</a>
      <a href="dashboard.html">📊 仪表盘</a>
      <a href="projects.html" class="active">📁 项目</a>
      <a href="reports.html">📚 报告库</a>
      <a href="timeline.html">⏱️ 时间线</a>
      <a href="kg.html">🔗 知识图谱</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="header">
    <h1>📁 项目列表</h1>
    <p>所有投资项目总览</p>
  </div>
  
  <div class="tabs">
    <div class="tab active" data-cat="all">全部</div>
    <div class="tab" data-cat="deal">并购</div>
    <div class="tab" data-cat="np">储备</div>
    <div class="tab" data-cat="listed">上市</div>
  </div>
  
  <div id="project-list" class="list">
    <div class="loading">加载中...</div>
  </div>
</div>

<script>
let allProjects = [];

async function init() {
  try {
    const resp = await fetch('data/projects.json');
    const data = await resp.json();
    allProjects = data.projects;
    render(allProjects);
    
    // Tab clicks
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const cat = tab.dataset.cat;
        render(cat === 'all' ? allProjects : allProjects.filter(p => p.category === cat));
      });
    });
  } catch(e) {
    document.getElementById('project-list').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}

function render(projects) {
  const list = document.getElementById('project-list');
  if (projects.length === 0) {
    list.innerHTML = '<div class="loading">暂无项目</div>';
    return;
  }
  list.innerHTML = projects.map(p => `
    <a href="detail.html?id=${p.id}" class="list-item">
      <span class="list-emoji">${p.emoji}</span>
      <div class="list-main">
        <div class="list-name">${p.name}</div>
        <div class="list-sub">${p.stage} · ${p.status}</div>
        <div class="list-meta"><span>更新: ${p.last_updated}</span></div>
      </div>
      <span class="list-status status-${p.category}">${p.category === 'deal' ? '并购' : p.category === 'np' ? '储备' : '上市'}</span>
    </a>
  `).join('');
}
init();
</script>
</body>
</html>
