<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 天保控股 · 项目列表</title>
<script src="assets/particles.js"></script>
<link rel="stylesheet" href="assets/cyber-override.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;display:flex;flex-direction:column;font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);position:relative;z-index:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit}

/* Header */
.header{margin-bottom:20px}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-2);font-size:14px}

/* Filter tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;background:var(--bg-card);font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all 0.3s;color:var(--text-2)}
.tab:hover{border-color:var(--border-glow);color:var(--cyan)}
.tab.active{background:rgba(0,212,255,0.15);color:var(--cyan);border-color:rgba(0,212,255,0.3)}

/* Project list */
.list{display:flex;flex-direction:column;gap:10px}
.list-item{background:var(--bg-card);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:all 0.3s;text-decoration:none;color:inherit;border:1px solid var(--border);position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.list-item::before{content:'';position:absolute;inset:-1px;border-radius:13px;background:linear-gradient(135deg,var(--cyan),var(--purple));opacity:0;transition:opacity 0.4s;z-index:-1;filter:blur(6px)}
.list-item:hover::before{opacity:0.15}
.list-item:hover{border-color:var(--border-glow);transform:translateX(4px);box-shadow:var(--shadow-glow)}
.list-emoji{font-size:24px}
.list-main{flex:1}
.list-name{font-size:16px;font-weight:600;margin-bottom:2px;color:var(--text)}
.list-sub{font-size:13px;color:var(--text-2)}
.list-meta{display:flex;gap:16px;font-size:12px;color:var(--text-3)}
.list-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.status-deal{background:rgba(239,68,68,0.15);color:var(--red)}
.status-np{background:rgba(52,211,153,0.15);color:var(--green)}
.status-listed{background:rgba(74,122,255,0.15);color:var(--blue)}

.loading{text-align:center;padding:60px;color:var(--text-2);font-family:var(--font-mono);font-size:13px}
.wrap{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:2;flex:1;overflow-y:auto;min-height:0;width:100%}
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // GSAP 立即执行 - cyber fade-in + scale + glitch
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof gsap !== 'undefined') {
        // 主标题 cyber-glitch 立即触发
        document.querySelectorAll('.cyber-title, .cyber-title-sm, h1, h2').forEach(function(el, i) {
          gsap.from(el, {duration: 0.6, opacity: 0, y: 20, delay: i * 0.05, ease: 'power2.out'});
        });
        // cyber-card 立即 staggered 动画
        document.querySelectorAll('.cyber-card, .cyber-panel, .cyber-stat').forEach(function(el, i) {
          gsap.from(el, {duration: 0.5, opacity: 0, scale: 0.95, delay: 0.2 + i * 0.05, ease: 'back.out(1.2)'});
        });
        // cyber-badge 脉冲
        document.querySelectorAll('.cyber-badge').forEach(function(el, i) {
          gsap.from(el, {duration: 0.4, opacity: 0, scale: 0.5, delay: 0.4 + i * 0.03, ease: 'elastic.out(1, 0.5)'});
        });
        console.log('[GSAP] cyber animations initialized for projects.html');
      }
    });
  </script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">✦</span>天保控股 · 项目中心</a>
    <div class="nav-links">
      <a href="index.html">✦ 首页</a>
      <a href="dashboard.html">✦ 仪表盘</a>
      <a href="projects.html" class="active">✦ 项目</a>
      <a href="reports.html">✦ 报告库</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="header">
    <h1 class="cyber-title">✦ 项目列表</h1>
    <p>所有投资项目总览</p>
  </div>
  
  <div class="tabs">
    <div class="tab active" data-cat="all">全部</div>
    <div class="tab" data-cat="deal">并购</div>
    <div class="tab" data-cat="np">储备</div>
    <div class="tab" data-cat="listed">上市</div>
  </div>
  
  <div id="project-list" class="list">
    <div class="loading">✦ 加载中...</div>
  </div>
</div>

<div class="cyber-statusbar">
  <span><span class="dot green"></span>✦ 项目列表 · 系统在线</span>
  <span>✦ <span id="projectCount">--</span> 个项目</span>
</div>

<script>
let allProjects = [];

async function init() {
  try {
    /* fetch 已废弃（按主公 08:12 终极指令） · 项目数据内嵌 */
    const data = { projects: [
      {id:'PRJ-001',name:'江南国际',category:'deal',stage:'待尽调',emoji:'🚀'},
      {id:'PRJ-002',name:'科渡',category:'deal',stage:'已签约',emoji:'📡'},
      {id:'PRJ-003',name:'中富',category:'np',stage:'推进中',emoji:'💼'},
      {id:'PRJ-004',name:'新宏',category:'np',stage:'储备',emoji:'🔍'},
      {id:'PRJ-005',name:'宏源',category:'np',stage:'储备',emoji:'🏦'},
      {id:'PRJ-006',name:'巡超',category:'deal',stage:'尽调中',emoji:'📑'}
    ]};
    allProjects = data.projects;
    /* cyber-card 模板（按主公 08:23 终极指令 · 加快进度） */
    const grid = document.getElementById('project-list');
    grid.className = 'cyber-grid';
    grid.innerHTML = allProjects.map(p => `<div class="card cyber-card cyber-card-glow cyber-shimmer"><div class="card-emoji">${p.emoji}</div><div class="card-name">${p.name}</div><div class="card-sub">${p.stage}</div></div>`).join('');
    document.getElementById('projectCount').textContent = allProjects.length;
    document.getElementById('projectCount').textContent = allProjects.length;
    render(allProjects);
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const cat = tab.dataset.cat;
        render(cat === 'all' ? allProjects : allProjects.filter(p => p.category === cat));
      });
    });
  } catch(e) {
    document.getElementById('project-list').innerHTML = '<div class="loading">✦ 加载失败: ' + e.message + '</div>';
  }
}

function render(projects) {
  const list = document.getElementById('project-list');
  if (projects.length === 0) {
    list.innerHTML = '<div class="loading">✦ 暂无项目</div>';
    return;
  }
  list.innerHTML = projects.map(p => `
    <a href="detail.html?id=${p.id}" class="list-item">
      <span class="list-emoji">${p.emoji}</span>
      <div class="list-main">
        <div class="list-name">${p.name}</div>
        <div class="list-sub">${p.stage} · ${p.status}</div>
        <div class="list-meta"><span>更新: ${p.last_updated}</span></div>
      </div>
      <span class="list-status status-${p.category}">${p.category === 'deal' ? '并购' : p.category === 'np' ? '储备' : '上市'}</span>
    </a>
  `).join('');
}
init();
// Auto-refresh every 60s
setInterval(init, 60000);
</script>

<!-- 主题切换按钮 -->
<button class="cyber-theme-toggle" id="themeToggle" title="切换日/夜间模式">🌙</button>
<script>
  // 主题切换
  (function(){
    var btn = document.getElementById('themeToggle');
    if(!btn) return;
    var isLight = localStorage.getItem('cyber-theme') === 'light';
    if(isLight){
      document.documentElement.classList.add('cyber-light');
      btn.textContent = '☀️';
    }
    btn.addEventListener('click', function(){
      var html = document.documentElement;
      if(html.classList.contains('cyber-light')){
        html.classList.remove('cyber-light');
        localStorage.setItem('cyber-theme', 'dark');
        btn.textContent = '🌙';
      } else {
        html.classList.add('cyber-light');
        localStorage.setItem('cyber-theme', 'light');
        btn.textContent = '☀️';
      }
    });
  })();
</script></body>
</html>
