<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 项目时间线 · 天保控股</title>
<script src="assets/particles.js"></script>
<link rel="stylesheet" href="assets/cyber-override.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;display:flex;flex-direction:column;font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);position:relative;z-index:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit;transition:all 0.3s ease}

/* Header */
.header{margin-bottom:24px;transition:opacity 0.3s ease}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:all 0.3s ease}
.header p{color:var(--text-2);font-size:14px}

/* Select */
.select-wrap{margin-bottom:20px}
select{padding:10px 16px;font-size:14px;border-radius:10px;border:1px solid var(--border);min-width:240px;background:var(--bg-card);color:var(--text);font-family:var(--cyber-font);backdrop-filter:blur(10px);transition:all 0.3s ease}
select:focus{border-color:var(--border-glow);outline:none;box-shadow:var(--shadow-glow);transform:scale(1.02)}

/* Timeline */
.timeline{max-width:800px;margin:0 auto}
.tl-item{position:relative;padding-left:36px;padding-bottom:24px;border-left:2px solid rgba(0,212,255,0.15);transition:all 0.3s ease}
.tl-item:hover{background:rgba(0,212,255,0.05);border-left-color:var(--cyan)}
.tl-item::before{content:"";position:absolute;left:-7px;top:0;width:12px;height:12px;border-radius:50%;background:var(--cyan);border:2px solid var(--cyber-bg);box-shadow:0 0 8px rgba(0,212,255,0.3);transition:all 0.3s ease}
.tl-item:hover::before{transform:scale(1.3);box-shadow:0 0 16px rgba(0,212,255,0.6)}
.tl-item.main::before{background:var(--purple);box-shadow:0 0 8px rgba(167,139,250,0.3)}
.tl-item.done::before{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,0.3)}
.tl-date{font-size:12px;color:var(--text-3);margin-bottom:4px}
.tl-title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text);transition:color 0.3s ease}
.tl-item:hover .tl-title{color:var(--cyan)}
.tl-desc{font-size:14px;color:var(--text-2)}
.tl-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tl-link{padding:4px 12px;background:rgba(0,212,255,0.1);color:var(--cyan);border-radius:6px;font-size:12px;border:1px solid rgba(0,212,255,0.1);transition:all 0.3s ease}
.tl-link:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 12px rgba(0,212,255,0.3);transform:translateY(-2px)}
.tl-link.report{background:rgba(52,211,153,0.1);color:var(--green);border-color:rgba(52,211,153,0.15)}
.tl-link.report:hover{background:rgba(52,211,153,0.2);box-shadow:0 0 12px rgba(52,211,153,0.3)}
.tl-local{font-size:12px;color:var(--text-3);margin-top:8px;padding:8px 12px;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);transition:all 0.3s ease}
.tl-local:hover{border-color:var(--cyan);box-shadow:var(--shadow-glow)}
.tl-local code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-size:11px;color:var(--cyan)}

.loading{text-align:center;padding:60px;color:var(--text-2);font-family:var(--font-mono);font-size:13px}
.error{text-align:center;padding:60px;color:var(--red);font-family:var(--font-mono);font-size:13px}
.main{max-width:1000px;margin:0 auto;padding:32px 24px;position:relative;z-index:2;flex:1;overflow-y:auto;min-height:0;width:100%;transition:opacity 0.3s ease}
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // GSAP 立即执行 - cyber fade-in + scale + glitch
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof gsap !== 'undefined') {
        // 主标题 cyber-glitch 立即触发
        document.querySelectorAll('.cyber-title, .cyber-title-sm, h1, h2').forEach(function(el, i) {
          gsap.from(el, {duration: 0.6, opacity: 0, y: 20, delay: i * 0.05, ease: 'power2.out'});
        });
        // cyber-card 立即 staggered 动画
        document.querySelectorAll('.cyber-card, .cyber-panel, .cyber-stat').forEach(function(el, i) {
          gsap.from(el, {duration: 0.5, opacity: 0, scale: 0.95, delay: 0.2 + i * 0.05, ease: 'back.out(1.2)'});
        });
        // cyber-badge 脉冲
        document.querySelectorAll('.cyber-badge').forEach(function(el, i) {
          gsap.from(el, {duration: 0.4, opacity: 0, scale: 0.5, delay: 0.4 + i * 0.03, ease: 'elastic.out(1, 0.5)'});
        });
        console.log('[GSAP] cyber animations initialized for timeline.html');
      }
    });
  </script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">✦</span>天保控股 · 项目中心</a>
    <div class="nav-links">
      <a href="index.html">✦ 首页</a>
      <a href="dashboard.html">✦ 仪表盘</a>
      <a href="projects.html">✦ 项目</a>
      <a href="reports.html">✦ 报告库</a>
    </div>
  </div>
</nav>

<div class="main">
  <div class="header">
    <h1>✦ 项目时间线</h1>
    <p>选择项目查看时间线及本地材料目录</p>
  </div>
  <div class="select-wrap">
    <select id="project-select">
      <option value="">✦ 选择项目...</option>
    </select>
  </div>
  <div id="timeline" class="timeline"><div class="loading">✦ 请选择项目</div></div>
</div>

<div class="cyber-statusbar">
  <span><span class="dot green"></span>✦ 时间线 · 系统在线</span>
  <span>✦ 项目时间线视图</span>
</div>

<script>
const projectsData = [];
async function init() {
  try {
    /* fetch 已废弃（按主公 08:12 终极指令） · 时间线数据内嵌 */
    const projData = { projects: [
      {id:'PRJ-001',name:'江南国际'},
      {id:'PRJ-002',name:'科渡'},
      {id:'PRJ-003',name:'中富'},
      {id:'PRJ-004',name:'新宏'},
      {id:'PRJ-005',name:'宏源'}
    ]};
    const tlData = { events: [
      {date:'2026-07-15',text:'江南国际立项',projectId:'PRJ-001',projectName:'江南国际'},
      {date:'2026-07-10',text:'科渡签约',projectId:'PRJ-002',projectName:'科渡'},
      {date:'2026-07-05',text:'中富预研启动',projectId:'PRJ-003',projectName:'中富'},
      {date:'2026-07-20',text:'主公 08:12 终极指令清理 kg/wiki 数据',projectId:'-',projectName:'系统'},
      {date:'2026-07-20',text:'P0-5 删除 1107 文件 (commit ddbc2d0)',projectId:'-',projectName:'系统'},
      {date:'2026-07-20',text:'P0-6 fetch 改内嵌 + kg 残留清理',projectId:'-',projectName:'系统'}
    ]};
    projectsData.push(...projData.projects);
    const sel = document.getElementById('project-select');
    projData.projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = '✦ ' + p.name;
      sel.appendChild(opt);
    });
    const tlAll = document.createElement('option');
    tlAll.value = '-';
    tlAll.textContent = '✦ 全部';
    sel.appendChild(tlAll);
    
    renderTimeline('PRJ-001', tlData.events);
    sel.addEventListener('change', e => {
      const pid = e.target.value;
      if (pid) renderTimeline(pid, tlData.events);
      else document.getElementById('timeline').innerHTML = '<div class="loading">✦ 请选择项目</div>';
    });
  } catch(e) {
    document.getElementById('timeline').innerHTML = '<div class="error">✦ 加载失败: '+e.message+'</div>';
  }
}

function renderTimeline(pid, events) {
  const p = projectsData.find(x => x.id === pid);
  if (!p) return;
  
  const projEvents = events.filter(e => e.projectId === pid || e.projectName.includes(p.name));
  
  if (projEvents.length === 0) {
    const defaults = [
      {date:'2026-07-01',title:'立项启动',desc:'项目进入立项阶段',type:'main',localDir:p.localDir},
      {date:'2026-07-10',title:'尽职调查',desc:'开展财务/法律尽调',type:'on',localDir:p.localDir},
      {date:p.last_updated||'2026-07-19',title:'当前状态',desc:p.status,type:p.category==='deal'?'main':'on',localDir:p.localDir}
    ];
    renderEvents(defaults, p);
  } else {
    renderEvents(projEvents, p);
  }
}

function renderEvents(evts, p) {
  let html = '';
  evts.forEach(e => {
    const localDir = e.localDir || `entities/${e.projectName || 'unknown'}.md`;
    html += `<div class="tl-item ${e.type || 'on'}">
      <div class="tl-date">${e.date}</div>
      <div class="tl-title">${e.event || e.title}</div>
      <div class="tl-desc">${e.desc || ''}</div>
      <div class="tl-links">
        ${e.reportUrl?`<a href="${e.reportUrl}" target="_blank" class="tl-link report">✦ 报告</a>`:''}
        <a href="detail.html?id=${e.projectId}" class="tl-link">✦ 详情</a>
      </div>
      <div class="tl-local">✦ 本地: <code>~/Documents/tianbao-projects/${localDir}</code></div>
    </div>`;
  });
  document.getElementById('timeline').innerHTML = html;
}

init();
// Auto-refresh every 60s
setInterval(init, 60000);
</script>
</body>
</html>
