<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目时间线 · 天保控股</title>
<style>
:root{--navy:#06113a;--blue:#2563eb;--blue-2:#3b82f6;--emerald:#10b981;--bg:#e8edf5;--card:#fff;--text:#0f172a;--text-2:#475569;--text-3:#94a3b8;--border:rgba(15,23,42,.08)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text)}
a{text-decoration:none;color:inherit}
/* Nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 14px;border-radius:8px;color:var(--text-2);font-size:14px}
.nav-links a:hover{background:#f1f5f9}
.nav-links a.active{background:var(--navy);color:#fff}
/* Main */
.main{max-width:1000px;margin:0 auto;padding:32px 24px}
.header{margin-bottom:32px}
.header h1{font-size:24px;margin-bottom:8px}
.header p{font-size:14px;color:var(--text-2)}
/* Project Select */
.select-wrap{margin-bottom:24px}
select{padding:10px 16px;font-size:14px;border-radius:8px;border:1px solid var(--border);min-width:200px;background:var(--card);color:var(--text)}
/* Timeline */
.timeline{max-width:800px;margin:0 auto}
.tl-item{position:relative;padding-left:40px;padding-bottom:28px;border-left:3px solid var(--border)}
.tl-item::before{content:"";position:absolute;left:-8px;top:0;width:14px;height:14px;border-radius:50%;background:var(--blue);border:3px solid var(--bg)}
.tl-item.main::before{background:var(--navy)}
.tl-item.done::before{background:var(--emerald)}
.tl-date{font-size:12px;color:var(--text-3);margin-bottom:4px}
.tl-title{font-size:16px;font-weight:600;margin-bottom:4px}
.tl-desc{font-size:14px;color:var(--text-2)}
.tl-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tl-link{padding:4px 10px;background:var(--blue);color:#fff;border-radius:6px;font-size:12px}
.tl-link:hover{background:var(--blue-2)}
.tl-link.report{background:var(--emerald)}
.tl-local{font-size:12px;color:var(--text-3);margin-top:8px;padding:8px;background:var(--card);border-radius:6px;border:1px solid var(--border)}
.tl-local code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:11px}
.loading{text-align:center;padding:40px;color:var(--text-2)}
.error{text-align:center;padding:40px;color:#ef4444}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">天</span>天保控股项目中心</a>
    <div class="nav-links">
      <a href="index.html">🏠 首页</a>
      <a href="dashboard.html">📊 仪表盘</a>
      <a href="projects.html">📁 项目</a>
      <a href="reports.html">📚 报告库</a>
      <a href="timeline.html" class="active">⏱️ 时间线</a>
      <a href="project.html">📋 详情</a>
      <a href="kg.html">🔗 知识图谱</a>
    </div>
  </div>
</nav>
<div class="main">
  <div class="header">
    <h1>⏱️ 项目时间线</h1>
    <p>选择项目查看时间线及本地材料目录</p>
  </div>
  <div class="select-wrap">
    <select id="project-select">
      <option value="">选择项目...</option>
    </select>
  </div>
  <div id="timeline" class="timeline"><div class="loading">请选择项目</div></div>
</div>
<script>
const projectsData = [];
async function init() {
  try {
    const [projResp, tlResp] = await Promise.all([
      fetch('data/projects.json'),
      fetch('data/timeline.json')
    ]);
    const projData = await projResp.json();
    const tlData = await tlResp.json();
    projectsData.push(...projData.projects);
    
    const sel = document.getElementById('project-select');
    projData.projects.slice(0,100).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.emoji + ' ' + p.name;
      sel.appendChild(opt);
    });
    
    sel.addEventListener('change', e => {
      const pid = e.target.value;
      if (pid) renderTimeline(pid, tlData.events);
      else document.getElementById('timeline').innerHTML = '<div class="loading">请选择项目</div>';
    });
  } catch(e) {
    document.getElementById('timeline').innerHTML = '<div class="error">加载失败: '+e.message+'</div>';
  }
}

function renderTimeline(pid, events) {
  const p = projectsData.find(x => x.id === pid);
  if (!p) return;
  
  const projEvents = events.filter(e => e.projectId === pid || e.projectName.includes(p.name));
  
  if (projEvents.length === 0) {
    // 默认时间线
    const defaults = [
      {date:'2026-07-01',title:'立项启动',desc:'项目进入立项阶段',type:'main',localDir:p.localDir},
      {date:'2026-07-10',title:'尽职调查',desc:'开展财务/法律尽调',type:'on',localDir:p.localDir},
      {date:p.last_updated||'2026-07-19',title:'当前状态',desc:p.status,type:p.category==='deal'?'main':'on',localDir:p.localDir}
    ];
    renderEvents(defaults);
  } else {
    renderEvents(projEvents);
  }
}

function renderEvents(evts) {
  let html = '';
  evts.forEach(e => {
    const localDir = e.localDir || `entities/${e.projectName || 'unknown'}.md`;
    html += `<div class="tl-item ${e.type || 'on'}">
      <div class="tl-date">${e.date}</div>
      <div class="tl-title">${e.event || e.title}</div>
      <div class="tl-desc">${e.desc || ''}</div>
      <div class="tl-links">
        ${e.reportUrl?`<a href="${e.reportUrl}" target="_blank" class="tl-link report">📄 报告</a>`:''}
        <a href="project.html?id=${e.projectId}" class="tl-link">📋 详情</a>
      </div>
      <div class="tl-local">📁 本地: <code>~/Documents/tianbao-projects/${localDir}</code></div>
    </div>`;
  });
  document.getElementById('timeline').innerHTML = html;
}

init();
</script>
</body>
</html>
