<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Wiki 知识库 · 实体查看</title>
<script src="assets/particles.js"></script>
<link rel="stylesheet" href="assets/cyber-override.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;position:relative;z-index:2}
body::before,body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0}
body::before{background:radial-gradient(circle at 20% 30%,rgba(0,212,255,0.06),transparent 40%),radial-gradient(circle at 80% 70%,rgba(167,139,250,0.06),transparent 40%)}
body::after{background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,0.012) 3px,rgba(0,212,255,0.012) 6px)}
.content{max-width:640px;background:rgba(12,16,32,0.85);border:1px solid var(--cyber-border);border-radius:16px;padding:48px 40px;backdrop-filter:blur(20px);position:relative;z-index:3}
.content::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--cyber-cyan),transparent);box-shadow:0 0 12px var(--cyber-cyan)}
h1{font-size:32px;font-weight:700;background:linear-gradient(90deg,#fff,var(--cyber-cyan),var(--cyber-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.subtitle{color:var(--cyber-text2);font-size:16px;line-height:1.7;margin-bottom:32px}
.links{display:flex;flex-direction:column;gap:14px}
.links a{display:flex;align-items:center;gap:14px;padding:16px 24px;background:rgba(0,212,255,0.04);border:1px solid var(--cyber-border);border-radius:12px;color:var(--cyber-text);text-decoration:none;font-size:18px;transition:all 0.3s;position:relative;overflow:hidden}
.links a::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--cyber-cyan),var(--cyber-purple));opacity:0.6;transition:opacity 0.3s}
.links a:hover{background:rgba(0,212,255,0.08);border-color:var(--cyber-cyan);transform:translateX(4px);box-shadow:0 0 24px rgba(0,212,255,0.1)}
.links a:hover::before{opacity:1}
.links a .icon{font-size:24px}
.tip{color:var(--cyber-text3);font-size:14px;margin-top:24px;font-family:var(--cyber-mono)}
.badge{display:inline-block;padding:4px 12px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:20px;color:var(--cyber-red);font-size:14px;margin-bottom:20px}
@keyframes pulse-glow{0%,100%{opacity:1}50%{opacity:0.6}}
.badge .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cyber-red);box-shadow:0 0 8px var(--cyber-red);animation:pulse-glow 1.5s infinite;margin-right:8px;vertical-align:middle}
</style>
</head>
<body>
<div class="content">
  <span class="badge"><span class="dot"></span>ENTITY VIEWER — 重定向页</span>
  <h1>✦ Wiki 知识库</h1>
  <p class="subtitle">实体详情查看器。请选择下方入口访问知识库内容：<br>本页面接收来自知识图谱实体列表的跳转链接。</p>
  <div class="links">
    <a href="wiki-index.html"><span class="icon">📚</span><span>Wiki 知识库总览</span></a>
    <a href="kg_viz_v3/index.html"><span class="icon">🌐</span><span>知识图谱可视化 (kg_viz_v3)</span></a>
    <a href="kg.html"><span class="icon">📊</span><span>知识图谱仪表盘</span></a>
    <a href="entities-graph.html"><span class="icon">🕸</span><span>实体关系索引</span></a>
  </div>
  <p class="tip">↳ 实体路径由前端 JS 渲染，跳转前请确认实体文档已存在于知识库中</p>
</div>
</body>
</html>
