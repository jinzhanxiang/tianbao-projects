<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天保控股项目中心</title>
<style>
:root{
  --navy:#06113a;--navy-2:#0d1f5c;--blue:#2563eb;--blue-2:#3b82f6;
  --amber:#f59e0b;--emerald:#10b981;--purple:#7c3aed;--red:#ef4444;
  --bg:#e8edf5;--card:#fff;--text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --border:rgba(15,23,42,.08);--shadow:0 4px 20px -4px rgba(6,17,58,.15)
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);height:100%}
a{text-decoration:none;color:inherit}
/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:16px;font-weight:800}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 14px;border-radius:8px;color:var(--text-2);font-size:14px;transition:.2s}
.nav-links a:hover{background:#f1f5f9}
.nav-links a.active{background:var(--navy);color:#fff}
/* Main */
.main{max-width:1200px;margin:0 auto;padding:40px 24px}
/* Hero */
.hero{text-align:center;margin-bottom:48px}
.hero h1{font-size:32px;font-weight:800;color:var(--navy);margin-bottom:12px}
.hero p{font-size:16px;color:var(--text-2);max-width:600px;margin:0 auto}
/* Entry Grid - 5 cards, no scroll needed */
.entry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1000px;margin:0 auto}
.entry-card{background:var(--card);border-radius:16px;padding:28px 24px;box-shadow:var(--shadow);transition:.3s;cursor:pointer;display:block;text-align:center}
.entry-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px -8px rgba(6,17,58,.25)}
.entry-icon{width:64px;height:64px;border-radius:16px;display:grid;place-items:center;font-size:28px;margin:0 auto 16px;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff}
.entry-card h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--navy)}
.entry-card p{font-size:13px;color:var(--text-2);line-height:1.5}
.entry-card .arrow{font-size:20px;margin-top:12px;color:var(--blue);opacity:0;transition:.2s}
.entry-card:hover .arrow{opacity:1}
/* Row 2: 2 cards centered */
.entry-row-2{grid-column:2;display:contents}
/* Stats */
.stats{display:flex;justify-content:center;gap:48px;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)}
.stat{text-align:center}
.stat b{display:block;font-size:28px;font-weight:800;color:var(--navy)}
.stat span{font-size:12px;color:var(--text-3)}
/* Footer note */
.note{text-align:center;margin-top:40px;font-size:12px;color:var(--text-3)}
/* Mobile */
@media (max-width:768px){
  .entry-grid{grid-template-columns:1fr}
  .stats{gap:24px}
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">天</span>天保控股项目中心</a>
    <div class="nav-links">
      <a href="index.html" class="active">🏠 首页</a>
      <a href="dashboard.html">📊 仪表盘</a>
      <a href="projects.html">📁 项目</a>
      <a href="reports.html">📚 报告库</a>
      <a href="timeline.html">⏱️ 时间线</a>
      <a href="kg.html">🔗 知识图谱</a>
    </div>
  </div>
</nav>

<div class="main">
  <section class="hero">
    <h1>天保控股项目中心</h1>
    <p>投资项目管理平台 · 分层导航 · 动态数据</p>
  </section>

  <div class="entry-grid">
    <a href="dashboard.html" class="entry-card">
      <div class="entry-icon">📊</div>
      <h3>仪表盘</h3>
      <p>项目总览、关键指标<br>快速入口</p>
      <div class="arrow">→</div>
    </a>
    <a href="projects.html" class="entry-card">
      <div class="entry-icon">📁</div>
      <h3>项目列表</h3>
      <p>所有投资项目的<br>分类浏览与筛选</p>
      <div class="arrow">→</div>
    </a>
    <a href="reports.html" class="entry-card">
      <div class="entry-icon">📚</div>
      <h3>报告库</h3>
      <p>所有项目报告的<br>统一入口</p>
      <div class="arrow">→</div>
    </a>
    <a href="detail.html" class="entry-card">
      <div class="entry-icon">📋</div>
      <h3>项目详情</h3>
      <p>单个项目的<br>详细信息与时间线</p>
      <div class="arrow">→</div>
    </a>
    <a href="kg.html" class="entry-card">
      <div class="entry-icon">🔗</div>
      <h3>知识图谱</h3>
      <p>实体关系图<br>可视化分析</p>
      <div class="arrow">→</div>
    </a>
  </div>

  <div class="stats">
    <div class="stat"><b id="proj-count">-</b><span>项目总数</span></div>
    <div class="stat"><b id="deal-count">-</b><span>并购项目</span></div>
    <div class="stat"><b id="np-count">-</b><span>储备项目</span></div>
    <div class="stat"><b id="repo-count">-</b><span>独立仓库</span></div>
  </div>

  <div class="note">数据从 data/projects.json 动态加载 · 更新于 <span id="update-time">-</span></div>
</div>

<script>
async function loadStats() {
  try {
    const resp = await fetch('data/projects.json');
    const data = await resp.json();
    document.getElementById('proj-count').textContent = data.projects.length;
    document.getElementById('deal-count').textContent = data.projects.filter(p => p.category === 'deal').length;
    document.getElementById('np-count').textContent = data.projects.filter(p => p.category === 'np').length;
    document.getElementById('repo-count').textContent = data.external_repos.length;
    document.getElementById('update-time').textContent = new Date(data.metadata.created).toLocaleDateString('zh-CN');
  } catch(e) {
    console.error('Load stats failed:', e);
  }
}
loadStats();
</script>
</body>
</html>
