<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>天保控股项目管理中心 · 首页</title>
<meta name="description" content="天保控股项目管理系统 v3 · 首页 · 行业分布 + 行业最新动态">
<link rel="stylesheet" href="assets/tianbao.css">
<style>
/* ============================================================
 *  天保 v3 DMS · 首页 · skillhub.cn 风格重构
 *  设计目标：浅色玻璃态 + 大字号 + 自然纵向滚动
 * ============================================================ */
:root{
  --sk-bg:#F5F5F7;
  --sk-paper:#FFFFFF;
  --sk-ink:#1d1d1f;
  --sk-ink-2:#3c3c43;
  --sk-ink-3:#747480;
  --sk-line:rgba(0,0,0,0.14);
  --sk-line-strong:rgba(0,0,0,0.18);
  --sk-blue:#0079DD;
  --sk-blue-2:#00519B;
  --sk-blue-3:#6FC9FF;
  --sk-blue-soft:rgba(0,121,221,0.10);
  --sk-blue-softer:rgba(0,121,221,0.06);
  --sk-shadow:0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06);
  --sk-shadow-lg:0 6px 20px rgba(0,121,221,0.18), 0 16px 40px rgba(0,0,0,0.08);
  --sk-radius:22px;
  --sk-radius-sm:14px;
  --sk-radius-pill:980px;
  --sk-glow:0 0 0 4px rgba(0,121,221,0.12), 0 0 24px rgba(0,121,221,0.15);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--sk-bg);
  background-image:
    radial-gradient(ellipse 800px 400px at 10% 0%, rgba(0,121,221,0.06), transparent 60%),
    radial-gradient(ellipse 600px 400px at 90% 30%, rgba(192,57,43,0.04), transparent 60%);
  background-attachment: fixed;
  font-family:'PingFang SC','Outfit',-apple-system,BlinkMacSystemFont,'Helvetica Neue','Source Han Sans SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  font-size:18px;
  color:var(--sk-ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(ellipse 1200px 600px at 50% 100%, rgba(0,121,221,0.05), transparent 70%);
  pointer-events:none;z-index:0;
  animation:bgDrift 24s ease-in-out infinite alternate;
}
@keyframes bgDrift{
  0%{transform:translate(0,0) scale(1);opacity:.6}
  50%{transform:translate(-30px,-20px) scale(1.05);opacity:.9}
  100%{transform:translate(20px,-10px) scale(1.02);opacity:.7}
}

/* === 顶部导航 · 白色玻璃条 === */
.nav{
  background:rgba(255,255,255,0.85)!important;
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--sk-line)!important;
}
.nav-brand>div>div:first-child{
  font-size:40px!important;letter-spacing:-0.5px!important;line-height:1.15!important;
  font-weight:900!important;
  font-family:'PingFang SC','Source Han Sans SC','Noto Sans SC','Microsoft YaHei',sans-serif!important;
  color:#000000!important;
  -webkit-text-fill-color:#000000!important;
  background:none!important;
  -webkit-background-clip:initial!important;background-clip:initial!important;
  animation:titleFadeIn .55s cubic-bezier(.2,.8,.2,1) .12s backwards!important;
}
.nav-brand-sub{font-size:15px!important;font-weight:500!important;letter-spacing:.3px!important;color:var(--sk-ink-2)!important;margin-top:4px!important;animation:subFadeIn .55s cubic-bezier(.2,.8,.2,1) .26s backwards}
.nav-brand-sub .clock{font-size:16px!important;font-weight:700!important;color:var(--sk-blue)!important;font-variant-numeric:tabular-nums}
.nav-logo{width:200px!important;height:200px!important;border-radius:10px!important;background:#ffffff!important;box-shadow:0 2px 8px rgba(0,0,0,0.08)!important;transition:.3s cubic-bezier(.2,.8,.2,1);object-fit:contain;padding:4px;animation:logoFadeIn .6s cubic-bezier(.2,.8,.2,1) backwards}
.nav-brand:hover .nav-logo{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 18px rgba(0,0,0,0.15)!important}
.nav-logo-fallback{display:none;width:200px;height:200px;align-items:center;justify-content:center;background:#ffffff;color:#000;font-size:54px;font-weight:900;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}

@keyframes logoFadeIn{
  0%{opacity:0;transform:scale(.85) translateX(-12px)}
  100%{opacity:1;transform:scale(1) translateX(0)}
}
@keyframes titleFadeIn{
  0%{opacity:0;transform:translateY(18px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes subFadeIn{
  0%{opacity:0;transform:translateY(10px)}
  100%{opacity:1;transform:translateY(0)}
}
.nav-links a, .nav-current{
  font-size:16px!important;font-weight:600!important;
  padding:8px 16px!important;border-radius:var(--sk-radius-pill)!important;
  color:var(--sk-ink-2)!important;letter-spacing:.3px!important;
  transition:.25s cubic-bezier(.2,.8,.2,1);position:relative;
}
.nav-links a:hover{background:var(--sk-blue-soft)!important;color:var(--sk-blue)!important;transform:translateY(-1px)}
.nav-links a::after{content:'';position:absolute;left:50%;bottom:4px;width:0;height:2px;background:var(--sk-blue);border-radius:1px;transition:.3s cubic-bezier(.2,.8,.2,1);transform:translateX(-50%)}
.nav-links a:hover::after{width:24px}
.nav-current{background:var(--sk-blue)!important;color:#fff!important}

/* === 滚动渐入动画 === */
.to-reveal{opacity:0;transform:translateY(28px);transition:opacity .65s cubic-bezier(.2,.8,.2,1), transform .65s cubic-bezier(.2,.8,.2,1);transition-delay:var(--reveal-delay,0ms)}
.to-reveal.is-revealed{opacity:1;transform:translateY(0)}

/* === 主容器 · 允许纵向自然滚动 === */
.v3-home{
  max-width:1320px;margin:0 auto;
  padding:36px 36px 80px;
  position:relative;z-index:1;
  display:flex;flex-direction:column;gap:32px;
  height:auto!important;min-height:0;
  overflow:visible!important;
}

/* === 节标题 === */
.v3-section-h{display:none}  /* 当前未使用 · 保留 ID 时不再渲染 */

/* === 项目概况汇总 · 玻璃卡 === */
.v3-holo{
  background:rgba(255,255,255,0.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border:1.5px solid var(--sk-line)!important;
  border-radius:var(--sk-radius);
  padding:32px 36px;
  box-shadow:var(--sk-shadow);
  display:flex;flex-direction:column;gap:24px;
  position:relative;overflow:visible;
  animation:cardBreathe 6s ease-in-out infinite;
}
@keyframes cardBreathe{
  0%,100%{box-shadow:0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06), 0 0 0 0 rgba(0,121,221,0.0)}
  50%{box-shadow:0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,121,221,0.10)}
}
.v3-holo::before{display:none}
.v3-holo::after{
  content:'';position:absolute;inset:-1px;border-radius:inherit;
  padding:1.5px;
  background:linear-gradient(135deg,rgba(0,121,221,0.0) 0%,rgba(0,121,221,0.35) 25%,rgba(192,57,43,0.30) 50%,rgba(0,121,221,0.35) 75%,rgba(0,121,221,0.0) 100%);
  background-size:300% 300%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:borderShine 8s linear infinite;
  pointer-events:none;
}
@keyframes borderShine{
  0%{background-position:0% 0%}
  100%{background-position:300% 300%}
}

.v3-holo-head{
  display:flex;justify-content:space-between;align-items:baseline;gap:16px;
  padding-bottom:18px;border-bottom:1.5px solid var(--sk-line);
  position:relative;
}
.v3-holo-head h2{
  font-size:28px!important;color:var(--sk-ink);font-weight:800;
  margin:0;letter-spacing:-0.5px;display:flex;align-items:center;gap:12px;line-height:1.2;
}
.v3-holo-head h2::before{
  content:'';width:6px;height:28px;border-radius:3px;
  background:linear-gradient(180deg,var(--sk-blue) 0%,var(--sk-blue-2) 100%);
  box-shadow:0 0 12px rgba(0,121,221,0.4);
}
.v3-holo-head em{
  font-style:normal;font-size:16px;color:var(--sk-ink-3);
  font-weight:600;letter-spacing:.2px;
  display:flex;align-items:center;gap:8px;
}
.v3-holo-head em::before{
  content:'';width:10px;height:10px;border-radius:50%;
  background:var(--sk-blue);box-shadow:0 0 0 4px var(--sk-blue-soft),0 0 12px rgba(0,121,221,0.6);
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{transform:scale(1);opacity:1;box-shadow:0 0 0 4px rgba(0,121,221,0.15),0 0 12px rgba(0,121,221,0.4)}
  50%{transform:scale(1.2);opacity:.85;box-shadow:0 0 0 8px rgba(0,121,221,0.05),0 0 24px rgba(0,121,221,0.6)}
}

.v3-holo-grid{display:flex;flex-direction:column;gap:24px}
.v3-holo-grid-single{grid-template-columns:1fr}

/* === KPI 4 宫格 · 玻璃卡 + 流光 === */
.v3-holo-pulse{
  display:grid;grid-template-columns:repeat(4,1fr);gap:20px;
  padding:0;border:0;margin:0;
}
.v3-holo-stat{
  position:relative;padding:28px 20px 24px;
  text-align:center;border-radius:var(--sk-radius-sm);
  background:var(--sk-paper);
  border:1.5px solid var(--sk-line)!important;
  transition:.4s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;justify-content:center;gap:10px;
  min-height:120px;cursor:default;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
  overflow:hidden;
}
/* 流光：顶部 → 底部扫过 */
.v3-holo-stat::after{
  content:'';position:absolute;left:-20%;right:-20%;top:-50%;height:200%;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,0) 40%,rgba(255,255,255,0.5) 50%,rgba(255,255,255,0) 60%,transparent 70%);
  transform:rotate(20deg) translateY(-100%);
  animation:shimmerDown 4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes shimmerDown{
  0%{transform:rotate(20deg) translateY(-100%)}
  60%,100%{transform:rotate(20deg) translateY(120%)}
}
.v3-holo-stat:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:var(--sk-shadow-lg);
  border-color:var(--hc,var(--sk-blue));
}
.v3-holo-stat-big{
  font-family:'Outfit','SF Pro Display',-apple-system,sans-serif;
  font-size:56px;font-weight:800;
  color:var(--hc,var(--sk-blue));line-height:1;
  letter-spacing:-2px;display:block;
  transition:transform .35s;font-variant-numeric:tabular-nums;
  text-shadow:0 2px 8px rgba(0,121,221,0.12);
}
.v3-holo-stat-big:empty,.v3-holo-stat-big[data-loading="1"]{color:var(--sk-ink-3);opacity:.5;font-weight:500;letter-spacing:0;text-shadow:none}
@keyframes statPulse{0%,100%{opacity:.25}50%{opacity:.5}}
.v3-holo-stat:hover .v3-holo-stat-big{transform:scale(1.08)}
.v3-holo-stat-lbl{
  font-size:15px;color:var(--sk-ink-2);
  font-weight:600;letter-spacing:1.5px;
  margin-top:4px;display:block;
}

/* === 行业分布条形图 · 流光进度 === */
.v3-holo-bars-stage{
  display:flex;flex-direction:column;gap:14px;
  padding:24px 28px;
  background:linear-gradient(135deg,var(--sk-blue-softer) 0%,rgba(0,121,221,0.02) 100%);
  border-radius:var(--sk-radius-sm);
  border:1.5px solid var(--sk-blue-soft);
  position:relative;overflow:hidden;
  min-width:0;
}
.v3-holo-bars-stage::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 0%,rgba(0,121,221,0.10) 50%,transparent 100%);
  background-size:200% 100%;
  animation:bgSweep 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes bgSweep{
  0%,100%{background-position:-100% 0}
  50%{background-position:200% 0}
}
.v3-holo-bars-h{
  font-size:20px;color:var(--sk-ink);font-weight:800;
  letter-spacing:-0.2px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;padding-bottom:14px;
  border-bottom:1.5px solid var(--sk-line);
  position:relative;z-index:1;
}
.v3-holo-bars-h em{
  font-style:normal;font-size:14px;color:var(--sk-ink-3);
  font-weight:600;
}
/* === 行业·项目分布 · v3.9 科幻化卡条形图 === */
/* 主卡 · 整体玻璃质感 */
.v3-bar-row{
  position:relative;
  padding:12px 16px 10px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(255,255,255,.78) 0%,rgba(255,255,255,.42) 100%);
  border:1px solid rgba(0,0,0,.06);
  transition:.28s cubic-bezier(.2,.8,.2,1);
  cursor:pointer;
  overflow:visible;
}
.v3-bar-row:hover{
  background:linear-gradient(135deg,var(--paper) 0%,rgba(255,255,255,.6) 100%);
  transform:translateY(-2px);
  box-shadow:0 10px 28px -6px var(--bc-glow,rgba(0,121,221,.20)),
             0 0 0 1px var(--bc,rgba(0,121,221,.35));
  border-color:var(--bc,rgba(0,121,221,.4));
}
/* HUD 边角支架 [ ] · hover 时浮现 */
.v3-bar-corner{
  position:absolute;width:14px;height:14px;
  opacity:0;transition:opacity .28s ease;
  pointer-events:none;
  border-style:solid;border-color:var(--bc);
}
.v3-bar-row:hover .v3-bar-corner{opacity:1}
.v3-bar-corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-top-left-radius:8px;box-shadow:-1px -1px 6px var(--bc-glow,transparent)}
.v3-bar-corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-top-right-radius:8px;box-shadow:1px -1px 6px var(--bc-glow,transparent)}
.v3-bar-corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-bottom-left-radius:8px;box-shadow:-1px 1px 6px var(--bc-glow,transparent)}
.v3-bar-corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-bottom-right-radius:8px;box-shadow:1px 1px 6px var(--bc-glow,transparent)}

/* 头部行：图标 + 行业名 + ⟨ 计数 ⟩ */
.v3-bar-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:9px;
}
.v3-bar-icon{font-size:16px;line-height:1}
.v3-bar-nm{
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-size:15px;font-weight:700;letter-spacing:.3px;
  color:var(--sk-ink);
}
.v3-bar-cnt{
  font-family:'Outfit','JetBrains Mono',ui-monospace,monospace;
  font-weight:800;font-size:13px;letter-spacing:.5px;
  color:var(--bc,var(--sk-blue));
  padding:0 2px;
  display:inline-flex;align-items:baseline;gap:1px;
}
.v3-bar-cnt::before{content:'⟨';opacity:.45;margin-right:3px;font-weight:400}
.v3-bar-cnt::after {content:'⟩';opacity:.45;margin-left:3px;font-weight:400}
.v3-bar-cnt b{font-size:18px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.v3-bar-cnt small{font-size:9px;opacity:.7;font-weight:600;margin-left:1px}

/* 进度条轨道 */
.v3-bar-track{
  position:relative;height:18px;
  background:rgba(0,0,0,.045);border-radius:9px;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.06);
  overflow:visible;
}
.v3-bar-fill{
  position:relative;height:100%;width:0;
  background:linear-gradient(90deg,var(--bc,var(--sk-blue)),var(--bc-2,var(--sk-blue-3)));
  border-radius:9px;
  transition:width 1.2s cubic-bezier(.4,.2,.2,1);
  box-shadow:0 0 14px var(--bc-glow,rgba(0,121,221,.40));
  overflow:visible;
}
/* 流光扫描 */
.v3-bar-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.55) 50%,transparent 100%);
  background-size:200% 100%;
  animation:flowRight 2.2s linear infinite;
  border-radius:9px;
}
@keyframes flowRight{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
/* 末端脉冲光点 */
.v3-bar-cap{
  position:absolute;right:-5px;top:50%;
  width:10px;height:10px;border-radius:50%;
  background:var(--bc,var(--sk-blue));
  box-shadow:0 0 12px var(--bc,var(--sk-blue)),
             0 0 22px var(--bc-glow,rgba(0,121,221,.4));
  animation:pulseCap 1.8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes pulseCap{
  0%,100%{transform:translateY(-50%) scale(1);opacity:1}
  50%{transform:translateY(-50%) scale(1.55);opacity:.7}
}

/* 企业标签 · stagger fade-in */
.v3-bar-tags{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:8px;
}
.v3-bar-tag{
  font-size:11px;font-weight:600;
  padding:3px 10px 3px 8px;
  background:rgba(255,255,255,.65);
  border:1px solid rgba(0,0,0,.08);
  border-radius:999px;
  color:var(--sk-ink-2);
  display:inline-flex;align-items:center;gap:5px;
  opacity:0;transform:translateY(4px);
  animation:tagFadeIn .55s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay:calc(var(--i,0) * 100ms + 700ms);
  transition:.22s ease;
  cursor:pointer;
  position:relative;
  text-decoration:none;
}
.v3-bar-tag:hover{
  background:var(--bc,var(--sk-blue));
  color:#fff;
  border-color:var(--bc,var(--sk-blue));
  box-shadow:0 4px 12px var(--bc-glow,rgba(0,121,221,.45));
  transform:translateY(-1px);
}
.v3-bar-tag-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--bc,var(--sk-blue));
  box-shadow:0 0 4px var(--bc-glow,rgba(0,121,221,.5));
  flex-shrink:0;
}
.v3-bar-tag-more{
  font-size:10px;color:var(--sk-ink-3);font-weight:700;
  padding:3px 9px;border-radius:999px;
  background:rgba(0,0,0,.045);
  opacity:0;
  animation:tagFadeIn .55s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay:calc(3 * 100ms + 700ms);
}
@keyframes tagFadeIn{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}

/* 数字翻滚 · count glitch（首次出现时） */
@keyframes countGlitch{
  0%  {transform:translateY(-3px);opacity:0;filter:blur(2px)}
  60% {transform:translateY(1px);opacity:1;filter:blur(0)}
  100%{transform:translateY(0);opacity:1}
}
.v3-bar-cnt b{animation:countGlitch .5s cubic-bezier(.2,.8,.2,1) backwards;animation-delay:calc(var(--i,0) * 90ms)}

/* 兼容旧版条形图 · 仅在 markup 仍使用 .nm/.bar/.cnt 时生效 */
.v3-holo-bar-row{
  display:grid;grid-template-columns:140px 1fr 60px;
  gap:18px;align-items:center;
  font-size:17px;color:var(--sk-ink-2);
  font-weight:600;line-height:1.4;
  padding:10px 12px;border-radius:10px;
  transition:.25s cubic-bezier(.2,.8,.2,1);
  cursor:pointer;position:relative;z-index:1;
}
.v3-holo-bar-row:hover{background:var(--sk-paper);transform:translateX(4px);box-shadow:0 4px 14px rgba(0,121,221,0.10)}
.v3-holo-bar-row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:17px;font-weight:700;letter-spacing:.2px;color:var(--sk-ink)}
.v3-holo-bar-row .bar{position:relative;height:14px;background:rgba(0,0,0,0.06);border-radius:7px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.06)}
.v3-holo-bar-row .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--bc,var(--sk-blue)),var(--bc-2,var(--sk-blue-3)));border-radius:7px;width:0;transition:width 1.2s cubic-bezier(.4,.2,.2,1);position:relative;box-shadow:0 0 12px var(--bc-glow,rgba(0,121,221,0.4));overflow:hidden}
.v3-holo-bar-row .bar i::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.4) 50%,transparent 100%);background-size:200% 100%;animation:flowRight 2s linear infinite}

.v3-entry-title{

.v3-entry-count{

.v3-entry-arrow{

/* === 行业词云 · 筛选条 === */
.v3-cloud-strip{

.v3-cloud-strip .lbl{

.v3-cloud-tag{

}

.v3-cloud-empty{padding:12px 16px;color:var(--sk-ink-3);font-size:15px}

/* === 统一事件流 · 玻璃卡 === */
.v3-feed{
  background:rgba(255,255,255,0.85);
  backdrop-filter:saturate(180%) blur(20px);

  min-width:0;min-height:auto;
  box-shadow:var(--sk-shadow);
  position:relative;overflow:visible;
}
.v3-feed::before{display:none}
.v3-feed-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;padding-bottom:18px;

}
.v3-feed-head h2{

}
.v3-feed-head h2::before{

  border-radius:3px;
}
.v3-feed-head small{
  margin-left:auto;font-size:15px;color:var(--sk-ink-3);

}
.v3-feed-head small::before{
  content:'';width:8px;height:8px;border-radius:50%;

  animation:dotPulse 2s ease-in-out infinite;
}
.v3-feed-toggle{
  margin-left:8px;width:40px;height:40px;
  border-radius:12px;background:var(--sk-bg);
  border:1px solid var(--sk-line);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  color:var(--sk-ink-2);transition:.2s;font-size:18px;line-height:1;flex-shrink:0;
}
.v3-feed-toggle:hover{
  background:var(--sk-blue);color:#fff;border-color:var(--sk-blue);
  transform:rotate(90deg);
}
.v3-feed-toggle .ico-scroll{display:none}
.v3-feed-toggle[data-mode="scroll"] .ico-static{display:none}
.v3-feed-toggle[data-mode="scroll"] .ico-scroll{display:inline}

.v3-marquee{
  position:relative;flex:0 0 auto;min-height:0;
  overflow:hidden;max-height:560px;
  -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 4%,#000 96%,transparent 100%);
  mask-image:linear-gradient(180deg,transparent 0,#000 4%,#000 96%,transparent 100%);
}
.v3-marquee-track{
  display:flex;flex-direction:column;gap:12px;
  animation:marqueePingPong var(--dur,60s) ease-in-out infinite alternate;will-change:transform;
}
.v3-marquee:hover .v3-marquee-track{animation-play-state:paused}
.v3-marquee.no-scroll .v3-marquee-track{animation:none}
/* 上下往返滚动（R179）：向上滚到顶部 → 反向滑回底部 → 反复 */
@keyframes marqueePingPong{
  0%  {transform:translateY(0)}
  100%{transform:translateY(var(--marquee-shift, -50%))}
}

.v3-feed-card{
  display:flex;flex-direction:column;gap:8px;
  background:var(--sk-paper);
  border:1px solid var(--sk-line);
  border-left:4px solid var(--feed-color,var(--sk-blue));

  position:relative;overflow:hidden;
}
.v3-feed-card::after{display:none}

  background:var(--sk-blue-softer);
  border-left-width:5px;border-color:var(--sk-blue);

}

.v3-feed-tag{

}
.v3-feed-title{
  font-size:18px;color:var(--sk-ink);font-weight:700;
  line-height:1.55;letter-spacing:.2px;

  transition:color .25s;
}
.v3-feed-card:hover .v3-feed-title{color:var(--sk-blue)}
.v3-feed-sub{
  font-size:14px;color:var(--sk-ink-3);font-weight:500;

  display:flex;align-items:center;gap:6px;
}
.v3-feed-empty{
  padding:60px 20px;text-align:center;
  color:var(--sk-ink-3);font-size:16px;
}

.v3-loading{padding:60px;text-align:center;color:var(--sk-ink-3);font-size:16px}
.v3-loading::before{
  content:'';display:inline-block;width:18px;height:18px;
  border:2px solid var(--sk-line);border-top-color:var(--sk-blue);
  border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;vertical-align:-3px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* === 入场动画 === */
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.v3-holo,.v3-entry,.v3-feed,.v3-cloud-strip{

}

      <div class="v3-entry-meta" id="metaP1">载入中...</div>
      <div class="v3-entry-arrow">进入 →</div>
    </a>
    <a class="v3-entry" href="page.html?view=cat&cat=观察" id="entryP2" style="--cat-color:#5A6B7D;--cat-color-2:#8A9AAB">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="v3-entry-row1">
        <div class="v3-entry-icon">🔭</div>
        <div class="v3-entry-title">观察</div>
        <div class="v3-entry-count" data-count="0"><span id="cntP2N">0</span><small>项</small></div>
      </div>
      <div class="v3-entry-meta" id="metaP2">载入中...</div>
      <div class="v3-entry-arrow">进入 →</div>
    </a>
  </div>

  <!-- 行业分布 · 筛选条（点击标签联动下方统一事件流） -->
  <div class="v3-cloud-strip v3-hud">
    <span class="lbl">行业分布</span>
    <div class="v3-cloud-tags" id="cloudTags">
      <div class="v3-cloud-empty">载入中...</div>
    </div>
  </div>

  <!-- 统一事件流：行业动态 + 近期报告 按日期合并排序 -->
  <div class="v3-feed v3-hud v3-corner" style="--feed-color:#0079DD">
    <div class="v3-feed-head">
      <h2>📡 统一事件流 · 行业动态 + 近期报告</h2>
      <small><span id="unifiedIndLabel">全部行业 · 倒序 ·</span> <span id="unifiedTotal">0</span> 项 <span id="unifiedReportLabel" style="color:var(--seal);font-weight:700"></span></small>
      <button class="v3-feed-toggle" id="unifiedToggle" type="button" title="切换滚动/静态" data-mode="scroll">
        <span class="ico-static">⊟</span><span class="ico-scroll">↕</span>
      </button>
    </div>
    <div class="v3-marquee" id="unifiedMarquee">
      <div class="v3-marquee-track" id="unifiedTrack">
        <div class="v3-feed-empty">载入中...</div>
      </div>
    </div>
  </div>

</div>

<script src="assets/dnd.js"></script>
<script src="assets/cmdK.js"></script>
<script>
/* ==============================
 * 首页 v3 渲染器 · 视觉重设计版
 * ============================== */
(function(){
  'use strict';

  let PROJECTS = [];
  let REPORTS = [];
  let NEWS = [];
  let NEWS_BY_IND = {};
  let SELECTED_INDUSTRY = '__ALL__';

  function legacyRedirect(){
    const u = new URLSearchParams(location.search);
    const view = u.get('view');
    const cat = u.get('cat');
    const code = u.get('code');
    if (view === 'cat' && cat) {
      location.replace('page.html?' + u.toString());
      return true;
    }
    if (view === 'proj' && code) {
      location.replace('detail.html?code=' + encodeURIComponent(code));
      return true;
    }
    return false;
  }

  function v2to3Cat(cat){
    const map = {
      'deal': '在推重点','np': '储备','p': '储备',
      'kg': '观察','hub': '观察','course': '观察',
    };
    return map[cat] || '在推重点';
  }

  async function loadData(){
    const meta = document.getElementById('holoMeta');
    const setMeta = (html) => { if(meta) meta.innerHTML = html; };

    /* R170: 3 次重试 + 指数退避（800ms / 1600ms / 3200ms） */
    const fetchOnce = async (url) => {
      let lastErr;
      for(let attempt=1; attempt<=3; attempt++){
        try {
          const res = await fetch(url + '?v=' + Date.now(), {cache:'no-store'});
          if(!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch(e){
          lastErr = e;
          if(attempt < 3) await new Promise(r => setTimeout(r, 800 * Math.pow(2, attempt-1)));
        }
      }
      throw lastErr;
    };

    try {
      setMeta('<span style="color:var(--ink-3)">⏳ 加载中...</span>');
      const [p, r, n, pn] = await Promise.all([
        fetchOnce('data/projects.json'),
        fetchOnce('data/reports.json'),
        fetchOnce('data/industry_news.json'),
        fetchOnce('data/project_news.json').catch(()=>null),  /* 每日自动抓取的公司新闻 · 缺失不阻断 */
      ]);
      const _allProjects = (p && p.projects) || [];
      const _archived = _allProjects.filter(x=>x.archived);
      /* 过滤掉 archived（仅底库留存，不入矩阵/顶部KPI） */
      PROJECTS = _allProjects.filter(x=>!x.archived);
      REPORTS = (r && r.by_code) || {};
      /* 隔离区过滤：跳过推量方案/外围创新/成交量交付类研究 + 未归类报告
         quarantine_codes 名单在 reports.json 顶层定义，集中维护 */
      const _qc = (r && r.quarantine_codes) || [];
      if(_qc.length){
        const _before = Object.values(REPORTS).flat().length;
        _qc.forEach(c => { delete REPORTS[c]; });
        const _after = Object.values(REPORTS).flat().length;
        if(_before !== _after) console.log(`[v3] 隔离区已过滤 ${_before-_after} 份报告 · 名单:`, _qc);
      }
      window.ALL_PROJECTS = _allProjects;
      window.ARCHIVED = _archived;
      const newsRaw = n || {};
      NEWS_BY_IND = newsRaw.industries || {};
      NEWS = [];
      Object.entries(NEWS_BY_IND).forEach(([ind, items])=>{
        items.forEach(it=>NEWS.push({...it, industry:ind}));
      });
      /* 合并「每日自动抓取的公司新闻」project_news.json → 按行业并入事件流 */
      const projNews = (pn && pn.items) || [];
      projNews.forEach(it=>{
        const ind = it.industry || '资讯';
        const norm = {
          title: it.title, url: it.url, date: it.date,
          source: it.company || it.source, summary: it.summary || '',
          industry: ind, company: it.company || '', _auto: true,
        };
        NEWS.push(norm);
        (NEWS_BY_IND[ind] = NEWS_BY_IND[ind] || []).push(norm);
      });
      const autoNote = projNews.length ? ' · <b>'+projNews.length+'</b> 自动资讯' : '';
      setMeta('<b>'+PROJECTS.length+'</b> 项目 · <b>'+(Object.values(REPORTS).flat().length)+'</b> 报告 · <b>'+Object.keys(NEWS_BY_IND).length+'</b> 行业'+autoNote);
    } catch(e){
      console.error('数据加载失败（已重试 3 次）', e);
      setMeta('<span style="color:#E53E3E;cursor:pointer" id="retryBtn">⚠️ 加载失败 · 点击重试</span>');
      const retryBtn = document.getElementById('retryBtn');
      if(retryBtn) retryBtn.addEventListener('click', ()=>{ loadData(); });
      PROJECTS = []; REPORTS = {}; NEWS = []; NEWS_BY_IND = {};
    }
    window.PROJECTS = PROJECTS;
    window.REPORTS = REPORTS;
    if(window.cmdK) window.cmdK.rebuildIndex();
    renderAll();
  }

  /* ---------- KPI · 可视化 ---------- */
  const STAGE_COLORS = {'在推重点':'#C0392B','储备':'#1565C0','观察':'#6B7280'};
  const CAT_PALETTE = ['#1565C0','#C0392B','#0D8050','var(--seal)','#E67E22','#0EA5E9','#DC2626','#0891B2','#7C2D12','#1E3A8A','#166534','#B45309','#6D28D9','#BE185D'];

  function renderKPI(){
    /* ===== 数据计算 ===== */
    const allReports = Object.values(REPORTS).flat();
    const totalR = allReports.length;

    /* 行业（主+细分） */
    const mainIndMap = new Map();
    const subIndMap = new Map();
    PROJECTS.forEach(p=>{
      const inds = (p.industry||'').split(/[·\/ ]+/).map(t=>t.trim()).filter(Boolean);
      if(inds.length) mainIndMap.set(inds[0], (mainIndMap.get(inds[0])||0)+1);
      inds.forEach(t=>{ if(t!==inds[0]) subIndMap.set(t, (subIndMap.get(t)||0)+1); });
    });
    const industries = [...mainIndMap.entries()].sort((a,b)=>b[1]-a[1]);

    /* 平均进度（在推项目） */
    const activeProjects = PROJECTS.filter(p=>p.stage_v3==='在推重点');
    const avgProgress = activeProjects.length?
      Math.round(activeProjects.reduce((s,p)=>s+(p.progress_pct||0),0) / activeProjects.length) : 0;

    /* ===== 时间戳 ===== */
    const ts = new Date();
    const pad = n=>String(n).padStart(2,'0');
    const stamp = `${pad(ts.getHours())}:${pad(ts.getMinutes())}`;

    /* ===== 1. 顶部 4-指标数据条 ===== */
    const _archivedCnt = (window.ARCHIVED || []).length;
    document.getElementById('holoProjects').setAttribute('data-counter-up', PROJECTS.length);
    document.getElementById('holoProjects').setAttribute('data-archived-count', _archivedCnt);
    document.getElementById('holoReports').setAttribute('data-counter-up', totalR);
    document.getElementById('holoInds').setAttribute('data-counter-up', industries.length);
    document.getElementById('holoProgress').setAttribute('data-counter-up', avgProgress);

    /* ===== 2. 行业分布条形图（v3.8 单列全宽，去掉阶段汇总） ===== */
    const IND_PALETTE = ['var(--seal)','var(--gold)','#C0392B','#1565C0','#0EA5E9','#0D8050','#DC2626','#E67E22','#0891B2','#BE185D','#1E3A8A','#B45309'];

    /* ===== 3. 行业分布条形图（右侧主舞台）v3.9 科幻化卡条形图 ===== */
    /* 同时构建「行业 → 企业清单」用于在卡上标注具体公司名 */
    const mainIndCompanies = new Map();
    PROJECTS.forEach(p=>{
      const inds = (p.industry||'').split(/[·\/ ]+/).map(t=>t.trim()).filter(Boolean);
      if(!inds.length) return;
      const main = inds[0];
      if(!mainIndCompanies.has(main)) mainIndCompanies.set(main, []);
      mainIndCompanies.get(main).push({code: p.code, name_cn: p.name_cn, iss: p.iss});
    });
    const topN = Math.min(6, industries.length);
    const barsListEl = document.getElementById('holoBarsList');
    const maxN = Math.max(1, ...industries.slice(0, topN).map(([_,c])=>c));
    function indEmoji(name){
      const n = name || '';
      if(n.includes('电池')||n.includes('锂')) return '🔋';
      if(n.includes('医疗')||n.includes('健康')) return '🏥';
      if(n.includes('芯片')||n.includes('半导体')) return '💎';
      if(n.includes('航天')||n.includes('遥感')) return '🛰️';
      if(n.includes('数据')||n.includes('云')||n.includes('IDC')) return '🖥️';
      if(n.includes('智能体')||n.includes('AI')) return '🧠';
      if(n.includes('碳')||n.includes('材料')||n.includes('化工')) return '🧪';
      if(n.includes('稀土')||n.includes('矿产')) return '⛏️';
      if(n.includes('电源')||n.includes('电驱')||n.includes('电')) return '⚡';
      if(n.includes('基建')||n.includes('建设')) return '🏗️';
      if(n.includes('汽车')) return '🚗';
      if(n.includes('换电')) return '🔌';
      if(n.includes('智慧能源')||n.includes('综合能源')) return '🌱';
      if(n.includes('光电')||n.includes('光能')) return '💡';
      if(n.includes('IVD')||n.includes('诊断')) return '🧬';
      return '🏢';
    }
    function escHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    barsListEl.innerHTML = industries.slice(0, topN).map(([n,c], i)=>{
      const col = IND_PALETTE[i % IND_PALETTE.length];
      const col2 = IND_PALETTE[(i+1) % IND_PALETTE.length];
      const glow = col.match(/var\((--[\w-]+)\)/) ? `var(${col.match(/var\((--[\w-]+)\)/)[1]}-soft, transparent)` : col + '55';
      const w = (c / maxN * 100).toFixed(1);
      const cos = mainIndCompanies.get(n) || [];
      const emoji = indEmoji(n);
      const visibleTags = cos.slice(0, 4);
      const more = cos.length - visibleTags.length;
      const tagsHtml = visibleTags.map((co, j) =>
        `<a class="v3-bar-tag" style="--i:${j}" href="detail.html?code=${encodeURIComponent(co.code)}" title="查看 ${escHtml(co.name_cn)} 详情" onclick="event.stopPropagation()">
          <span class="v3-bar-tag-dot"></span>${escHtml(co.name_cn)}
        </a>`
      ).join('') + (more > 0 ? `<span class="v3-bar-tag-more">+${more}</span>` : '');
      return `<div class="v3-bar-row" style="--i:${i};--bc:${col};--bc-2:${col2};--bc-glow:${glow}" data-industry="${escHtml(n)}">
        <span class="v3-bar-corner tl"></span>
        <span class="v3-bar-corner tr"></span>
        <span class="v3-bar-corner bl"></span>
        <span class="v3-bar-corner br"></span>
        <div class="v3-bar-head">
          <span class="v3-bar-icon">${emoji}</span>
          <span class="v3-bar-nm">${escHtml(n)}</span>
          <span class="v3-bar-cnt" style="--i:${i}"><b>${c}</b><small>项</small></span>
        </div>
        <div class="v3-bar-track">
          <div class="v3-bar-fill" style="width:${w}%">
            <span class="v3-bar-cap"></span>
          </div>
        </div>
        <div class="v3-bar-tags">${tagsHtml}</div>
      </div>`;
    }).join('');
    document.getElementById('holoBarsTotal').textContent = `Top ${topN} · ${industries.length} 行业 · 已标注 ${Array.from(mainIndCompanies.values()).reduce((s,v)=>s+v.length,0)} 家企业`;

    /* === 条形图点击 · 联动 CLOUD 筛选 + 统一事件流 === */
    barsListEl.querySelectorAll('.v3-bar-row, .v3-holo-bar-row').forEach(row=>{
      row.style.cursor = 'pointer';
      row.addEventListener('click',(e)=>{
        /* 企业标签点击：自己处理跳转，不触发卡条 click */
        if(e.target.closest('.v3-bar-tag')) return;
        const nm = (row.dataset.industry || row.querySelector('.v3-bar-nm')?.textContent || row.querySelector('.nm')?.textContent || '').trim();
        if(!nm) return;
        SELECTED_INDUSTRY = nm;
        renderCloud();
        renderUnified();
        /* 视觉反馈：滚动到事件流并临时高亮 */
        const feed = document.getElementById('unifiedTrack');
        if(feed){
          feed.scrollIntoView({behavior:'smooth', block:'center'});
          feed.style.transition = 'outline .3s';
          feed.style.outline = '2px solid var(--seal)';
          setTimeout(()=>{ feed.style.outline = 'none'; }, 1200);
        }
      });
    });

    /* ===== 头部状态栏 · 数据快照（由 loadData 统一管理 · 此处不再覆盖） ===== */
    /* 仅在数据非空时刷新，确保 loadData 中的"加载中/重试"提示不被覆盖 */
    if(PROJECTS.length > 0){
      /* 底库项目不入 UI · 不显示 "底库 N 个" 注脚 */
      document.getElementById('holoMeta').innerHTML =
        `<b>${PROJECTS.length}</b> 项目 · <b>${totalR}</b> 报告 · <b>${industries.length}</b> 行业`;
    }

    /* === 3 类入口 === */
    renderEntries();

    /* 触发计数器动画 */
    if(window.cmdK) window.cmdK.counterUpAll();
  }

  /* v3.8: stages row entrance 已废弃 · 移除 */
  (function(){
    if(document.getElementById('holoAnimStyle')) return;
    const s = document.createElement('style');
    s.id = 'holoAnimStyle';
    s.textContent = `
      @keyframes barRowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
      .v3-holo-bar-row{animation:barRowIn .4s cubic-bezier(.2,.8,.2,1) backwards}
    `;
    document.head.appendChild(s);
  })();

  function renderEntries(){
    const groups = ['在推重点','储备','观察'];
    groups.forEach((s, gi)=>{
      const ps = PROJECTS.filter(p=>p.stage_v3===s);
      const cntN = ps.length;
      document.getElementById('cntP'+gi+'N').textContent = cntN;
      /* 同步 data-count 给辉光层 */
      const cntHost = document.querySelector('#entryP'+gi+' .v3-entry-count');
      if(cntHost) cntHost.setAttribute('data-count', String(cntN));

      /* 进度估算（按当前 stage + 平均 progress_pct） */
      let pct;
      if(s==='在推重点'){
        pct = Math.min(100, Math.round(ps.reduce((sum,p)=>sum+(p.progress_pct||0),0) / Math.max(1, ps.length)));
      } else if(s==='储备'){
        pct = Math.min(100, Math.round(ps.reduce((sum,p)=>sum+((p.progress_pct||10)*0.7+15),0) / Math.max(1, ps.length)));
      } else {
        pct = Math.min(100, Math.round(ps.reduce((sum,p)=>sum+((p.progress_pct||5)*0.4+5),0) / Math.max(1, ps.length)));
      }

      /* 每个类别的简明 meta：进度% + 子统计 + Top 行业 */
      let subPart = '';
      if(gi===0){
        const l = ps.filter(p=>(p.progress_pct||0)>=30).length;
        const d = ps.filter(p=>(p.progress_pct||0)>=60).length;
        subPart = `<b>${l}</b>立项 <span class="sep">·</span> <b>${d}</b>已尽调`;
      } else if(gi===1){
        const u = ps.filter(p=>!p.iss || p.iss==='未上市' || (p.iss||'').includes('未')).length;
        subPart = `<b>${u}</b>未上市 <span class="sep">·</span> <b>${cntN-u}</b>上市/REITs`;
      } else {
        const short = ps.filter(p=>(p.progress_pct||0)<20).length;
        const mid   = ps.filter(p=>(p.progress_pct||0)>=20 && (p.progress_pct||0)<50).length;
        subPart = `<b>${short}</b>短链 <span class="sep">·</span> <b>${mid}</b>中链`;
      }

      /* Top 行业 chips 内联 */
      const indMap = new Map();
      ps.forEach(p=>{
        const main = (p.industry||'').split('·')[0].trim();
        if(main) indMap.set(main, (indMap.get(main)||0)+1);
      });
      const topInds = [...indMap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3);
      const chipPart = topInds.map(([n,c],i)=>
        `<span class="ind-chip"><i style="width:6px;height:6px;background:${CAT_PALETTE[i%CAT_PALETTE.length]};display:inline-block;border-radius:1px"></i>${n}<b>${c}</b></span>`
      ).join('') || '<span class="ind-chip" style="opacity:.5">—</span>';

      const metaHost = document.getElementById('metaP'+gi);
      if(metaHost){
        metaHost.innerHTML = `📊 ${pct}% <span class="sep">·</span> ${subPart} <span class="sep">·</span> ${chipPart}`;
      }
    });
  }

  /* ---------- 行业词云 ---------- */
  function aggregateIndustries(){
    const map = {};
    PROJECTS.forEach(p=>{
      const main = p.industry.split('·')[0].trim();
      if(!main) return;
      if(!map[main]) map[main] = {count:0, reports:0, samples:[]};
      map[main].count++;
      const rc = (REPORTS[p.code]||[]).length;
      map[main].reports += rc;
      if(map[main].samples.length<3) map[main].samples.push(p.name_cn);
    });
    return map;
  }
  function renderCloud(){
    const map = aggregateIndustries();
    const items = Object.entries(map).map(([k,v])=>({name:k,...v}));
    items.sort((a,b)=>b.count-a.count);
    const host = document.getElementById('cloudTags');
    if(!items.length){
      host.innerHTML = '<div class="v3-cloud-empty">暂无行业数据</div>';
      return;
    }
    const max = items[0].count;
    host.innerHTML = `
      <span class="v3-cloud-tag v3-cloud-tag-cloud${SELECTED_INDUSTRY==='__ALL__'?' active':''}" data-ind="__ALL__">
        全部行业 <span class="count">${items.length}</span>
      </span>
      ${items.map(it=>{
        return `<span class="v3-cloud-tag${SELECTED_INDUSTRY===it.name?' active':''}" data-ind="${it.name}">
          ${it.name} <span class="count">${it.count}</span>
        </span>`;
      }).join('')}
    `;
    host.querySelectorAll('.v3-cloud-tag').forEach(el=>{
      el.addEventListener('click',()=>{
        SELECTED_INDUSTRY = el.dataset.ind;
        renderCloud();
        renderUnified();
      });
    });
  }

  /* ---------- 行业动态 ---------- */
  function newsForIndustry(){
    let pool;
    if(SELECTED_INDUSTRY==='__ALL__'){
      pool = NEWS;
    } else {
      const keys = Object.keys(NEWS_BY_IND);
      const tokens = new Set([SELECTED_INDUSTRY]);
      PROJECTS.forEach(p=>{
        if((p.industry||'').split('·')[0].trim() === SELECTED_INDUSTRY){
          (p.industry||'').split(/[·\/ ]+/).forEach(t=>{ t=t.trim(); if(t) tokens.add(t); });
        }
      });
      const share2 = (a,b)=>{ for(let i=0;i+2<=a.length;i++){ if(b.includes(a.slice(i,i+2))) return true; } return false; };
      const matchedKeys = keys.filter(k=>{
        for(const t of tokens){ if(k===t || k.includes(t) || t.includes(k) || share2(t,k)) return true; }
        return false;
      });
      if(!matchedKeys.length) return [];
      pool = [];
      const seen = new Set();
      matchedKeys.forEach(k=>{
        NEWS_BY_IND[k].forEach(n=>{
          const id = (n.title||'')+'|'+(n.date||'');
          if(seen.has(id)) return; seen.add(id);
          pool.push({...n, industry:k});
        });
      });
    }
    /* 过滤占位新闻（_placeholder：无链接的"待补充"条目，仅在无真实新闻时兜底提示）
       排序：真实带链接新闻优先，再按日期倒序，截前 10 条 · 含每日自动抓取的公司新闻 */
    let real = pool.filter(n => !n._placeholder);
    if(!real.length) real = pool;  /* 该行业确实只有占位 → 保留以提示"待补充" */
    return real.slice().sort((a,b)=>{
      const ua = a.url ? 1 : 0, ub = b.url ? 1 : 0;
      if(ua !== ub) return ub - ua;                 /* 有链接的真实新闻优先 */
      return (b.date||'').localeCompare(a.date||'');/* 再按日期倒序 */
    }).slice(0, 10);
  }

  function setMarquee(marqueeId, trackId, count){
    const mq = document.getElementById(marqueeId);
    const track = document.getElementById(trackId);
    if(!mq || !track) return;
    requestAnimationFrame(()=>{
      const full = track.scrollHeight;
      const oneCopy = count > 0 ? full / 2 : full;
      const mode = (typeof UNIFIED_MODE !== 'undefined') ? UNIFIED_MODE : 'static';
      if(count <= 0 || oneCopy <= mq.clientHeight + 4 || mode === 'static'){
        mq.classList.add('no-scroll');
        track.style.removeProperty('--dur');
        track.style.removeProperty('--marquee-shift');
      } else {
        mq.classList.remove('no-scroll');
        /* 上下往返：up 半程 + down 半程 = 2 × --dur 全周期
           速度：每像素 28ms · 半程（oneCopy）耗时 oneCopy/28 秒 */
        const dur = Math.max(20, Math.round(oneCopy / 28));
        track.style.setProperty('--dur', dur + 's');
        track.style.setProperty('--marquee-shift', '-50%');
      }
    });
  }

  /* R170/R179: marquee 静态/动态模式切换 · 默认滚动（上下往返 · 让全部内容循环可见） */
  let UNIFIED_MODE = 'scroll';
  function bindToggle(){
    const btn = document.getElementById('unifiedToggle');
    if(!btn) return;
    btn.setAttribute('data-mode', UNIFIED_MODE);
    btn.title = UNIFIED_MODE === 'static' ? '当前：滚动 · 点击切换静态' : '当前：静态 · 点击切换滚动';
    btn.addEventListener('click', ()=>{
      UNIFIED_MODE = UNIFIED_MODE === 'scroll' ? 'static' : 'scroll';
      btn.setAttribute('data-mode', UNIFIED_MODE);
      btn.title = UNIFIED_MODE === 'static' ? '当前：静态 · 点击切换滚动' : '当前：滚动 · 点击切换静态';
      renderUnified();
    });
  }

  function tick(){
    const d=new Date();
    const pad=n=>String(n).padStart(2,'0');
    document.getElementById('navClock').textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    document.getElementById('navDate').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }

  function collectRecentReports(){
    const all = [];
    Object.entries(REPORTS).forEach(([code, list])=>{
      list.forEach(r=>all.push({...r, code}));
    });
    all.sort((a,b)=>b.date.localeCompare(a.date));
    /* 若选中了行业，则只保留该项目行业匹配的报告 */
    let filtered = all;
    let limit = 6;
    if(SELECTED_INDUSTRY && SELECTED_INDUSTRY !== '__ALL__'){
      filtered = all.filter(r=>{
        const proj = PROJECTS.find(p=>p.code===r.code);
        if(!proj) return false;
        const tokens = (proj.industry||'').split(/[·\/ ]+/).map(t=>t.trim()).filter(Boolean);
        return tokens.includes(SELECTED_INDUSTRY);
      });
      limit = 10;  // 筛选时放宽上限，让差异可见
    }
    return {list: filtered.slice(0, limit), total: filtered.length};
  }

  function resolveReportUrl(report){
    return window.cmdK ? window.cmdK.resolveReportUrl(report, report.code) : ('detail.html?code=' + encodeURIComponent(report.code) + '#secReports');
  }

  const RESTRICTED_SOURCE_HOSTS = ['cers.org.cn', 'omdia.com', 'came-online.org'];
  function isRestrictedSource(url){
    try { return RESTRICTED_SOURCE_HOSTS.some(host => new URL(url, location.href).hostname.includes(host)); }
    catch(e){ return false; }
  }

  /* === 统一事件流 · 行业动态 + 近期报告 按日期合并排序 === */
  function renderUnified(){
    const track = document.getElementById('unifiedTrack');
    const lbl = document.getElementById('unifiedIndLabel');
    const totalEl = document.getElementById('unifiedTotal');
    if(!track || !lbl || !totalEl) return;

    const news = newsForIndustry();
    const {list: reports} = collectRecentReports();

    /* R179: 各自按日期倒序，再按 kind 交替合并（报告不再被挤到底部） */
    const newsSorted = news.map(n => ({
      kind: 'news',
      date: n.date || '',
      sortKey: n.date || '',
      tag: (n._auto && n.company) ? n.company : (n.industry || n.source || '资讯'),
      title: n.title || '',
      url: n.url || '',
      restricted: isRestrictedSource(n.url || ''),
    })).sort((a, b) => (b.sortKey || '').localeCompare(a.sortKey || ''));

    const reportSorted = reports.map(r => {
      const proj = PROJECTS.find(p => p.code === r.code);
      const projName = proj ? (proj.name_cn || proj.code) : r.code;
      return {
        kind: 'report',
        date: r.date || '—',
        sortKey: r.date || '',
        tag: r.category || '未分类',
        title: r.title || '(无标题)',
        url: resolveReportUrl({...r, code:r.code}),
        projName,
      };
    }).sort((a, b) => (b.sortKey || '').localeCompare(a.sortKey || ''));

    /* 交替合并：news[0], report[0], news[1], report[1], ... → 让报告均匀出现 */
    const merged = [];
    const maxLen = Math.max(newsSorted.length, reportSorted.length);
    for(let i = 0; i < maxLen; i++){
      if(i < newsSorted.length) merged.push(newsSorted[i]);
      if(i < reportSorted.length) merged.push(reportSorted[i]);
    }
    const total = merged.length;
    totalEl.textContent = total;
    lbl.textContent = `${SELECTED_INDUSTRY === '__ALL__' ? '全部行业' : SELECTED_INDUSTRY} · 倒序 ·`;
    /* 报告条数提示，让"近期报告"确实可见 */
    const reportLbl = document.getElementById('unifiedReportLabel');
    if(reportLbl) reportLbl.textContent = `· 近期报告 ${reportSorted.length} 份`;

    if(!total){
      track.innerHTML = `<div class="v3-feed-empty">${SELECTED_INDUSTRY === '__ALL__' ? '暂无事件流 · 等待推送' : '该行业暂无公开事件 · 点「全部行业」查看'}</div>`;
      setMarquee('unifiedMarquee', 'unifiedTrack', 0);
      return;
    }
    const cards = merged.map(it => {
      const isNews = it.kind === 'news';
      const tagEmoji = isNews ? '📰' : '📄';
      const tagColor = isNews ? 'var(--tb-blue)' : 'var(--seal)';
      const subLine = isNews
        ? (it.restricted ? '<div class="v3-source-note">来源网站可能限制直接访问</div>' : '')
        : `<div class="v3-feed-sub">📁 ${escapeHtml(it.projName)}</div>`;
      const inner = `
          <div class="v3-feed-card-top">
            <span class="v3-feed-tag" style="--tag-c:${tagColor}">${tagEmoji} ${escapeHtml(it.tag)}</span>
            <span class="v3-feed-date">${it.date || '—'}</span>
          </div>
          <div class="v3-feed-title">${escapeHtml(it.title)}</div>
          ${subLine}`;
      return it.url
        ? `<a class="v3-feed-card" href="${it.url}" target="_blank" rel="noopener noreferrer" data-kind="${it.kind}">${inner}</a>`
        : `<div class="v3-feed-card" data-kind="${it.kind}">${inner}</div>`;
    }).join('');
    track.innerHTML = cards + cards;
    setMarquee('unifiedMarquee', 'unifiedTrack', total);
  }

  function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));}

  function renderAll(){
    renderKPI();
    renderCloud();
    renderUnified();
    if(window.cmdK){
      window.cmdK.tiltAll();
    }
  }

  function bind(){
    let rz;
    window.addEventListener('resize', ()=>{
      clearTimeout(rz);
      rz = setTimeout(()=>{ renderUnified(); }, 200);
    });
  }

  function init(){
    if (legacyRedirect()) return;
    bind();
    bindToggle();
    tick(); setInterval(tick, 1000);
    loadData();
    bindScrollReveal();
  }

  // ============ 滚动渐入动画 ============
  function bindScrollReveal(){
    if(!('IntersectionObserver' in window)) return;
    const targets = document.querySelectorAll('.v3-holo, .v3-entries, .v3-uni, .v3-entry, .v3-bar-row, .v3-feed2 .v3-feed2-card');
    if(!targets.length) return;
    const io = new IntersectionObserver((entries)=>{
      entries.forEach((e)=>{
        if(e.isIntersecting){
          e.target.classList.add('is-revealed');
          io.unobserve(e.target);
        }
      });
    }, {threshold: 0.12, rootMargin: '0px 0px -60px 0px'});
    targets.forEach((el, i)=>{
      el.classList.add('to-reveal');
      el.style.setProperty('--reveal-delay', (Math.min(i, 6) * 70) + 'ms');
      io.observe(el);
    });
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
