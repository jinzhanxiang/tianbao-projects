<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>天保控股项目管理中心 · 首页</title>
<meta name="description" content="天保控股项目管理系统 v3 · 首页 · 行业分布 + 行业最新动态">
<link rel="stylesheet" href="assets/tianbao.css">
<style>
/* === index.html 专属 · 首页美化 === */
:root {
  --gold: #B45309;
}
body{background:var(--bg);position:relative;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 800px 400px at 50% 0%,rgba(192,57,43,0.04),transparent 70%);
}
.v3-home{max-width:1320px;margin:0 auto;padding:8px 20px 8px;position:relative;z-index:1;display:flex;flex-direction:column;gap:4px;height:calc(100vh - 110px);min-height:0;overflow:hidden}
@media (min-height:820px){.v3-home{min-height:640px}}

/* === 大标题分级放大（核心品牌 > 一级标题 > 二级标题） === */
.nav-brand>div>div:first-child{
  font-family:var(--hei);
  font-size:26px!important;letter-spacing:1.5px!important;
  font-weight:800;
  background:linear-gradient(90deg,var(--tb-blue-2) 0%,var(--tb-blue) 50%,var(--seal) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:200% 100%;
  position:relative;animation:brandShine 6s ease-in-out infinite;
}
.nav-brand-sub{font-size:12px!important;font-weight:600!important;letter-spacing:.6px!important;color:var(--ink-2)!important;margin-top:2px}
.nav-brand-sub .clock{font-size:13px!important}
.nav-logo{width:42px!important;height:42px!important;font-size:16px!important;border-radius:50%!important;background:transparent!important;box-shadow:0 2px 6px rgba(0,121,221,0.15);transition:.3s}
.nav-brand:hover .nav-logo{transform:rotate(8deg) scale(1.05);box-shadow:0 4px 12px rgba(0,121,221,0.25)}
.nav-logo-fallback{display:none;width:42px;height:42px;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--tb-blue) 0%,var(--tb-blue-2) 100%);color:#fff;font-size:18px;font-weight:900;border-radius:50%;box-shadow:0 2px 6px rgba(0,121,221,0.25)}
.v3-section-h h2{font-size:24px!important;letter-spacing:2px!important}

/* === 概览标题 === */
.v3-section-h{display:flex;justify-content:space-between;align-items:center;margin:4px 0 4px;padding-bottom:4px;border-bottom:2px solid var(--ink);position:relative}
.v3-section-h::after{content:'';position:absolute;bottom:-2px;left:0;width:80px;height:2px;background:linear-gradient(90deg,var(--tb-blue),transparent);transform-origin:left;animation:lineDraw .8s ease-out backwards}
.v3-section-h h2{font-family:var(--hei);font-size:20px;color:var(--ink);font-weight:700;margin:0;display:flex;align-items:center;gap:10px;letter-spacing:2px;position:relative}
.v3-section-h h2::before{content:'';width:4px;height:16px;background:linear-gradient(180deg,var(--tb-blue) 0%,var(--tb-blue-2) 100%);border-radius:1px;opacity:.85}
.v3-section-h em{font-style:normal;font-family:var(--fsong);font-size:11px;color:var(--ink-2);font-weight:600;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.v3-section-h em::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--tb-blue);opacity:.85;animation:dotAppear .5s ease-out backwards;animation-delay:.6s}

/* === 项目概况汇总 · 行业·项目分布 一体化全息面板（v3.8 上下居中） === */
.v3-holo{
  position:relative;background:linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
  display:flex;flex-direction:column;gap:8px;overflow:hidden;
  flex:0 0 auto;
}
.v3-holo::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--doc-rule) 0%,var(--seal) 50%,var(--seal-2) 100%);border-radius:12px 0 0 12px}

.v3-holo-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:2px 2px 10px;border-bottom:1px solid var(--border);position:relative;min-height:24px}
.v3-holo-head h2{font-family:var(--hei);font-size:17px;color:var(--ink);font-weight:700;margin:0;letter-spacing:2px;display:flex;align-items:center;gap:8px;line-height:1}
.v3-holo-head h2::before{content:'◆';font-size:14px;color:var(--tb-blue);opacity:.85}
.v3-holo-head em{font-style:normal;font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2);font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.v3-holo-head em::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--tb-blue);opacity:.85;animation:dotAppear .5s ease-out backwards;animation-delay:.6s}

/* === 单列布局：上方 4-指标条 + 下方雷达 + 右侧行业分布条 === */
.v3-holo-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;align-items:stretch;min-height:120px}
.v3-holo-grid-single{grid-template-columns:1fr;min-height:auto}

/* === 上方 4-指标数据条（项目总数 / 行业 / 报告 / 平均进度） === */
.v3-holo-pulse{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:6px 4px 2px;border-bottom:0;margin-bottom:0;
}
.v3-holo-stat{position:relative;padding:10px 4px 8px;text-align:center;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.4) 0%,transparent 100%);transition:.3s cubic-bezier(.2,.8,.2,1);overflow:hidden;display:flex;flex-direction:column;justify-content:center;gap:4px;min-height:60px;cursor:default;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) backwards}
.v3-holo-stat:nth-of-type(1){animation-delay:.05s}
.v3-holo-stat:nth-of-type(2){animation-delay:.1s}
.v3-holo-stat:nth-of-type(3){animation-delay:.15s}
.v3-holo-stat:nth-of-type(4){animation-delay:.2s}
.v3-holo-stat::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--hc,var(--tb-blue));border-radius:1px;transform-origin:center}
.v3-holo-stat:hover{background:linear-gradient(180deg,var(--tb-blue-soft) 0%,transparent 100%);transform:translateY(-2px)}
.v3-holo-stat:hover::before{width:80%;box-shadow:0 0 6px var(--hc,var(--tb-blue))}
.v3-holo-stat-big{font-family:var(--hei);font-size:28px;font-weight:900;color:var(--hc,var(--tb-blue));line-height:1;letter-spacing:-1.5px;position:relative;display:block;transition:transform .35s;min-width:1ch;text-align:center}
.v3-holo-stat-big:empty,.v3-holo-stat-big[data-loading="1"]{color:var(--ink-3);opacity:.4;font-weight:400;letter-spacing:0;animation:statPulse 1.6s ease-in-out infinite}
@keyframes statPulse{0%,100%{opacity:.25}50%{opacity:.5}}
.v3-holo-stat:hover .v3-holo-stat-big{transform:scale(1.1)}
.v3-holo-stat-lbl{font-family:var(--hei);font-size:11px;color:var(--ink-2);font-weight:700;letter-spacing:3px;margin-top:3px;display:block}

/* === 左：RADAR 主舞台 === */
/* === 行业分布条形图（v3.8 单列全宽） === */
.v3-holo-bars-stage{
  display:flex;flex-direction:column;gap:3px;padding:6px 4px 6px 10px;
  border-left:1px dashed var(--border);
  background:linear-gradient(180deg,rgba(0,121,221,.03) 0%,transparent 100%);
  border-radius:0 8px 8px 0;
  min-width:0;overflow:hidden;
}
.v3-holo-bars-h{font-family:var(--hei);font-size:12px;color:var(--tb-blue);font-weight:800;letter-spacing:3px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;padding-bottom:3px;border-bottom:1px solid var(--border);position:relative}
.v3-holo-bars-h em{font-style:normal;font-family:ui-monospace,monospace;font-size:10px;color:var(--ink-3);font-weight:600}
.v3-holo-bar-row{display:grid;grid-template-columns:60px 1fr 22px;gap:6px;align-items:center;font-family:var(--fsong);font-size:11px;color:var(--ink-2);font-weight:600;line-height:1.3;padding:1px 0;animation:fadeUp .4s cubic-bezier(.2,.8,.2,1) backwards;transition:transform .2s,background .2s;border-radius:4px}
.v3-holo-bar-row:hover{background:var(--tb-blue-soft);transform:translateX(2px)}
.v3-holo-bar-row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--hei);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink)}
.v3-holo-bar-row .bar{position:relative;height:9px;background:var(--bg-2);border-radius:4px;overflow:hidden;box-shadow:inset 0 1px 1px rgba(0,0,0,.06)}
.v3-holo-bar-row .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--bc,var(--tb-blue)),var(--bc-2,var(--tb-blue-3)));border-radius:4px;width:0;transition:width 1.2s cubic-bezier(.4,.2,.2,1);position:relative}
.v3-holo-bar-row .cnt{font-family:ui-monospace,monospace;color:var(--tb-blue);font-weight:800;font-size:12px;text-align:right}

/* === 旧 KPI 类样式 · 已废弃（display:none 兜底） === */
.v3-kpi-grid,.v3-kpi,.v3-kpi-eyebrow,.v3-kpi-num-row,.v3-kpi-num,.v3-kpi-num-unit,.v3-kpi-num-ts,.v3-kpi-rows,.v3-kpi-row,.v3-kpi-meta,.v3-holo-core,.v3-holo-stages,.v3-holo-stages-h,.v3-holo-stage-bar,.v3-holo-stage-legend,.v3-holo-block,.v3-holo-donut-wrap,.v3-holo-donut,.v3-holo-donut-center,.v3-holo-donut-seg,.v3-holo-donut-bg{display:none}

/* === 3 类入口 · 极简单行结构 · 国企公文调 + 适度科技感 === */
.v3-entries{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0;flex:0 0 auto}
.v3-entry{
  background:linear-gradient(160deg,var(--paper) 0%,var(--paper-2) 100%);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  cursor:pointer;transition:.35s cubic-bezier(.2,.8,.2,1);
  position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;gap:6px;
  min-height:84px;text-decoration:none;color:inherit;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
  animation:fadeUp .55s cubic-bezier(.2,.8,.2,1) backwards;
}
.v3-entry::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--cat-color,var(--tb-blue)) 0%,var(--cat-color-2,var(--tb-blue-2)) 100%);transition:.35s cubic-bezier(.2,.8,.2,1);z-index:2}
/* 顶部高光：hover 时横向扫过（一次） */
.v3-entry::after{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--cat-color,var(--tb-blue)) 50%,transparent 100%);opacity:0;transition:opacity .3s;pointer-events:none}
/* 4 角公文装饰：默认隐藏，hover 显示 */
.v3-entry .corner{position:absolute;width:10px;height:10px;border:1.5px solid var(--cat-color,var(--tb-blue));opacity:0;transition:.35s;pointer-events:none}
.v3-entry .corner.tl{top:3px;left:3px;border-right:none;border-bottom:none}
.v3-entry .corner.tr{top:3px;right:3px;border-left:none;border-bottom:none}
.v3-entry .corner.bl{bottom:3px;left:3px;border-right:none;border-top:none}
.v3-entry .corner.br{bottom:3px;right:3px;border-left:none;border-top:none}
.v3-entry:hover .corner{opacity:.55}
/* 各卡片错峰入场 */
#entryP0{animation-delay:0s}
#entryP1{animation-delay:.07s}
#entryP2{animation-delay:.14s}

/* hover：上浮 + 柔光投影 + 顶部高光扫过 */
.v3-entry:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(0,0,0,0.08),0 4px 12px rgba(0,121,221,0.12);border-color:var(--cat-color,var(--tb-blue))}
.v3-entry:hover::before{width:8px}
.v3-entry:hover::after{opacity:.85;transition:opacity .3s .05s}
.v3-entry-row1{display:flex;align-items:center;gap:8px;margin-bottom:2px;position:relative;z-index:1}
.v3-entry-icon{
  font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  background:linear-gradient(135deg,var(--cat-color,var(--tb-blue)) 0%,var(--cat-color-2,var(--tb-blue-2)) 100%);
  border-radius:6px;color:#fff;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15));
  transition:.3s;flex-shrink:0;position:relative;
}
.v3-entry:hover .v3-entry-icon{transform:scale(1.08) rotate(-3deg);filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2))}
.v3-entry-title{font-family:var(--hei);font-size:16px;color:var(--ink);font-weight:900;letter-spacing:3px;flex:1;min-width:0;transition:color .3s}
.v3-entry:hover .v3-entry-title{color:var(--cat-color,var(--tb-blue))}
.v3-entry-count{font-family:ui-monospace,monospace;font-size:14px;color:var(--cat-color,var(--tb-blue));font-weight:900;flex-shrink:0;letter-spacing:-.3px;position:relative;display:inline-block;transition:transform .3s}
.v3-entry-count small{font-family:var(--fsong);font-size:10px;color:var(--ink-3);font-weight:700;letter-spacing:1px;margin-left:2px}
.v3-entry:hover .v3-entry-count{transform:scale(1.05)}
.v3-entry-meta{font-family:var(--fsong);font-size:10px;color:var(--ink-2);font-weight:600;line-height:1.3;letter-spacing:.2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:relative;z-index:1}
.v3-entry-meta b{font-family:ui-monospace,monospace;color:var(--ink);font-weight:900}
.v3-entry-meta .sep{color:var(--border-strong);opacity:.4}
.v3-entry-meta .ind-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;background:rgba(0,0,0,.04);border-radius:6px;font-weight:700;color:var(--cat-color);font-size:10px;transition:.3s}
.v3-entry:hover .ind-chip{background:rgba(0,121,221,0.08)}
/* === 进度环 · 占位 === */
.v3-entry-progress{display:none}
.v3-entry-arrow{position:absolute;right:10px;bottom:8px;font-size:11px;color:var(--cat-color);font-weight:700;letter-spacing:.5px;opacity:0;transition:.3s;z-index:1}
.v3-entry:hover .v3-entry-arrow{opacity:.85;transform:translateX(2px)}

/* === v3-entry-body / ring / chips 系列已废弃 · meta 单行内联 === */

/* === 行业分布 · 筛选条 === */
.v3-cloud-strip{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(90deg,var(--paper) 0%,var(--paper-2) 100%);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.03);
  min-height:50px;
  flex:0 0 auto;
  animation:fadeUp .55s cubic-bezier(.2,.8,.2,1) backwards;
  animation-delay:.25s;
}
.v3-cloud-strip .lbl{font-family:var(--hei);font-size:13px;color:var(--ink);font-weight:900;letter-spacing:3px;flex-shrink:0;padding-right:12px;border-right:2px solid var(--tb-blue);display:flex;align-items:center;gap:6px}
.v3-cloud-strip .lbl::before{content:'';width:4px;height:14px;background:linear-gradient(180deg,var(--tb-blue-3),var(--tb-blue));border-radius:1px}
.v3-cloud-strip .v3-cloud-tags{display:flex;flex-wrap:wrap;gap:5px;flex:1;min-width:0}

.v3-cloud-tag{
  display:inline-flex;align-items:center;gap:6px;padding:3px 12px;
  background:var(--bg-2);border:1px solid var(--border);border-radius:14px;
  font-family:var(--fsong);color:var(--ink-2);cursor:pointer;
  transition:.25s cubic-bezier(.2,.8,.2,1);font-weight:700;font-size:14px;
  position:relative;overflow:hidden;
}
.v3-cloud-tag:hover{background:var(--paper);color:var(--tb-blue);border-color:var(--tb-blue);transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,121,221,0.15)}
.v3-cloud-tag.active{background:linear-gradient(135deg,var(--tb-blue) 0%,var(--tb-blue-2) 100%);color:#fff;border-color:var(--tb-blue);box-shadow:0 3px 8px rgba(0,121,221,0.25)}
.v3-cloud-tag.active .count{color:#fff;font-weight:800;background:rgba(255,255,255,0.2)}
.v3-cloud-tag .count{font-family:ui-monospace,monospace;font-weight:800;color:var(--tb-blue);font-size:12px;background:rgba(0,121,221,0.1);padding:0 7px;border-radius:10px;min-width:22px;text-align:center;transition:.25s}
.v3-cloud-tag-cloud{font-size:14px;font-weight:800;padding:4px 14px}
.v3-cloud-tag-cloud .count{background:rgba(0,0,0,.08);color:var(--ink-2)}
.v3-cloud-tag-cloud.active .count{background:rgba(255,255,255,.25);color:#fff}
.v3-cloud-empty{padding:6px 10px;color:var(--ink-3);font-family:var(--fsong);font-size:13px}

/* === 统一事件流 · v3.8 填满底部 + 上下居中 === */
.v3-feed{
  background:linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  display:flex;flex-direction:column;min-width:0;min-height:0;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
  position:relative;overflow:hidden;
  flex:1 1 auto;min-height:260px;
  animation:fadeUp .55s cubic-bezier(.2,.8,.2,1) backwards;
  animation-delay:.32s;
}
.v3-feed::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--feed-color,var(--tb-blue)) 0%,var(--seal) 50%,var(--tb-blue-3) 100%);transform-origin:left;animation:ribbonUnfold .8s ease-out backwards;animation-delay:.4s}
.v3-feed-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:2px 0 12px;border-bottom:1px solid var(--border);min-height:24px}
.v3-feed-head h2{font-family:var(--hei);font-size:15px;color:var(--ink);font-weight:800;margin:0;display:flex;align-items:center;gap:8px;letter-spacing:1.5px}
.v3-feed-head h2::before{content:'';width:4px;height:14px;background:linear-gradient(180deg,var(--tb-blue),var(--tb-blue-2));border-radius:1px}
.v3-feed-head small{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--fsong);display:flex;align-items:center;gap:4px}
.v3-feed-head small::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--tb-blue);opacity:.85;animation:dotAppear .5s ease-out backwards;animation-delay:.7s}
.v3-feed-toggle{margin-left:8px;width:24px;height:24px;border-radius:6px;background:transparent;border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-2);transition:.2s;font-size:13px;line-height:1;flex-shrink:0}
.v3-feed-toggle:hover{background:var(--paper);border-color:var(--tb-blue);color:var(--tb-blue);transform:rotate(90deg)}
.v3-feed-toggle .ico-scroll{display:none}
.v3-feed-toggle[data-mode="scroll"] .ico-static{display:none}
.v3-feed-toggle[data-mode="scroll"] .ico-scroll{display:inline}

.v3-marquee{position:relative;flex:1 1 auto;min-height:0;overflow:hidden;-webkit-mask-image:linear-gradient(180deg,transparent 0,#000 6%,#000 94%,transparent 100%);mask-image:linear-gradient(180deg,transparent 0,#000 6%,#000 94%,transparent 100%)}
.v3-marquee-track{display:flex;flex-direction:column;animation:marqueeUp var(--dur,60s) linear infinite;will-change:transform}
.v3-marquee:hover .v3-marquee-track{animation-play-state:paused}
.v3-marquee.no-scroll .v3-marquee-track{animation:none}
@keyframes marqueeUp{from{transform:translateY(0)}to{transform:translateY(-50%)}}

.v3-feed-card{
  display:flex;flex-direction:column;gap:3px;background:var(--bg-2);
  border:1px solid var(--border);border-left:3px solid var(--feed-color,var(--tb-blue));
  border-radius:6px;padding:8px 12px;margin-bottom:5px;
  text-decoration:none;color:inherit;transition:.25s cubic-bezier(.2,.8,.2,1);flex-shrink:0;
  position:relative;overflow:hidden;
}
.v3-feed-card::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--tb-blue),transparent);opacity:0;transition:.3s}
.v3-feed-card:hover{background:var(--paper);border-left-width:4px;box-shadow:0 4px 12px rgba(0,121,221,0.12);transform:translateX(3px)}
.v3-feed-card:hover::after{opacity:.85}
.v3-feed-card-top{display:flex;align-items:center;gap:8px}
.v3-feed-tag{font-size:10px;color:var(--tb-blue);background:rgba(0,121,221,0.1);padding:1px 8px;border-radius:10px;font-weight:800;letter-spacing:1px;line-height:1.4;transition:.25s}
.v3-feed-card:hover .v3-feed-tag{background:rgba(0,121,221,0.18)}

<script>
/* ==============================
 * 首页 v3 渲染器 · 视觉重设计版
 * ============================== */
(function(){
  'use strict';

  let PROJECTS = [];
  let REPORTS = [];
  let NEWS = [];
  let NEWS_BY_IND = {};
  let SELECTED_INDUSTRY = '__ALL__';

  function legacyRedirect(){
    const u = new URLSearchParams(location.search);
    const view = u.get('view');
    const cat = u.get('cat');
    const code = u.get('code');
    if (view === 'cat' && cat) {
      location.replace('page.html?' + u.toString());
      return true;
    }
    if (view === 'proj' && code) {
      location.replace('detail.html?code=' + encodeURIComponent(code));
      return true;
    }
    return false;
  }

  function v2to3Cat(cat){
    const map = {
      'deal': '在推重点','np': '储备','p': '储备',
      'kg': '观察','hub': '观察','course': '观察',
    };
    return map[cat] || '在推重点';
  }

  async function loadData(){
    const meta = document.getElementById('holoMeta');
    const setMeta = (html) => { if(meta) meta.innerHTML = html; };

    /* R170: 3 次重试 + 指数退避（800ms / 1600ms / 3200ms） */
    const fetchOnce = async (url) => {
      let lastErr;
      for(let attempt=1; attempt<=3; attempt++){
        try {
          const res = await fetch(url + '?v=' + Date.now(), {cache:'no-store'});
          if(!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch(e){
          lastErr = e;
          if(attempt < 3) await new Promise(r => setTimeout(r, 800 * Math.pow(2, attempt-1)));
        }
      }
      throw lastErr;
    };

    try {
      setMeta('<span style="color:var(--ink-3)">⏳ 加载中...</span>');
      const [p, r, n] = await Promise.all([
        fetchOnce('data/projects.json'),
        fetchOnce('data/reports.json'),
        fetchOnce('data/industry_news.json'),
      ]);
      PROJECTS = (p && p.projects) || [];
      REPORTS = (r && r.by_code) || {};
      const newsRaw = n || {};
      NEWS_BY_IND = newsRaw.industries || {};
      NEWS = [];
      Object.entries(NEWS_BY_IND).forEach(([ind, items])=>{
        items.forEach(it=>NEWS.push({...it, industry:ind}));
      });
      setMeta('<b>'+PROJECTS.length+'</b> 项目 · <b>'+(Object.values(REPORTS).flat().length)+'</b> 报告 · <b>'+Object.keys(NEWS_BY_IND).length+'</b> 行业');
    } catch(e){
      console.error('数据加载失败（已重试 3 次）', e);
      setMeta('<span style="color:#E53E3E;cursor:pointer" id="retryBtn">⚠️ 加载失败 · 点击重试</span>');
      const retryBtn = document.getElementById('retryBtn');
      if(retryBtn) retryBtn.addEventListener('click', ()=>{ loadData(); });
      PROJECTS = []; REPORTS = {}; NEWS = []; NEWS_BY_IND = {};
    }
    window.PROJECTS = PROJECTS;
    window.REPORTS = REPORTS;
    if(window.cmdK) window.cmdK.rebuildIndex();
    renderAll();
  }

  /* ---------- KPI · 可视化 ---------- */
  const STAGE_COLORS = {'在推重点':'#C0392B','储备':'#1565C0','观察':'#6B7280'};
  const CAT_PALETTE = ['#1565C0','#C0392B','#0D8050','var(--seal)','#E67E22','#0EA5E9','#DC2626','#0891B2','#7C2D12','#1E3A8A','#166534','#B45309','#6D28D9','#BE185D'];

  function renderKPI(){
    /* ===== 数据计算 ===== */
    const allReports = Object.values(REPORTS).flat();
    const totalR = allReports.length;

    /* 行业（主+细分） */
    const mainIndMap = new Map();
    const subIndMap = new Map();
    PROJECTS.forEach(p=>{
      const inds = (p.industry||'').split(/[·\/ ]+/).map(t=>t.trim()).filter(Boolean);
      if(inds.length) mainIndMap.set(inds[0], (mainIndMap.get(inds[0])||0)+1);
      inds.forEach(t=>{ if(t!==inds[0]) subIndMap.set(t, (subIndMap.get(t)||0)+1); });
    });
    const industries = [...mainIndMap.entries()].sort((a,b)=>b[1]-a[1]);

    /* 平均进度（在推项目） */
    const activeProjects = PROJECTS.filter(p=>p.stage_v3==='在推重点');
    const avgProgress = activeProjects.length?
      Math.round(activeProjects.reduce((s,p)=>s+(p.progress_pct||0),0) / activeProjects.length) : 0;

    /* ===== 时间戳 ===== */
    const ts = new Date();
    const pad = n=>String(n).padStart(2,'0');
    const stamp = `${pad(ts.getHours())}:${pad(ts.getMinutes())}`;

    /* ===== 1. 顶部 4-指标数据条 ===== */
    document.getElementById('holoProjects').setAttribute('data-counter-up', PROJECTS.length);
    document.getElementById('holoReports').setAttribute('data-counter-up', totalR);
    document.getElementById('holoInds').setAttribute('data-counter-up', industries.length);
    document.getElementById('holoProgress').setAttribute('data-counter-up', avgProgress);

    /* ===== 2. 行业分布条形图（v3.8 单列全宽，去掉阶段汇总） ===== */
    const IND_PALETTE = ['var(--seal)','var(--gold)','#C0392B','#1565C0','#0EA5E9','#0D8050','#DC2626','#E67E22','#0891B2','#BE185D','#1E3A8A','#B45309'];

    /* ===== 3. 行业分布条形图（右侧主舞台） ===== */
    const topN = Math.min(6, industries.length);
    const barsListEl = document.getElementById('holoBarsList');
    const maxN = Math.max(1, ...industries.slice(0, topN).map(([_,c])=>c));
    barsListEl.innerHTML = industries.slice(0, topN).map(([n,c], i)=>{
      const col = IND_PALETTE[i % IND_PALETTE.length];
      const col2 = IND_PALETTE[(i+1) % IND_PALETTE.length];
      const w = (c / maxN * 100).toFixed(1);
      return `<div class="v3-holo-bar-row" title="${n}：${c} 个项目（占 ${(c/PROJECTS.length*100).toFixed(0)}%）">
        <span class="nm">${n}</span>
        <span class="bar"><i style="width:${w}%;--bc:${col};--bc-2:${col2};--bc-glow:${col}55"></i></span>
        <span class="cnt">${c}</span>
      </div>`;
    }).join('');
    document.getElementById('holoBarsTotal').textContent = `Top ${topN} · ${industries.length} 行业`;

    /* === 条形图点击 · 联动 CLOUD 筛选 + 统一事件流 === */
    barsListEl.querySelectorAll('.v3-holo-bar-row').forEach(row=>{
      row.style.cursor = 'pointer';
      row.addEventListener('click',()=>{
        const nm = (row.querySelector('.nm')?.textContent || '').trim();
        if(!nm) return;
        SELECTED_INDUSTRY = nm;
        renderCloud();
        renderUnified();
        /* 视觉反馈：滚动到事件流并临时高亮 */
        const feed = document.getElementById('unifiedTrack');
        if(feed){
          feed.scrollIntoView({behavior:'smooth', block:'center'});
          feed.style.transition = 'outline .3s';
          feed.style.outline = '2px solid var(--seal)';
          setTimeout(()=>{ feed.style.outline = 'none'; }, 1200);
        }
      });
    });

    /* ===== 头部状态栏 · 数据快照（由 loadData 统一管理 · 此处不再覆盖） ===== */
    /* 仅在数据非空时刷新，确保 loadData 中的"加载中/重试"提示不被覆盖 */
    if(PROJECTS.length > 0){
      document.getElementById('holoMeta').innerHTML =
        `<b>${PROJECTS.length}</b> 项目 · <b>${totalR}</b> 报告 · <b>${industries.length}</b> 行业`;
    }

    /* === 3 类入口 === */
    renderEntries();

    /* 触发计数器动画 */
    if(window.cmdK) window.cmdK.counterUpAll();
  }

  /* v3.8: stages row entrance 已废弃 · 移除 */
  (function(){
    if(document.getElementById('holoAnimStyle')) return;
    const s = document.createElement('style');
    s.id = 'holoAnimStyle';
    s.textContent = `
      @keyframes barRowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
      .v3-holo-bar-row{animation:barRowIn .4s cubic-bezier(.2,.8,.2,1) backwards}
    `;
    document.head.appendChild(s);
  })();

  function renderEntries(){
    const groups = ['在推重点','储备','观察'];
    groups.forEach((s, gi)=>{
      const ps = PROJECTS.filter(p=>p.stage_v3===s);
      const cntN = ps.length;
      document.getElementById('cntP'+gi+'N').textContent = cntN;
      /* 同步 data-count 给辉光层 */
      const cntHost = document.querySelector('#entryP'+gi+' .v3-entry-count');
      if(cntHost) cntHost.setAttribute('data-count', String(cntN));

      /* 进度估算（按当前 stage + 平均 progress_pct） */
      let pct;
      if(s==='在推重点'){
        pct = Math.min(100, Math.round(ps.reduce((sum,p)=>sum+(p.progress_pct||0),0) / Math.max(1, ps.length)));
      } else if(s==='储备'){
        pct = Math.min(100, Math.round(ps.reduce((sum,p)=>sum+((p.progress_pct||10)*0.7+15),0) / Math.max(1, ps.length)));
      } else {
        pct = Math.min(100, Math.round(ps.reduce((sum,p)=>sum+((p.progress_pct||5)*0.4+5),0) / Math.max(1, ps.length)));
      }

      /* 每个类别的简明 meta：进度% + 子统计 + Top 行业 */
      let subPart = '';
      if(gi===0){
        const l = ps.filter(p=>(p.progress_pct||0)>=30).length;
        const d = ps.filter(p=>(p.progress_pct||0)>=60).length;
        subPart = `<b>${l}</b>立项 <span class="sep">·</span> <b>${d}</b>已尽调`;
      } else if(gi===1){
        const u = ps.filter(p=>!p.iss || p.iss==='未上市' || (p.iss||'').includes('未')).length;
        subPart = `<b>${u}</b>未上市 <span class="sep">·</span> <b>${cntN-u}</b>上市/REITs`;
      } else {
        const short = ps.filter(p=>(p.progress_pct||0)<20).length;
        const mid   = ps.filter(p=>(p.progress_pct||0)>=20 && (p.progress_pct||0)<50).length;
        subPart = `<b>${short}</b>短链 <span class="sep">·</span> <b>${mid}</b>中链`;
      }

      /* Top 行业 chips 内联 */
      const indMap = new Map();
      ps.forEach(p=>{
        const main = (p.industry||'').split('·')[0].trim();
        if(main) indMap.set(main, (indMap.get(main)||0)+1);
      });
      const topInds = [...indMap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3);
      const chipPart = topInds.map(([n,c],i)=>
        `<span class="ind-chip"><i style="width:6px;height:6px;background:${CAT_PALETTE[i%CAT_PALETTE.length]};display:inline-block;border-radius:1px"></i>${n}<b>${c}</b></span>`
      ).join('') || '<span class="ind-chip" style="opacity:.5">—</span>';

      const metaHost = document.getElementById('metaP'+gi);
      if(metaHost){
        metaHost.innerHTML = `📊 ${pct}% <span class="sep">·</span> ${subPart} <span class="sep">·</span> ${chipPart}`;
      }
    });
  }

  /* ---------- 行业词云 ---------- */
  function aggregateIndustries(){
    const map = {};
    PROJECTS.forEach(p=>{
      const main = p.industry.split('·')[0].trim();
      if(!main) return;
      if(!map[main]) map[main] = {count:0, reports:0, samples:[]};
      map[main].count++;
      const rc = (REPORTS[p.code]||[]).length;
      map[main].reports += rc;
      if(map[main].samples.length<3) map[main].samples.push(p.name_cn);
    });
    return map;
  }
  function renderCloud(){
    const map = aggregateIndustries();
    const items = Object.entries(map).map(([k,v])=>({name:k,...v}));
    items.sort((a,b)=>b.count-a.count);
    const host = document.getElementById('cloudTags');
    if(!items.length){
      host.innerHTML = '<div class="v3-cloud-empty">暂无行业数据</div>';
      return;
    }
    const max = items[0].count;
    host.innerHTML = `
      <span class="v3-cloud-tag v3-cloud-tag-cloud${SELECTED_INDUSTRY==='__ALL__'?' active':''}" data-ind="__ALL__">
        全部行业 <span class="count">${items.length}</span>
      </span>
      ${items.map(it=>{
        return `<span class="v3-cloud-tag${SELECTED_INDUSTRY===it.name?' active':''}" data-ind="${it.name}">
          ${it.name} <span class="count">${it.count}</span>
        </span>`;
      }).join('')}
    `;
    host.querySelectorAll('.v3-cloud-tag').forEach(el=>{
      el.addEventListener('click',()=>{
        SELECTED_INDUSTRY = el.dataset.ind;
        renderCloud();
        renderUnified();
      });
    });
  }

  /* ---------- 行业动态 ---------- */
  function newsForIndustry(){
    let pool;
    if(SELECTED_INDUSTRY==='__ALL__'){
      pool = NEWS;
    } else {
      const keys = Object.keys(NEWS_BY_IND);
      const tokens = new Set([SELECTED_INDUSTRY]);
      PROJECTS.forEach(p=>{
        if((p.industry||'').split('·')[0].trim() === SELECTED_INDUSTRY){
          (p.industry||'').split(/[·\/ ]+/).forEach(t=>{ t=t.trim(); if(t) tokens.add(t); });
        }
      });
      const share2 = (a,b)=>{ for(let i=0;i+2<=a.length;i++){ if(b.includes(a.slice(i,i+2))) return true; } return false; };
      const matchedKeys = keys.filter(k=>{
        for(const t of tokens){ if(k===t || k.includes(t) || t.includes(k) || share2(t,k)) return true; }
        return false;
      });
      if(!matchedKeys.length) return [];
      pool = [];
      const seen = new Set();
      matchedKeys.forEach(k=>{
        NEWS_BY_IND[k].forEach(n=>{
          const id = (n.title||'')+'|'+(n.date||'');
          if(seen.has(id)) return; seen.add(id);
          pool.push({...n, industry:k});
        });
      });
    }
    /* 按日期倒序，再截前 6 条 · 避免 marquee 撑开过大 */
    return pool.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0, 6);
  }

  function setMarquee(marqueeId, trackId, count){
    const mq = document.getElementById(marqueeId);
    const track = document.getElementById(trackId);
    if(!mq || !track) return;
    requestAnimationFrame(()=>{
      const full = track.scrollHeight;
      const oneCopy = count > 0 ? full / 2 : full;
      const mode = (typeof UNIFIED_MODE !== 'undefined') ? UNIFIED_MODE : 'static';
      if(count <= 0 || oneCopy <= mq.clientHeight + 4 || mode === 'static'){
        mq.classList.add('no-scroll');
        track.style.removeProperty('--dur');
      } else {
        mq.classList.remove('no-scroll');
        const dur = Math.max(18, Math.round(oneCopy / 22));
        track.style.setProperty('--dur', dur + 's');
      }
    });
  }

  /* R170: marquee 静态/动态模式切换 · 默认静态（更易点击） */
  let UNIFIED_MODE = 'static';
  function bindToggle(){
    const btn = document.getElementById('unifiedToggle');
    if(!btn) return;
    btn.addEventListener('click', ()=>{
      UNIFIED_MODE = UNIFIED_MODE === 'static' ? 'scroll' : 'static';
      btn.setAttribute('data-mode', UNIFIED_MODE);
      btn.title = UNIFIED_MODE === 'static' ? '当前：静态 · 点击切换滚动' : '当前：滚动 · 点击切换静态';
      renderUnified();
    });
    btn.title = '当前：静态 · 点击切换滚动';
  }

  function tick(){
    const d=new Date();
    const pad=n=>String(n).padStart(2,'0');
    document.getElementById('navClock').textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    document.getElementById('navDate').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }

  function collectRecentReports(){
    const all = [];
    Object.entries(REPORTS).forEach(([code, list])=>{
      list.forEach(r=>all.push({...r, code}));
    });
    all.sort((a,b)=>b.date.localeCompare(a.date));
    /* 若选中了行业，则只保留该项目行业匹配的报告 */
    let filtered = all;
    let limit = 6;
    if(SELECTED_INDUSTRY && SELECTED_INDUSTRY !== '__ALL__'){
      filtered = all.filter(r=>{
        const proj = PROJECTS.find(p=>p.code===r.code);
        if(!proj) return false;
        const tokens = (proj.industry||'').split(/[·\/ ]+/).map(t=>t.trim()).filter(Boolean);
        return tokens.includes(SELECTED_INDUSTRY);
      });
      limit = 10;  // 筛选时放宽上限，让差异可见
    }
    return {list: filtered.slice(0, limit), total: filtered.length};
  }

  function resolveReportUrl(report){
    return window.cmdK ? window.cmdK.resolveReportUrl(report, report.code) : ('detail.html?code=' + encodeURIComponent(report.code) + '#secReports');
  }

  const RESTRICTED_SOURCE_HOSTS = ['cers.org.cn', 'omdia.com', 'came-online.org'];
  function isRestrictedSource(url){
    try { return RESTRICTED_SOURCE_HOSTS.some(host => new URL(url, location.href).hostname.includes(host)); }
    catch(e){ return false; }
  }

  /* === 统一事件流 · 行业动态 + 近期报告 按日期合并排序 === */
  function renderUnified(){
    const track = document.getElementById('unifiedTrack');
    const lbl = document.getElementById('unifiedIndLabel');
    const totalEl = document.getElementById('unifiedTotal');
    if(!track || !lbl || !totalEl) return;

    const news = newsForIndustry();
    const {list: reports} = collectRecentReports();

    /* 合并 · 加 source 标签 */
    const merged = [
      ...news.map(n => ({
        kind: 'news',
        date: n.date || '',
        sortKey: n.date || '',
        tag: n.industry || n.source || '资讯',
        title: n.title || '',
        url: n.url || '',
        restricted: isRestrictedSource(n.url || ''),
      })),
      ...reports.map(r => {
        const proj = PROJECTS.find(p => p.code === r.code);
        const projName = proj ? (proj.name_cn || proj.code) : r.code;
        return {
          kind: 'report',
          date: r.date || '—',
          sortKey: r.date || '',
          tag: r.category || '未分类',
          title: r.title || '(无标题)',
          url: resolveReportUrl({...r, code:r.code}),
          projName,
        };
      }),
    ];
    merged.sort((a, b) => (b.sortKey || '').localeCompare(a.sortKey || ''));
    const total = merged.length;
    totalEl.textContent = total;
    lbl.textContent = `${SELECTED_INDUSTRY === '__ALL__' ? '全部行业' : SELECTED_INDUSTRY} · 倒序 ·`;

    if(!total){
      track.innerHTML = `<div class="v3-feed-empty">${SELECTED_INDUSTRY === '__ALL__' ? '暂无事件流 · 等待推送' : '该行业暂无公开事件 · 点「全部行业」查看'}</div>`;
      setMarquee('unifiedMarquee', 'unifiedTrack', 0);
      return;
    }
    const cards = merged.map(it => {
      const isNews = it.kind === 'news';
      const tagEmoji = isNews ? '📰' : '📄';
      const tagColor = isNews ? 'var(--tb-blue)' : 'var(--seal)';
      const subLine = isNews
        ? (it.restricted ? '<div class="v3-source-note">来源网站可能限制直接访问</div>' : '')
        : `<div class="v3-feed-sub">📁 ${escapeHtml(it.projName)}</div>`;
      const inner = `
          <div class="v3-feed-card-top">
            <span class="v3-feed-tag" style="--tag-c:${tagColor}">${tagEmoji} ${escapeHtml(it.tag)}</span>
            <span class="v3-feed-date">${it.date || '—'}</span>
          </div>
          <div class="v3-feed-title">${escapeHtml(it.title)}</div>
          ${subLine}`;
      return it.url
        ? `<a class="v3-feed-card" href="${it.url}" target="_blank" rel="noopener noreferrer" data-kind="${it.kind}">${inner}</a>`
        : `<div class="v3-feed-card" data-kind="${it.kind}">${inner}</div>`;
    }).join('');
    track.innerHTML = cards + cards;
    setMarquee('unifiedMarquee', 'unifiedTrack', total);
  }

  function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));}

  function renderAll(){
    renderKPI();
    renderCloud();
    renderUnified();
    if(window.cmdK){
      window.cmdK.tiltAll();
    }
  }

  function bind(){
    let rz;
    window.addEventListener('resize', ()=>{
      clearTimeout(rz);
      rz = setTimeout(()=>{ renderUnified(); }, 200);
    });
  }

  function init(){
    if (legacyRedirect()) return;
    bind();
    bindToggle();
    tick(); setInterval(tick, 1000);
    loadData();
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
