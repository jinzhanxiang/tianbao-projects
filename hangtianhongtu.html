<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;display:flex;flex-direction:column;font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);position:relative;z-index:0}
body > *{position:relative;z-index:2}

/* Hero */
.hero{text-align:center;padding:28px 20px 16px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--cyber-cyan),var(--cyber-purple),transparent);opacity:0.3}
.hero h1{font-size:28px;font-weight:700;margin-bottom:4px;background:linear-gradient(90deg,#fff,var(--cyber-cyan),var(--cyber-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--cyber-text2);font-size:15px}

/* Container */
.container{flex:1;overflow-y:auto;min-height:0;max-width:800px;margin:0 auto;padding:20px;width:100%}
.container::-webkit-scrollbar{width:6px}
.container::-webkit-scrollbar-track{background:rgba(0,212,255,0.02)}
.container::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--cyber-cyan),var(--cyber-purple));border-radius:3px}

/* Timeline */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--cyber-cyan),var(--cyber-purple),transparent);opacity:0.4}
.timeline-item{position:relative;margin-bottom:24px;opacity:0;animation:cyber-appear 0.5s ease-out forwards}
.timeline-item:nth-child(1){animation-delay:0.1s}
.timeline-item:nth-child(2){animation-delay:0.3s}
.timeline-item:nth-child(3){animation-delay:0.5s}
@keyframes cyber-appear{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.timeline-item::before{content:'';position:absolute;left:-28px;top:10px;width:14px;height:14px;border-radius:50%;background:var(--cyber-card);border:3px solid var(--cyber-cyan);box-shadow:0 0 12px rgba(0,212,255,0.3);animation:pulse-glow 2.5s ease-in-out infinite}
.timeline-item.type-thirdparty::before{border-color:var(--cyber-green);box-shadow:0 0 12px rgba(52,211,153,0.3)}
.timeline-item.type-analysis::before{border-color:var(--cyber-amber);box-shadow:0 0 12px rgba(251,146,60,0.3)}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px rgba(0,212,255,0.2)}50%{box-shadow:0 0 20px rgba(0,212,255,0.5)}}

.timeline-date{font-size:13px;color:var(--cyber-text3);margin-bottom:4px;font-family:var(--cyber-mono)}
.timeline-content{background:var(--cyber-card);border:1px solid var(--cyber-border);border-radius:10px;padding:18px 20px;border-left:3px solid var(--cyber-cyan);backdrop-filter:blur(10px);transition:all 0.3s}
.timeline-content:hover{border-color:var(--cyber-border-glow);box-shadow:0 0 24px rgba(0,212,255,0.06)}
.timeline-item.type-thirdparty .timeline-content{border-left-color:var(--cyber-green)}
.timeline-item.type-analysis .timeline-content{border-left-color:var(--cyber-amber)}

.timeline-title{font-size:17px;font-weight:600;color:var(--cyber-text);margin-bottom:8px}
.timeline-desc{font-size:15px;color:var(--cyber-text2);margin-bottom:12px;line-height:1.6}
.timeline-links{display:flex;flex-wrap:wrap;gap:8px}
.timeline-link{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(0,212,255,0.06);border:1px solid var(--cyber-border);border-radius:6px;color:var(--cyber-cyan);text-decoration:none;font-size:13px;transition:all 0.3s}
.timeline-link:hover{background:rgba(0,212,255,0.1);border-color:var(--cyber-cyan);box-shadow:0 0 12px rgba(0,212,255,0.1)}

.badge{display:inline-block;font-size:11px;padding:1px 8px;border-radius:8px;margin-left:8px;vertical-align:middle}
.badge.thirdparty{background:rgba(52,211,153,0.15);color:var(--cyber-green);border:1px solid rgba(52,211,153,0.3)}
.badge.analysis{background:rgba(251,146,60,0.15);color:var(--cyber-amber);border:1px solid rgba(251,146,60,0.3)}

/* Footer */
.footer{text-align:center;color:var(--cyber-text3);font-size:13px;padding:16px;border-top:1px solid var(--cyber-border)}
</style>
</head>
