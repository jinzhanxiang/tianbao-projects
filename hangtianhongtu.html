<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航天宏图项目时间线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --c-accent:#1a365d;
  --c-accent2:#2c5282;
  --c-blue:#3182ce;
  --c-warning:#d69e2e;
  --c-success:#38a169;
  --c-danger:#e53e3e;
  --c-muted:#718096;
  --c-bg:#f7fafc;
  --c-card:#fff;
  --c-text:#2d3748;
  --c-text2:#4a5568;
}
body{
  font-family:"FangSong","仿宋","仿宋_GB2312","STFangsong","Songti SC","Noto Serif CJK SC",serif;
  color:var(--c-text);background:var(--c-bg);line-height:1.9;font-size:17px;
  min-height:100vh;
}
.back-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;background:var(--c-card);
  border-bottom:1px solid #e2e8f0;
  position:sticky;top:0;z-index:100;
}
.back-nav a{
  color:var(--c-blue);text-decoration:none;font-size:14px;
  display:inline-flex;align-items:center;gap:6px;
}
.back-nav a:hover{text-decoration:underline}
.project-title{font-size:13px;color:var(--c-muted)}

.hero{
  background:linear-gradient(135deg,#1a365d,#2d3748);
  color:#fff;padding:32px 20px;text-align:center;
}
.hero h1{font-size:24px;margin-bottom:6px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.hero p{color:rgba(255,255,255,0.7);font-size:14px}

.container{max-width:800px;margin:0 auto;padding:24px 20px 60px}

/* 时间线样式 */
.timeline{position:relative;padding-left:28px}
.timeline::before{
  content:'';position:absolute;left:7px;top:8px;bottom:8px;
  width:2px;background:linear-gradient(180deg,#cbd5e0,#e2e8f0);
}
.timeline-item{
  position:relative;margin-bottom:28px;
}
.timeline-item::before{
  content:'';position:absolute;left:-24px;top:8px;
  width:12px;height:12px;border-radius:50%;
  background:var(--c-card);border:3px solid var(--c-blue);
}
.timeline-item.type-report::before{background:var(--c-blue)}
.timeline-item.type-analysis::before{background:var(--c-warning);border-color:var(--c-warning)}
.timeline-item.type-thirdparty::before{background:var(--c-success);border-color:var(--c-success)}
.timeline-item.type-material::before{background:var(--c-accent);border-color:var(--c-accent)}

.timeline-date{
  font-size:13px;color:var(--c-muted);margin-bottom:4px;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
}
.timeline-content{
  background:var(--c-card);border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);padding:18px 20px;
  border-left:4px solid var(--c-blue);
}
.timeline-item.type-report .timeline-content{border-left-color:var(--c-blue)}
.timeline-item.type-analysis .timeline-content{border-left-color:var(--c-warning)}
.timeline-item.type-thirdparty .timeline-content{border-left-color:var(--c-success)}
.timeline-item.type-material .timeline-content{border-left-color:var(--c-accent)}

.timeline-title{
  font-size:17px;font-weight:600;color:var(--c-accent);
  margin-bottom:8px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
}
.timeline-desc{font-size:15px;color:var(--c-text2);margin-bottom:12px}
.timeline-links{display:flex;flex-wrap:wrap;gap:10px}
.timeline-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;background:#edf2f7;border-radius:6px;
  color:var(--c-blue);text-decoration:none;font-size:13px;
  transition:all .15s;
}
.timeline-link:hover{background:#e2e8f0;transform:translateY(-1px)}
.timeline-link .icon{font-size:14px}

.badge{
  display:inline-block;background:var(--c-blue);color:#fff;
  font-size:11px;padding:1px 7px;border-radius:8px;margin-left:8px;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
}
.badge.analysis{background:var(--c-warning)}
.badge.thirdparty{background:var(--c-success)}
.badge.material{background:var(--c-accent)}

.footer{text-align:center;color:var(--c-muted);font-size:13px;padding:20px}

@media (max-width:600px){
  .timeline-links{flex-direction:column}
  .timeline-link{width:100%;justify-content:center}
}
</style>
</head>
<body>

<div class="back-nav">
  <a href="https://jinzhanxiang.github.io/tianbao-projects/">← 返回报告中心</a>
  <span class="project-title">天保控股项目储备库</span>
</div>

<div class="hero">
  <h1>🛰️ 航天宏图</h1>
  <p>卫星遥感 · 应急管理 · 初步分析阶段</p>
</div>

<div class="container">

<div class="timeline">

  <!-- 风险化解方案 -->
  <div class="timeline-item type-thirdparty">
    <div class="timeline-date">2026-05-12</div>
    <div class="timeline-content">
      <div class="timeline-title">风险化解方案 <span class="badge thirdparty">第三方</span></div>
      <div class="timeline-desc">航天宏图风险化解方案</div>
      <div class="timeline-links">
        <a href="https://www.yuque.com/approot/tianbao/hangtianhongtu" class="timeline-link" target="_blank"><span class="icon">📄</span> 风险化解方案（语雀）</a>
      </div>
    </div>
  </div>

  <!-- 初步分析 -->
  <div class="timeline-item type-analysis">
    <div class="timeline-date">2026-07-03</div>
    <div class="timeline-content">
      <div class="timeline-title">初步可行性分析 <span class="badge analysis">初步分析</span></div>
      <div class="timeline-desc">项目纳入储备项目，处于初步分析阶段</div>
      <div class="timeline-links">
        <a href="https://jinzhanxiang.github.io/tianbao-projects/" class="timeline-link" target="_blank"><span class="icon">📊</span> 储备项目库</a>
      </div>
    </div>
  </div>

</div>

</div>

<div class="footer">
  <p>航天宏图投资分析 · 时间线</p>
</div>

</body>
</html>
