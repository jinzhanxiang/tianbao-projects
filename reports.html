<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天保控股 - 报告库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#06113a;--blue:#2563eb;--bg:#e8edf5;--card:#fff;--text:#0f172a;--text-2:#475569;--border:rgba(15,23,42,.08)}
html,body{font-family:-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:16px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:8px;color:var(--text-2);font-size:14px;text-decoration:none}
.nav-links a:hover{background:#f1f5f9}
.nav-links a.active{background:var(--navy);color:#fff}
.header{margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header p{color:var(--text-2);font-size:14px}
.list{display:flex;flex-direction:column;gap:12px}
.list-item{background:var(--card);border-radius:12px;padding:20px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;transition:.2s}
.list-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.list-icon{font-size:32px}
.list-content{flex:1}
.list-title{font-size:16px;font-weight:600;margin-bottom:4px}
.list-meta{font-size:13px;color:var(--text-2)}
.list-link{color:var(--blue);font-size:14px}
.loading{text-align:center;padding:40px;color:var(--text-2)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div class="logo"><span class="logo-mark">天</span>天保控股项目中心</div>
    <div class="nav-links">
      <a href="index.html">🏠 首页</a>
      <a href="dashboard.html">📊 仪表盘</a>
      <a href="projects.html">📁 项目</a>
      <a href="reports.html" class="active">📚 报告库</a>
      <a href="timeline.html">⏱️ 时间线</a>
      <a href="kg.html">🔗 知识图谱</a>
    </div>
  </div>
</nav>
<div class="wrap">
  <div class="header">
    <h1>📚 报告库</h1>
    <p>所有项目报告入口</p>
  </div>
  <div id="reports-list" class="list"><div class="loading">加载中...</div></div>
</div>
<script>
async function init() {
  try {
    const resp = await fetch('data/projects.json');
    const data = await resp.json();
    const list = document.getElementById('reports-list');
    let html = '';
    data.projects.forEach(p => {
      if (p.reports && p.reports.length > 0) {
        html += `<div class="list-item">
          <span class="list-icon">${p.emoji}</span>
          <div class="list-content">
            <div class="list-title">${p.name}</div>
            <div class="list-meta">${p.stage}</div>
          </div>
          <div>${p.reports.map(r => `<a href="${r.url}" target="_blank" class="list-link">📄 ${r.title}</a>`).join('')}</div>
        </div>`;
      }
    });
    data.external_repos.forEach(r => {
      html += `<div class="list-item">
        <span class="list-icon">📁</span>
        <div class="list-content">
          <div class="list-title">${r.name}</div>
          <div class="list-meta">独立仓库</div>
        </div>
        <a href="${r.url}" target="_blank" class="list-link">访问 →</a>
      </div>`;
    });
    list.innerHTML = html || '<div class="loading">暂无报告</div>';
  } catch(e) {
    document.getElementById('reports-list').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}
init();
</script>
</body>
</html>
