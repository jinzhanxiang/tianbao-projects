<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 天保控股 · 报告库</title>
<script src="assets/particles.js"></script>
<link rel="stylesheet" href="assets/cyber-override.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;display:flex;flex-direction:column;font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);position:relative;z-index:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(5,5,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--text);font-size:14px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:grid;place-items:center;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 16px rgba(0,212,255,0.2)}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 14px;border-radius:8px;color:var(--text-2);font-size:13px;transition:all 0.3s}
.nav-links a:hover{color:var(--cyan);background:rgba(0,212,255,0.05)}
.nav-links a.active{color:var(--cyan);background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.15)}

/* Content */
.wrap{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:2;flex:1;overflow-y:auto;min-height:0;width:100%}
.header{margin-bottom:24px;position:relative}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-2);font-size:14px}
.list{display:flex;flex-direction:column;gap:10px}
.list-item{background:var(--bg-card);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
  border:1px solid var(--border);transition:all 0.3s;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.list-item::before{content:'';position:absolute;inset:-1px;border-radius:13px;background:linear-gradient(135deg,var(--cyan),var(--purple));opacity:0;transition:opacity 0.4s;z-index:-1;filter:blur(6px)}
.list-item:hover::before{opacity:0.15}
.list-item:hover{border-color:var(--border-glow);transform:translateX(4px);box-shadow:var(--shadow-glow)}
.list-icon{font-size:28px;width:40px;text-align:center}
.list-content{flex:1}
.list-title{font-size:15px;font-weight:600;margin-bottom:3px;color:var(--text)}
.list-meta{font-size:12px;color:var(--text-2)}
.list-link{color:var(--cyan);font-size:13px;padding:4px 10px;border-radius:6px;border:1px solid rgba(0,212,255,0.15);transition:all 0.3s;white-space:nowrap}
.list-link:hover{background:rgba(0,212,255,0.1);box-shadow:0 0 12px rgba(0,212,255,0.1)}
.loading{text-align:center;padding:60px;color:var(--text-2);font-family:var(--font-mono);font-size:13px}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">✦</span>天保控股 · 项目中心</a>
    <div class="nav-links">
      <a href="index.html">✦ 首页</a>
      <a href="dashboard.html">✦ 仪表盘</a>
      <a href="projects.html">✦ 项目</a>
      <a href="reports.html" class="active">✦ 报告库</a>
    </div>
  </div>
</nav>
<div class="wrap">
  <div class="header">
    <h1 class="cyber-title">✦ 报告库</h1>
    <p>所有项目报告入口</p>
  </div>
  <div id="reports-list" class="list"><div class="loading">✦ 加载中...</div></div>
</div>
<script>
async function init() {
  try {
    const resp = await fetch('data/projects.json');
    const data = await resp.json();
    const list = document.getElementById('reports-list');
    let html = '';
    data.projects.forEach(p => {
      if (p.reports && p.reports.length > 0) {
        html += `<div class="list-item">
          <span class="list-icon">${p.emoji}</span>
          <div class="list-content">
            <div class="list-title">${p.name}</div>
            <div class="list-meta">${p.stage}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">${p.reports.map(r => `<a href="${r.url}" target="_blank" class="list-link">✦ ${r.title}</a>`).join('')}</div>
        </div>`;
      }
    });
    data.external_repos.forEach(r => {
      html += `<div class="list-item">
        <span class="list-icon">▣</span>
        <div class="list-content">
          <div class="list-title">${r.name}</div>
          <div class="list-meta">独立仓库</div>
        </div>
        <a href="${r.url}" target="_blank" class="list-link">✦ 访问 →</a>
      </div>`;
    });
    list.innerHTML = html || '<div class="loading">✦ 暂无报告</div>';
  } catch(e) {
    document.getElementById('reports-list').innerHTML = '<div class="loading">✦ 加载失败: ' + e.message + '</div>';
  }
}
init();
// Auto-refresh every 60s
setInterval(init, 60000);
</script>
<div class="cyber-statusbar">
  <span><span class="dot green"></span>✦ 报告库 · 系统在线</span>
  <span>✦ <span id="reportCountDisplay">--</span> 份报告</span>
</div>
<script>document.getElementById('reportCountDisplay').textContent = document.querySelectorAll('.list-item').length;</script>

<!-- 主题切换按钮 -->
<button class="cyber-theme-toggle" id="themeToggle" title="切换日/夜间模式">🌙</button>
<script>
  // 主题切换
  (function(){
    var btn = document.getElementById('themeToggle');
    if(!btn) return;
    var isLight = localStorage.getItem('cyber-theme') === 'light';
    if(isLight){
      document.documentElement.classList.add('cyber-light');
      btn.textContent = '☀️';
    }
    btn.addEventListener('click', function(){
      var html = document.documentElement;
      if(html.classList.contains('cyber-light')){
        html.classList.remove('cyber-light');
        localStorage.setItem('cyber-theme', 'dark');
        btn.textContent = '🌙';
      } else {
        html.classList.add('cyber-light');
        localStorage.setItem('cyber-theme', 'light');
        btn.textContent = '☀️';
      }
    });
  })();
</script></body>
</html>
