<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 天保控股 · 知识图谱</title>
<script src="assets/particles.js"></script>
<style>
:root{--bg:#05050f;--bg-card:rgba(12,12,30,0.85);--text:#d0d0e0;--text-2:#6a6a8a;--text-3:#4a4a6a;
  --cyan:#00d4ff;--purple:#a78bfa;--green:#34d399;--blue:#4a7aff;--amber:#fb923c;--red:#f87171;
  --border:rgba(0,212,255,0.1);--border-glow:rgba(0,212,255,0.25);
  --shadow-glow:0 0 30px rgba(0,212,255,0.06);--font-mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;position:relative;z-index:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(5,5,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--text);font-size:14px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:grid;place-items:center;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 16px rgba(0,212,255,0.2)}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 14px;border-radius:8px;color:var(--text-2);font-size:13px;transition:all 0.3s}
.nav-links a:hover{color:var(--cyan);background:rgba(0,212,255,0.05)}
.nav-links a.active{color:var(--cyan);background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.15)}

/* Content */
.wrap{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:2}
.header{margin-bottom:24px;position:relative}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-2);font-size:14px;margin-bottom:24px}

/* Card Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--bg-card);border-radius:14px;padding:24px;border:1px solid var(--border);transition:all 0.4s;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.card::before{content:'';position:absolute;inset:-1px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--purple));opacity:0;transition:opacity 0.4s;z-index:-1;filter:blur(8px)}
.card:hover::before{opacity:0.2}
.card:hover{transform:translateY(-4px);border-color:var(--border-glow);box-shadow:var(--shadow-glow)}
.card-icon{font-size:40px;margin-bottom:14px;display:block}
.card h3{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text)}
.card p{font-size:13px;color:var(--text-2);line-height:1.5}
.card-meta{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3);font-family:var(--font-mono)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">✦</span>天保控股 · 项目中心</a>
    <div class="nav-links">
      <a href="index.html">✦ 首页</a>
      <a href="dashboard.html">✦ 仪表盘</a>
      <a href="projects.html">✦ 项目</a>
      <a href="reports.html">✦ 报告库</a>
      <a href="kg.html" class="active">✦ 知识图谱</a>
    </div>
  </div>
</nav>
<div class="wrap">
  <div class="header">
    <h1>✦ 知识图谱</h1>
    <p>选择可视化入口</p>
  </div>
  <div class="grid">
    <a href="wiki-index.html" class="card">
      <div class="card-icon">✦</div>
      <h3>数据全景</h3>
      <p>知识图谱实时数据看板 · 行业分布 · 实体排行 · 关系分析</p>
      <div class="card-meta">✦ 动态数据 · 实时更新</div>
    </a>
    <a href="entities-graph.html" class="card" target="_blank">
      <div class="card-icon">◈</div>
      <h3>实体关系图谱</h3>
      <p>交互式网络图，展示公司、人员、项目的关联关系</p>
      <div class="card-meta">✦ 528KB · 力导向图</div>
    </a>
    <a href="entities_index.html" class="card" target="_blank">
      <div class="card-icon">▣</div>
      <h3>实体索引</h3>
      <p>实体卡片列表，可搜索和筛选</p>
      <div class="card-meta">✦ 528KB · 可搜索</div>
    </a>
    <a href="kg_viz_v3/index.html" class="card" target="_blank">
      <div class="card-icon">◇</div>
      <h3>行业知识图谱</h3>
      <p>按行业分类的知识节点网络 · 分层探索</p>
      <div class="card-meta">✦ 26.5MB 数据 · 交互式</div>
    </a>
    <a href="charts_demo.html" class="card" target="_blank">
      <div class="card-icon">◈</div>
      <h3>可视化 Demo</h3>
      <p>Chart.js 可视化示例</p>
      <div class="card-meta">✦ 18KB · 图表展示</div>
    </a>
  </div>
</div>
</body>
</html>
