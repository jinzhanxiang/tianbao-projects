<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天保控股 - 知识图谱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#06113a;--blue:#2563eb;--bg:#e8edf5;--card:#fff;--text:#0f172a;--text-2:#475569;--border:rgba(15,23,42,.08)}
html,body{font-family:-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:16px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:8px;color:var(--text-2);font-size:14px;text-decoration:none}
.nav-links a:hover{background:#f1f5f9}
.nav-links a.active{background:var(--navy);color:#fff}
.header{margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header p{color:var(--text-2);font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:.2s;text-decoration:none;color:inherit;display:block}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.card-icon{font-size:48px;margin-bottom:16px}
.card h3{font-size:18px;margin-bottom:8px}
.card p{font-size:14px;color:var(--text-2);line-height:1.6}
.card-meta{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:13px;color:var(--text-2)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div class="logo"><span class="logo-mark">天</span>天保控股项目中心</div>
    <div class="nav-links">
      <a href="index.html">🏠 首页</a>
      <a href="dashboard.html">📊 仪表盘</a>
      <a href="projects.html">📁 项目</a>
      <a href="reports.html">📚 报告库</a>
      <a href="kg.html" class="active">🔗 知识图谱</a>
    </div>
  </div>
</nav>
<div class="wrap">
  <div class="header">
    <h1>🔗 知识图谱</h1>
    <p>选择可视化入口</p>
  </div>
  <div class="grid">
    <a href="entities-graph.html" class="card" target="_blank">
      <div class="card-icon">🕸️</div>
      <h3>实体关系图谱</h3>
      <p>交互式网络图，展示公司、人员、项目的关联关系</p>
      <div class="card-meta">528KB · 需加载数据</div>
    </a>
    <a href="entities_index.html" class="card" target="_blank">
      <div class="card-icon">📋</div>
      <h3>实体索引</h3>
      <p>实体卡片列表，可搜索和筛选</p>
      <div class="card-meta">528KB · 静态页面</div>
    </a>
    <a href="kg_viz_v3/" class="card" target="_blank">
      <div class="card-icon">📊</div>
      <h3>行业知识图谱</h3>
      <p>按行业分类的知识节点网络</p>
      <div class="card-meta">26.5MB 数据</div>
    </a>
    <a href="charts_demo.html" class="card" target="_blank">
      <div class="card-icon">📈</div>
      <h3>可视化Demo</h3>
      <p>Chart.js 可视化示例</p>
      <div class="card-meta">18KB · 图表展示</div>
    </a>
    <a href="wiki-index.html" class="card" target="_blank">
      <div class="card-icon">📖</div>
      <h3>Wiki 索引</h3>
      <p>报告和文档索引</p>
      <div class="card-meta">48KB · 文档导航</div>
    </a>
  </div>
</div>
</body>
</html>
