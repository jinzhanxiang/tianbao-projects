<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天保控股项目仪表盘</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#06113a;--navy-2:#0d1f5c;--blue:#2563eb;--blue-2:#3b82f6;
  --amber:#f59e0b;--emerald:#10b981;--purple:#7c3aed;--red:#ef4444;
  --bg:#e8edf5;--card:#fff;--text:#0f172a;--text-2:#475569;--border:rgba(15,23,42,.08)
}
html,body{font-family:-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
/* Nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:16px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:8px;color:var(--text-2);font-size:14px;text-decoration:none}
.nav-links a:hover{background:#f1f5f9}
.nav-links a.active{background:var(--navy);color:#fff}
/* Hero Stats */
.hero{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;padding:40px;border-radius:16px;margin-bottom:24px}
.hero h1{font-size:24px;margin-bottom:20px}
.stats{display:flex;gap:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat b{display:block;font-size:32px;font-weight:800}
.stat span{font-size:12px;opacity:0.8}
/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.card-emoji{font-size:28px;margin-bottom:8px}
.card-name{font-size:16px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text-2);margin-bottom:12px}
.card-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2)}
.card-status{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.status-deal{background:#fef2f2;color:#dc2626}
.status-np{background:#f0fdf4;color:#16a34a}
.status-done{background:#f0f9ff;color:#0284c7}
.card-reports a{display:block;font-size:13px;color:var(--blue);margin-top:8px;text-decoration:none}
.card-reports a:hover{text-decoration:underline}
/* Footer nav */
.footer-nav{margin-top:40px;padding-top:24px;border-top:1px solid var(--border);display:flex;gap:16px;justify-content:center}
.footer-nav a{padding:12px 24px;background:var(--card);border-radius:8px;text-decoration:none;color:var(--text);font-size:14px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.footer-nav a:hover{background:var(--navy);color:#fff}
.loading{text-align:center;padding:40px;color:var(--text-2)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div class="logo"><span class="logo-mark">天</span>天保控股项目中心</div>
    <div class="nav-links">
      <a href="index.html">🏠 首页</a>
      <a href="dashboard.html" class="active">📊 仪表盘</a>
      <a href="projects.html">📁 项目</a>
      <a href="reports.html">📚 报告库</a>
      <a href="timeline.html">⏱️ 时间线</a>
      <a href="kg.html">🔗 知识图谱</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <section class="hero">
    <h1>📊 项目仪表盘</h1>
    <div class="stats">
      <div class="stat"><b id="total-count">-</b><span>项目总数</span></div>
      <div class="stat"><b id="deal-count">-</b><span>重大并购</span></div>
      <div class="stat"><b id="np-count">-</b><span>储备项目</span></div>
      <div class="stat"><b id="repo-count">-</b><span>独立仓库</span></div>
    </div>
  </section>
  
  <h2 style="margin-bottom:16px;font-size:18px">�重点项目</h2>
  <div id="projects-grid" class="grid">
    <div class="loading">加载中...</div>
  </div>
  
  <div class="footer-nav">
    <a href="projects.html">查看全部项目 →</a>
    <a href="reports.html">报告库 →</a>
    <a href="charts_demo.html">可视化Demo</a>
  </div>
</div>

<script>
// Load project data from JSON
async function init() {
  try {
    const resp = await fetch('data/projects.json');
    const data = await resp.json();
    
    // Update stats
    document.getElementById('total-count').textContent = data.projects.length;
    document.getElementById('deal-count').textContent = data.projects.filter(p => p.category === 'deal').length;
    document.getElementById('np-count').textContent = data.projects.filter(p => p.category === 'np').length;
    document.getElementById('repo-count').textContent = data.external_repos.length;
    
    // Render project cards
    const grid = document.getElementById('projects-grid');
    grid.innerHTML = data.projects.map(p => `
      <div class="card">
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${p.stage}</div>
        <div class="card-meta">
          <span>更新: ${p.last_updated}</span>
          <span class="card-status status-${p.category}">${p.category === 'deal' ? '并购' : '储备'}</span>
        </div>
        <div class="card-reports">
          ${p.reports.map(r => `<a href="${r.url}" target="_blank">📄 ${r.title}</a>`).join('')}
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('projects-grid').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}
init();
</script>
</body>
</html>
