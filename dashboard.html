<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 天保控股 · 仪表盘</title>
<script src="assets/particles.js"></script>
<link rel="stylesheet" href="assets/cyber-override.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;display:flex;flex-direction:column;font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);position:relative;z-index:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit}

/* Hero Stats */
.hero{background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(167,139,250,0.08));border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:24px;backdrop-filter:blur(10px)}
.hero h1{font-size:24px;font-weight:700;margin-bottom:16px;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat b{display:block;font-size:32px;font-weight:800;font-family:var(--font-mono);background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat span{font-size:12px;color:var(--text-3)}

/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--bg-card);border-radius:14px;padding:20px;border:1px solid var(--border);transition:all 0.4s;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.card::before{content:'';position:absolute;inset:-1px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--purple));opacity:0;transition:opacity 0.4s;z-index:-1;filter:blur(8px)}
.card:hover::before{opacity:0.2}
.card:hover{transform:translateY(-4px);border-color:var(--border-glow);box-shadow:var(--shadow-glow)}
.card-emoji{font-size:28px;margin-bottom:8px}
.card-name{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.card-sub{font-size:13px;color:var(--text-2);margin-bottom:12px}
.card-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3)}
.card-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.status-deal{background:rgba(239,68,68,0.15);color:var(--red)}
.status-np{background:rgba(52,211,153,0.15);color:var(--green)}
.card-reports{margin-top:10px}
.card-reports a{display:block;font-size:13px;color:var(--cyan);margin-top:6px;padding:4px 8px;border-radius:6px;border:1px solid rgba(0,212,255,0.1);transition:all 0.3s}
.card-reports a:hover{background:rgba(0,212,255,0.1);box-shadow:0 0 12px rgba(0,212,255,0.1)}

/* Footer nav */
.footer-nav{margin-top:32px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:center}
.footer-nav a{padding:10px 20px;background:var(--bg-card);border-radius:10px;border:1px solid var(--border);font-size:13px;transition:all 0.3s}
.footer-nav a:hover{border-color:var(--border-glow);box-shadow:var(--shadow-glow);color:var(--cyan)}

.loading{text-align:center;padding:60px;color:var(--text-2);font-family:var(--font-mono);font-size:13px}
.wrap{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:2;flex:1;overflow-y:auto;min-height:0;width:100%}
h2{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">✦</span>天保控股 · 项目中心</a>
    <div class="nav-links">
      <a href="index.html">✦ 首页</a>
      <a href="dashboard.html" class="active">✦ 仪表盘</a>
      <a href="projects.html">✦ 项目</a>
      <a href="reports.html">✦ 报告库</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <section class="hero">
    <h1>✦ 项目仪表盘</h1>
    <div class="stats">
      <div class="stat"><b id="total-count">-</b><span>项目总数</span></div>
      <div class="stat"><b id="deal-count">-</b><span>重大并购</span></div>
      <div class="stat"><b id="np-count">-</b><span>储备项目</span></div>
      <div class="stat"><b id="repo-count">-</b><span>独立仓库</span></div>
    </div>
  </section>
  
  <h2>✦ 重点项目</h2>
  <div id="projects-grid" class="grid">
    <div class="loading">✦ 加载中...</div>
  </div>
  
  <div class="footer-nav">
    <a href="projects.html">✦ 查看全部项目 →</a>
    <a href="reports.html">✦ 报告库 →</a>
    <a href="charts_demo.html">✦ 可视化Demo</a>
  </div>
</div>

<div class="cyber-statusbar">
  <span><span class="dot green"></span>✦ 仪表盘 · 系统在线</span>
  <span>✦ 实时数据</span>
</div>

<script>
async function init() {
  try {
    const resp = await fetch('data/projects.json');
    const data = await resp.json();
    
    document.getElementById('total-count').textContent = data.projects.length;
    document.getElementById('deal-count').textContent = data.projects.filter(p => p.category === 'deal').length;
    document.getElementById('np-count').textContent = data.projects.filter(p => p.category === 'np').length;
    document.getElementById('repo-count').textContent = data.external_repos.length;
    
    const grid = document.getElementById('projects-grid');
    grid.innerHTML = data.projects.map(p => `
      <div class="card">
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${p.stage}</div>
        <div class="card-meta">
          <span>更新: ${p.last_updated}</span>
          <span class="card-status status-${p.category}">${p.category === 'deal' ? '并购' : '储备'}</span>
        </div>
        <div class="card-reports">
          ${p.reports.map(r => `<a href="${r.url}" target="_blank">✦ ${r.title}</a>`).join('')}
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('projects-grid').innerHTML = '<div class="loading">✦ 加载失败: ' + e.message + '</div>';
  }
}
init();
// Auto-refresh every 60s
setInterval(init, 60000);
</script>

<!-- 主题切换按钮 -->
<button class="cyber-theme-toggle" id="themeToggle" title="切换日/夜间模式">🌙</button>
<script>
  // 主题切换
  (function(){
    var btn = document.getElementById('themeToggle');
    if(!btn) return;
    var isLight = localStorage.getItem('cyber-theme') === 'light';
    if(isLight){
      document.documentElement.classList.add('cyber-light');
      btn.textContent = '☀️';
    }
    btn.addEventListener('click', function(){
      var html = document.documentElement;
      if(html.classList.contains('cyber-light')){
        html.classList.remove('cyber-light');
        localStorage.setItem('cyber-theme', 'dark');
        btn.textContent = '🌙';
      } else {
        html.classList.add('cyber-light');
        localStorage.setItem('cyber-theme', 'light');
        btn.textContent = '☀️';
      }
    });
  })();
</script></body>
</html>
