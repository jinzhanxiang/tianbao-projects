<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;display:flex;flex-direction:column;font-family:var(--cyber-font);background:var(--cyber-bg);color:var(--cyber-text);position:relative;z-index:0}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(167,139,250,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit}
.wrap{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:2;flex:1;overflow-y:auto;min-height:0;width:100%}
h1{font-size:22px;font-weight:700;margin:32px 0 12px;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;border-bottom:1px solid var(--border);padding-bottom:8px}
h1:first-child{margin-top:0}
.tag{display:inline-block;background:rgba(0,212,255,0.1);color:var(--cyan);padding:2px 10px;border-radius:10px;font-size:12px;margin-right:8px;vertical-align:middle}
.tag-5b{background:rgba(167,139,250,0.1);color:var(--purple)}
.chart-figure{background:var(--bg-card);border-radius:12px;padding:20px;margin:16px 0;border:1px solid var(--border);backdrop-filter:blur(10px);transition:all 0.3s}
.chart-figure:hover{border-color:var(--border-glow);box-shadow:var(--shadow-glow)}
.ch-title{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text);padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Preserve chart colors but adapt to dark bg */
.chart-figure svg text{fill:var(--text-2)!important}
.chart-figure svg line{stroke:var(--border)!important}
.chart-figure svg polyline{stroke:var(--cyan)!important}
.chart-figure svg polygon{fill:var(--cyan)!important;fill-opacity:0.15!important}
.hbar-fill{background:linear-gradient(90deg,var(--cyan),var(--purple))!important}
.hbar-num{color:var(--text)!important}
.vbar-bar{background:linear-gradient(180deg,var(--cyan),var(--purple))!important}
.vbar-num{color:var(--cyan)!important}
.vbar-label{color:var(--text-2)!important}
.pie-svg path{stroke:var(--cyber-bg)!important;stroke-width:1!important}
.donut-svg text{fill:var(--text)!important}
.funnel-bar{background:linear-gradient(90deg,var(--cyan),var(--purple))!important;color:var(--text)!important;padding:6px 12px!important;border-radius:6px!important;margin:4px 0!important}
.waterfall-table td{color:var(--text-2)!important;border-bottom:1px solid var(--border)!important}
.waterfall-table .total{color:var(--cyan)!important;font-weight:700!important}
.waterfall-pos{color:var(--green)!important}
.waterfall-neg{color:var(--red)!important}
.radar-svg text{fill:var(--text-2)!important}
.radar-svg circle{fill:var(--cyan)!important;stroke:var(--cyber-bg)!important}
.radar-svg polygon{stroke:var(--border)!important}
</style>
</head>
