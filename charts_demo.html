<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>5A 嵌入示例 - 6 种图表</title>
<link rel="stylesheet" href="https://jinzhanxiang.github.io/tianbao-projects/assets/charts.css">
</head>
<body>
<h1>5A 测试 1：bar_horizontal</h1>
<figure class="chart-figure chart-bar_horizontal">
  <div class="ch-title">股东持股比例</div>
  <div class="hbar-container">
    <div class="hbar-row">
      <div class="hbar-label">国家电投</div>
      <div class="hbar-track">
        <div class="hbar-fill" style="width:100.0%;background:#1a365d">
          <span class="hbar-num">43.32</span>
        </div>
      </div>
    </div>
    <div class="hbar-row">
      <div class="hbar-label">其他</div>
      <div class="hbar-track">
        <div class="hbar-fill" style="width:71.3%;background:#d69e2e">
          <span class="hbar-num">30.88</span>
        </div>
      </div>
    </div>
  </div>
</figure>
<h1>5A 测试 2：bar_vertical</h1>
<figure class="chart-figure chart-bar_vertical">
  <div class="ch-title">估值演变（亿元）</div>
  <div class="vbar-container">
    <div class="vbar-item">
      <div class="vbar-num">40.5</div>
      <div class="vbar-bar" style="height:55.1%;background:#1a365d"></div>
      <div class="vbar-label">2019</div>
    </div>
    <div class="vbar-item">
      <div class="vbar-num">73.5</div>
      <div class="vbar-bar" style="height:100.0%;background:#d69e2e"></div>
      <div class="vbar-label">2022</div>
    </div>
    <div class="vbar-item">
      <div class="vbar-num">36.4</div>
      <div class="vbar-bar" style="height:49.5%;background:#2c5282"></div>
      <div class="vbar-label">2026</div>
    </div>
  </div>
</figure>
<h1>5A 测试 3：line（含 X/Y 轴刻度）</h1>
<figure class="chart-figure chart-line">
  <div class="ch-title">估值演变趋势（亿元）</div>
  <div class="line-legend">
    <span class="lg-dot" style="background:#1a365d"></span>A轮估值
  </div>
  <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="line-svg">
    <line x1="0" y1="90.0" x2="100" y2="90.0" stroke="#718096" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="0" y="89.0" font-size="3" fill="#718096">36.4</text>
    <line x1="0" y1="50.0" x2="100" y2="50.0" stroke="#718096" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="0" y="49.0" font-size="3" fill="#718096">55.0</text>
    <line x1="0" y1="10.0" x2="100" y2="10.0" stroke="#718096" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="0" y="9.0" font-size="3" fill="#718096">73.5</text>
    <line x1="0" y1="90" x2="0" y2="92" stroke="#718096" stroke-width="0.5"/>
    <text x="0" y="98" text-anchor="middle" font-size="3" fill="#718096">0</text>
    <text x="25" y="98" text-anchor="middle" font-size="3" fill="#718096">25</text>
    <text x="50" y="98" text-anchor="middle" font-size="3" fill="#718096">50</text>
    <text x="75" y="98" text-anchor="middle" font-size="3" fill="#718096">75</text>
    <text x="100" y="98" text-anchor="middle" font-size="3" fill="#718096">100</text>
    <line x1="0" y1="10" x2="0" y2="90" stroke="#718096" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="100" y2="90" stroke="#718096" stroke-width="0.5"/>
    <polyline points="0,81.2 25,56.4 50,10.0 75,27.9 100,90.0" fill="none" stroke="#1a365d" stroke-width="2.5"/>
  </svg>
</figure>
<h1>5A 测试 4：area</h1>
<figure class="chart-figure chart-area">
  <div class="ch-title">累计营收（亿元）</div>
  <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="line-svg">
    <line x1="0" y1="10" x2="0" y2="90" stroke="#718096" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="100" y2="90" stroke="#718096" stroke-width="0.5"/>
    <text x="0" y="98" text-anchor="middle" font-size="3" fill="#718096">0</text>
    <text x="25" y="98" text-anchor="middle" font-size="3" fill="#718096">25</text>
    <text x="50" y="98" text-anchor="middle" font-size="3" fill="#718096">50</text>
    <text x="75" y="98" text-anchor="middle" font-size="3" fill="#718096">75</text>
    <text x="100" y="98" text-anchor="middle" font-size="3" fill="#718096">100</text>
    <polygon points="0,90 0,90.0 25,54.4 50,27.8 75,40.2 100,10.0 100,90" fill="#d69e2e" fill-opacity="0.35" stroke="#1a365d" stroke-width="2"/>
  </svg>
</figure>

<h1>5A 测试 5：pie（修复后）</h1>
<figure class="chart-figure chart-pie">
  <div class="ch-title">股权分布</div>
  <div class="pie-flex">
    <svg viewBox="0 0 100 100" class="pie-svg">
      <path d="M50,50 L90,50 A40,40 0 1,1 17.7,79.4 Z" fill="#1a365d"/>
      <path d="M50,50 L17.7,79.4 A40,40 0 0,1 6.8,42.5 Z" fill="#d69e2e"/>
      <path d="M50,50 L6.8,42.5 A40,40 0 0,1 23.2,12.2 Z" fill="#2c5282"/>
      <path d="M50,50 L23.2,12.2 A40,40 0 0,1 90,50 Z" fill="#2f855a"/>
    </svg>
    <div class="pie-legend">
      <span><span class="lg-dot" style="background:#1a365d"></span>国家电投 <small>(43.3%)</small></span>
      <span><span class="lg-dot" style="background:#d69e2e"></span>其他 <small>(30.9%)</small></span>
      <span><span class="lg-dot" style="background:#2c5282"></span>其他国资 <small>(18.5%)</small></span>
      <span><span class="lg-dot" style="background:#2f855a"></span>员工 <small>(7.3%)</small></span>
    </div>
  </div>
</figure>

<h1>5A 测试 6：donut</h1>
<figure class="chart-figure chart-donut">
  <div class="ch-title">穿透完成度</div>
  <svg viewBox="0 0 100 100" class="donut-svg">
    <path d="M90,50 A40,40 0 1,1 50,10 L50,26 A26,26 0 1,0 76,50 Z" fill="#1a365d"/>
    <path d="M50,10 A40,40 0 0,1 88.4,58 L74.5,55.7 A26,26 0 0,0 50,26 Z" fill="#d69e2e"/>
    <path d="M88.4,58 A40,40 0 1,1 90,50 L76,50 A26,26 0 1,0 74.5,55.7 Z" fill="#2c5282"/>
    <text x="50" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#1a365d">100%</text>
    <text x="50" y="58" text-anchor="middle" font-size="4.5" fill="#718096">已穿透</text>
  </svg>
</figure>
</body>
</html>
